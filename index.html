<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0e0d0c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Workout">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700;1,600;1,700&family=Geist+Mono:wght@400;500;600;700&family=Geist:wght@400;500;600;700&display=swap">
  <title>Workout</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root[data-theme="dark"] {
      --bg: #0e0d0c;
      --surface: #15140f;
      --surface-2: #1c1a15;
      --surface-3: #25221c;
      --line: rgba(255, 240, 220, 0.06);
      --line-2: rgba(255, 240, 220, 0.10);
      --ink: #f5f1ec;
      --ink-2: #b4ada4;
      --ink-3: #85807a;
      --ink-4: #5c5851;
      --accent: #e97a52;
      --accent-ink: #1a0f08;
      --accent-2: #b77bd9;
      --accent-soft: rgba(233, 122, 82, 0.14);
      --accent-line: rgba(233, 122, 82, 0.3);
      --good: #8bb98a;
      --good-soft: rgba(139, 185, 138, 0.14);
      --warn: #d4a258;
      --bad: #d07670;
      --gold: #d4a258;
      --info: #7ea7cc;
      --info-soft: rgba(126, 167, 204, 0.18);
      --info-line: rgba(126, 167, 204, 0.38);
      --shadow: 0 30px 60px -20px rgba(0,0,0,0.6);
    }
    :root[data-theme="light"] {
      --bg: #f7f4ef;
      --surface: #ffffff;
      --surface-2: #f0ebe3;
      --surface-3: #e6e0d5;
      --line: rgba(30, 22, 12, 0.08);
      --line-2: rgba(30, 22, 12, 0.14);
      --ink: #1b1815;
      --ink-2: #55504a;
      --ink-3: #807a72;
      --ink-4: #a6a09a;
      --accent: #c25a34;
      --accent-ink: #ffffff;
      --accent-2: #8a4fb0;
      --accent-soft: rgba(194, 90, 52, 0.12);
      --accent-line: rgba(194, 90, 52, 0.32);
      --good: #4a8749;
      --good-soft: rgba(74, 135, 73, 0.12);
      --warn: #a57c2f;
      --bad: #a54a45;
      --gold: #a57c2f;
      --info: #3f6f94;
      --info-soft: rgba(63, 111, 148, 0.12);
      --info-line: rgba(63, 111, 148, 0.34);
      --shadow: 0 30px 60px -20px rgba(40,25,10,0.12);
    }

    html, body {
      min-height: 100vh; min-height: 100dvh;
      background: var(--bg); color: var(--ink);
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #confetti-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 9999;
    }

    /* ===== APP SHELL ===== */
    .app-root {
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column;
      max-width: 480px; margin: 0 auto;
      position: relative;
    }
    .app-body {
      flex: 1; overflow-x: hidden;
      padding-bottom: calc(80px + env(safe-area-inset-bottom, 0));
    }
    .screen-wrap { display: none; }
    .screen-wrap.active { display: block; animation: fade-up .28s ease-out both; }
    .screen { padding: 4px 20px 24px; display: flex; flex-direction: column; gap: 16px; }
    #workout-body.screen { gap: 10px; }

    /* ===== TAB BAR ===== */
    .app-tabs {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      height: calc(64px + env(safe-area-inset-bottom, 0));
      padding-bottom: env(safe-area-inset-bottom, 0);
      border-top: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 94%, transparent);
      backdrop-filter: saturate(140%) blur(18px);
      -webkit-backdrop-filter: saturate(140%) blur(18px);
      display: grid; grid-template-columns: repeat(5, 1fr);
      z-index: 50;
    }
    .app-tab {
      background: none; border: none; padding: 10px 0 8px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--ink-4); cursor: pointer;
      transition: color .15s;
    }
    .app-tab.on { color: var(--accent); }
    .app-tab svg { width: 22px; height: 22px; stroke-width: 1.6; }
    .app-tab.on svg { stroke-width: 2; }
    .app-tabs.hidden { display: none; }

    /* ===== SHARED LANGUAGE ===== */
    .eyebrow {
      font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--ink-3); font-weight: 500;
    }
    .eyebrow-accent { color: var(--accent); }
    .mono { font-family: 'Geist Mono', monospace; font-variant-numeric: tabular-nums; }
    .serif { font-family: 'Fraunces', serif; font-weight: 600; letter-spacing: -0.01em; }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      position: relative;
    }
    .card-tight { padding: 14px 16px; border-radius: 16px; }
    .divider { height: 1px; background: var(--line); width: 100%; }

    .h-stack { display: flex; align-items: center; gap: 10px; }
    .v-stack { display: flex; flex-direction: column; gap: 10px; }
    .row-between { display: flex; align-items: center; justify-content: space-between; gap: 12px; }

    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 10px; border-radius: 999px;
      background: var(--surface-2); color: var(--ink-2);
      font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1px solid var(--line);
    }
    .pill-accent { color: var(--accent); background: var(--accent-soft); border-color: var(--accent-line); }
    .pill-good { color: var(--good); background: var(--good-soft); border-color: color-mix(in srgb, var(--good) 30%, transparent); }

    .btn {
      font-family: 'Geist', sans-serif; font-weight: 500; font-size: 15px;
      padding: 12px 18px; border-radius: 12px; border: 1px solid var(--line);
      background: var(--surface); color: var(--ink); cursor: pointer;
      transition: transform .08s, background .15s, border-color .15s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); font-weight: 600; }
    .btn-ghost { background: transparent; color: var(--ink-2); border: none; }
    .btn-block { width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-danger { color: var(--bad); }

    .icon-btn {
      width: 40px; height: 40px; border-radius: 12px;
      background: var(--surface); border: 1px solid var(--line);
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--ink-2); cursor: pointer; flex-shrink: 0;
      transition: transform .08s, background .15s;
    }
    .icon-btn:active { transform: scale(0.96); background: var(--surface-2); color: var(--ink); }
    .icon-btn-accent { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }

    .screen-title {
      font-family: 'Fraunces', serif; font-weight: 600; font-size: 34px;
      letter-spacing: -0.02em; line-height: 1.04;
    }
    .screen-title em { font-style: italic; color: var(--accent); }

    .badge-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .badge-dot-a { background: var(--accent); }
    .badge-dot-b { background: var(--accent-2); }

    /* ===== MOTION ===== */
    @keyframes fade-up { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fade-up 0.28s ease-out both; }
    @keyframes sheet-in { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes dialog-in { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
    }

    /* ===== HOME ===== */
    .home-header { padding-top: 4px; }
    .home-streak-row { display: flex; gap: 10px; margin-top: 14px; align-items: center; flex-wrap: wrap; }
    .home-next-card {
      padding: 22px;
      background: linear-gradient(180deg, var(--surface) 0%, var(--surface-2) 100%);
      border: 1px solid var(--line); border-radius: 20px;
    }
    .home-next-eyebrow {
      font-size: 16px; letter-spacing: 0.14em; margin-bottom: 10px;
      display: block;
    }
    .home-next-meta { font-size: 12px; color: var(--ink-3); margin-bottom: 18px; font-family: 'Geist Mono', monospace; }
    .home-next-bars { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 18px; }
    .home-next-bar { height: 3px; background: var(--surface-3); border-radius: 2px; }
    .home-next-bar.on { background: var(--accent); }

    /* Calendar */
    .cal-dow { text-align: center; font-size: 10px; color: var(--ink-4);
      padding: 0 0 6px; font-family: 'Geist Mono', monospace; letter-spacing: 0.08em; }
    .cal-day {
      aspect-ratio: 1 / 1;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      font-family: 'Geist Mono', monospace; font-size: 13px; font-weight: 500;
      color: var(--ink-2);
      border-radius: 8px; border: 1px solid transparent;
    }
    .cal-day.today { color: var(--accent); font-weight: 700;
      background: var(--accent-soft); border-color: var(--accent-line); }
    .cal-day.future { color: var(--ink-4); }
    .cal-day.creatine { color: var(--good); }
    .cal-day.today.creatine { color: var(--accent); }
    .cal-day .cal-dots { position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 2px; pointer-events: none; }
    .cal-day .cal-dots .badge-dot { width: 4px; height: 4px; }

    /* Creatine card */
    .creatine-check {
      width: 36px; height: 36px; border-radius: 12px;
      border: 1.5px solid var(--line-2); background: transparent;
      color: var(--ink-3); cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: all .15s; flex-shrink: 0;
    }
    .creatine-check.on { border-color: var(--good); background: var(--good); color: var(--bg); }

    /* PR rows (home) */
    .pr-row {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
    }
    .pr-row:last-child { border-bottom: none; }
    .pr-row-name { font-size: 14px; font-weight: 500; }
    .pr-row-meta { font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--ink-3); margin-top: 2px; }
    .pr-row-weight { font-family: 'Geist Mono', monospace; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; text-align: right; }
    .pr-row-weight .unit { font-size: 11px; color: var(--ink-3); margin-left: 2px; }

    /* ===== ACTIVE WORKOUT ===== */
    .workout-sticky {
      position: sticky; top: 0; z-index: 10;
      background: color-mix(in srgb, var(--bg) 95%, transparent);
      backdrop-filter: saturate(140%) blur(14px);
      -webkit-backdrop-filter: saturate(140%) blur(14px);
      padding: 6px 20px 14px;
      border-bottom: 1px solid var(--line);
    }
    .workout-name {
      font-family: 'Fraunces', serif; font-weight: 600;
      font-size: 22px; letter-spacing: -0.015em; line-height: 1.1;
      color: var(--ink);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .elapsed-row {
      display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0;
    }
    .elapsed-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--good); flex-shrink: 0;
      box-shadow: 0 0 0 0 color-mix(in srgb, var(--good) 60%, transparent);
      animation: pulse-dot 2.2s ease-out infinite;
    }
    .elapsed-time {
      font-family: 'Geist Mono', monospace; font-size: 15px; font-weight: 600;
      letter-spacing: -0.01em; color: var(--ink); font-variant-numeric: tabular-nums;
    }
    .elapsed-label {
      font-family: 'Geist Mono', monospace; font-size: 10px;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--ink-3); margin-left: 2px;
    }
    @keyframes pulse-dot {
      0%   { box-shadow: 0 0 0 0 color-mix(in srgb, var(--good) 55%, transparent); }
      70%  { box-shadow: 0 0 0 8px color-mix(in srgb, var(--good) 0%, transparent); }
      100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--good) 0%, transparent); }
    }

    .ex-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 12px 14px;
      transition: padding .15s;
    }
    .ex-card.expanded { padding: 14px; }
    .ex-card.dragging { opacity: 0.95; z-index: 20; box-shadow: var(--shadow); }
    .ex-head { display: flex; align-items: center; gap: 12px; cursor: pointer; }
    .ex-drag-handle { color: var(--ink-3); cursor: grab; touch-action: none;
      padding: 6px 4px; margin: -6px -4px -6px -8px; flex-shrink: 0;
      display: inline-flex; align-items: center; }
    .ex-drag-handle:active { cursor: grabbing; color: var(--ink); }
    .ex-index { font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--ink-4); min-width: 18px; }
    .ex-name { font-size: 16px; font-weight: 500; letter-spacing: -0.01em;
      display: flex; align-items: center; gap: 8px; }
    .ex-name-text { cursor: pointer; }
    .ex-name-text:active { color: var(--accent); }
    .ex-sub { font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--ink-3);
      margin-top: 3px; letter-spacing: 0.04em; }
    .ex-done-chip {
      font-family: 'Geist Mono', monospace; font-size: 11px;
      padding: 4px 9px; border-radius: 999px;
      background: var(--surface-2); color: var(--ink-3); border: 1px solid var(--line);
    }
    .ex-done-chip.has-done { background: var(--good-soft); color: var(--good);
      border-color: color-mix(in srgb, var(--good) 30%, transparent); }

    .ex-body { margin-top: 12px; }
    .set-head-row {
      display: grid; grid-template-columns: 20px 1fr 52px 32px; gap: 6px; margin-bottom: 6px;
      padding: 0 2px;
    }
    .set-head-row .eyebrow { font-size: 9px; }
    .set-head-row .eyebrow.num-col { text-align: center; }
    .set-head-row .eyebrow.reps-col { text-align: center; }

    .set-row {
      display: grid; grid-template-columns: 20px 1fr 52px 32px; gap: 6px;
      align-items: center;
      padding: 4px 2px; margin-bottom: 2px; border-radius: 8px;
    }
    .set-num { font-family: 'Geist Mono', monospace; font-size: 12px; color: var(--ink-4); text-align: center; }
    .weight-cell {
      display: grid; grid-template-columns: 30px 1fr 30px; gap: 4px; align-items: center;
    }
    .w-adj {
      height: 30px; border-radius: 8px;
      background: var(--surface-2); border: 1px solid var(--line);
      color: var(--ink-2); font-family: 'Geist Mono', monospace; font-size: 14px; font-weight: 600;
      cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center;
    }
    .w-adj:active { transform: scale(0.94); background: var(--surface-3); }
    .set-input {
      width: 100%; height: 30px; text-align: center; background: var(--surface-2);
      border: 1px solid var(--line); color: var(--ink);
      border-radius: 8px; padding: 0 4px; line-height: 1;
      font-family: 'Geist Mono', monospace; font-size: 14px; font-weight: 600;
      letter-spacing: -0.01em; outline: none;
      -moz-appearance: textfield;
    }
    .set-input::-webkit-outer-spin-button, .set-input::-webkit-inner-spin-button {
      -webkit-appearance: none; margin: 0;
    }
    .set-input:focus { border-color: var(--info-line); background: var(--surface-3); }
    .set-input.done { color: var(--ink); }
    .set-check-btn {
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: 1.5px solid var(--ink-4);
      color: var(--ink-4); cursor: pointer;
    }
    .set-check-btn.done { background: var(--good); border: none; color: var(--bg); }
    .set-check-btn:active { transform: scale(0.94); }

    .ex-actions { display: flex; gap: 6px; margin-top: 10px; }
    .add-set-btn {
      flex: 1; background: transparent; border: 1px dashed var(--line-2);
      color: var(--ink-3); padding: 8px 0; border-radius: 10px;
      font-family: 'Geist', inherit; font-size: 12px; cursor: pointer;
    }
    .ex-pr-strip {
      font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--ink-3);
      margin-top: 12px; padding: 6px 10px;
      background: var(--surface-2); border-radius: 8px; letter-spacing: 0.06em;
    }

    /* Rest ring bar */
    .rest-bar {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface); border: 1px solid var(--accent-line);
      padding: 10px 12px; border-radius: 14px; margin-top: 6px;
    }
    .rest-ring-wrap { position: relative; width: 52px; height: 52px; flex-shrink: 0; }
    .rest-ring-time {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-family: 'Geist Mono', monospace; font-size: 13px; font-weight: 600; color: var(--accent);
    }
    .rest-label { font-family: 'Geist Mono', monospace; font-size: 10px; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--accent); margin-bottom: 3px; font-weight: 500; }
    .rest-name { font-size: 12px; color: var(--ink-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rest-actions { display: flex; gap: 4px; }
    .rest-actions .icon-btn { width: 32px; height: 32px; border-radius: 10px; }
    .rest-add-label { font-family: 'Geist Mono', monospace; font-size: 10px; }

    /* ===== MODAL / SHEET (centered) ===== */
    .sheet-overlay {
      position: fixed; inset: 0; z-index: 400;
      background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none; align-items: center; justify-content: center;
      padding: 20px;
    }
    .sheet-overlay.active { display: flex; }
    .sheet {
      background: var(--surface); border-radius: 20px;
      padding: 22px;
      border: 1px solid var(--line);
      animation: dialog-in .2s cubic-bezier(0.2, 0.8, 0.2, 1) both;
      max-height: 85vh; overflow-y: auto;
      max-width: 440px; width: 100%;
      box-shadow: var(--shadow);
    }
    .sheet-grab { display: none; }
    /* Form field row used inside edit sheets */
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field-label { font-family: 'Geist Mono', monospace; font-size: 10px;
      letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-3); font-weight: 500; }
    .field input, .field select, .field textarea { width: 100%; }

    .num-tiles { display: grid; grid-template-columns: 1.2fr 1fr; gap: 14px; margin-bottom: 18px; }
    .num-tile {
      padding: 18px 14px; border-radius: 14px; cursor: pointer;
      background: var(--surface-2); border: 1px solid var(--line);
      transition: all .15s;
    }
    .num-tile.on { background: var(--accent-soft); border-color: var(--accent-line); }
    .num-tile-label { font-family: 'Geist Mono', monospace; font-size: 9px; margin-bottom: 6px;
      letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-4); font-weight: 500; }
    .num-tile.on .num-tile-label { color: var(--accent); }
    .num-tile-val {
      font-family: 'Geist Mono', monospace; font-size: 40px; font-weight: 700;
      letter-spacing: -0.03em; line-height: 1; color: var(--ink);
    }
    .num-tile.on .num-tile-val { color: var(--accent); }

    .quick-adj-row { display: flex; gap: 6px; margin-bottom: 14px; }
    .quick-adj-btn {
      flex: 1; padding: 10px 0; border-radius: 10px; border: 1px solid var(--line);
      background: var(--surface-2); color: var(--ink-2);
      font-family: 'Geist Mono', monospace; font-size: 11px; font-weight: 600; cursor: pointer;
    }
    .quick-adj-btn:active { transform: scale(0.96); }

    .numpad-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 14px;
    }
    .numpad-key {
      padding: 14px 0; border-radius: 12px; border: 1px solid var(--line);
      background: var(--surface-2); color: var(--ink);
      font-family: 'Geist Mono', monospace; font-size: 20px; font-weight: 500; cursor: pointer;
    }
    .numpad-key:active { transform: scale(0.97); background: var(--surface-3); }

    /* ===== SEGMENTED + TOGGLE + STEPPER ===== */
    .setting-group { }
    .setting-row {
      display: flex; align-items: center; gap: 10px; padding: 14px 18px;
      border-bottom: 1px solid var(--line);
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-label { flex: 1; font-size: 14px; font-weight: 500; }
    .setting-value { font-family: 'Geist Mono', monospace; font-size: 12px; color: var(--ink-3); }

    .toggle {
      width: 42px; height: 24px; border-radius: 999px;
      background: var(--surface-3); border: none; cursor: pointer;
      position: relative; transition: background .15s; flex-shrink: 0;
    }
    .toggle.on { background: var(--accent); }
    .toggle::after {
      content: ''; position: absolute; top: 3px; left: 3px;
      width: 18px; height: 18px; border-radius: 50%;
      background: #fff;
      transition: left .18s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .toggle.on::after { left: 21px; }

    .segmented {
      display: flex; background: var(--surface-2); border-radius: 10px;
      padding: 3px; border: 1px solid var(--line); gap: 2px;
    }
    .segmented button {
      padding: 5px 12px; font-family: 'Geist Mono', monospace; font-size: 11px;
      border-radius: 7px; background: transparent; color: var(--ink-3);
      border: none; cursor: pointer; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    .segmented button.on { background: var(--accent); color: var(--accent-ink); }

    .stepper { display: flex; align-items: center; gap: 8px; }
    .stepper .icon-btn { width: 28px; height: 28px; border-radius: 8px; }
    .stepper-val { font-family: 'Geist Mono', monospace; font-size: 13px; min-width: 48px; text-align: center; }

    /* ===== DIALOG ===== */
    .dialog-overlay {
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(0,0,0,0.6); display: none;
      align-items: center; justify-content: center; padding: 24px;
    }
    .dialog-overlay.active { display: flex; }
    .dialog-box {
      background: var(--surface); border: 1px solid var(--line);
      border-radius: 16px; padding: 22px; max-width: 340px; width: 100%;
      animation: dialog-in .15s ease-out both;
    }
    .dialog-msg { font-size: 14px; line-height: 1.5; margin-bottom: 18px; color: var(--ink); }
    .dialog-buttons { display: flex; gap: 8px; justify-content: flex-end; }
    .dialog-btn {
      padding: 10px 16px; border: none; border-radius: 10px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      font-family: inherit;
    }
    .dialog-btn-cancel { background: var(--surface-2); color: var(--ink-2); }
    .dialog-btn-confirm { background: var(--accent); color: var(--accent-ink); }

    /* ===== HISTORY ===== */
    .hist-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .hist-stat-val { font-family: 'Geist Mono', monospace; font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
    .hist-stat-label { font-family: 'Geist Mono', monospace; font-size: 9px; color: var(--ink-3); margin-top: 4px; letter-spacing: 0.08em; }
    .hist-item {
      background: var(--surface); border: 1px solid var(--line);
      border-radius: 16px; padding: 0; overflow: hidden;
    }
    .hist-head { display: flex; align-items: center; gap: 14px; padding: 16px 18px; cursor: pointer; }
    .hist-title { font-size: 14px; font-weight: 500; }
    .hist-meta { font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--ink-3);
      margin-top: 3px; letter-spacing: 0.06em; }
    .hist-meta .pr { color: var(--accent); }
    .hist-chev { transition: transform .2s; color: var(--ink-4); flex-shrink: 0; }
    .hist-item.open .hist-chev { transform: rotate(180deg); }
    .hist-detail { display: none; padding: 0 18px 18px; border-top: 1px solid var(--line); padding-top: 14px; }
    .hist-item.open .hist-detail { display: block; }
    .hist-ex { padding: 8px 0; border-bottom: 1px solid var(--line); }
    .hist-ex:last-child { border-bottom: none; }
    .hist-ex-name { font-size: 13px; font-weight: 500; margin-bottom: 4px; }
    .hist-ex-sets { font-family: 'Geist Mono', monospace; font-size: 11px;
      color: var(--ink-3); display: flex; gap: 10px; flex-wrap: wrap; }
    .hist-ex-sets .pr { color: var(--accent); }
    .hist-delete {
      background: none; border: none; color: var(--ink-4); cursor: pointer; padding: 4px;
    }
    .hist-notes {
      font-size: 12px; color: var(--ink-2); margin-top: 10px;
      padding: 10px 12px; background: var(--surface-2); border-radius: 10px;
      font-style: italic;
    }

    /* ===== PROGRESS ===== */
    .chip-picker {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .chip {
      flex-shrink: 0; padding: 8px 14px; border-radius: 999px;
      background: var(--surface); color: var(--ink-2); border: 1px solid var(--line);
      font-family: 'Geist Mono', monospace; font-size: 11px; font-weight: 600;
      letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer;
    }
    .chip.on { background: var(--accent); color: var(--accent-ink); border-color: var(--accent); }

    .prog-hero .serif { font-size: 22px; }
    .prog-view-tabs { display: flex; gap: 4px; margin-top: 16px; }
    .prog-view-tabs button {
      flex: 1; padding: 8px 0; border-radius: 8px;
      background: transparent; color: var(--ink-3); border: 1px solid var(--line);
      font-family: 'Geist Mono', monospace; font-size: 10px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
    }
    .prog-view-tabs button.on { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-line); }

    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-cell { padding: 14px; border-radius: 16px; background: var(--surface); border: 1px solid var(--line); }
    .stat-cell-val { font-family: 'Geist Mono', monospace; font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
    .stat-cell-sub { font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--ink-4); margin-top: 2px; }

    .ex-list-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px; cursor: pointer;
      border-bottom: 1px solid var(--line);
      background: var(--surface);
      transition: transform .08s;
    }
    .ex-list-row:last-child { border-bottom: none; }
    .ex-list-row.on { background: var(--surface-2); }
    .ex-list-row.dragging { opacity: 0.95; z-index: 20; box-shadow: var(--shadow); }
    .ex-list-drag { color: var(--ink-3); cursor: grab; touch-action: none; padding: 4px; margin: -4px -8px -4px -8px; display: inline-flex; align-items: center; flex-shrink: 0; }
    .ex-list-drag:active { cursor: grabbing; color: var(--ink); }
    .ex-list-name { font-size: 13px; font-weight: 500; }
    .ex-list-sub { font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--ink-3); margin-top: 2px; }

    /* ===== ROUTINES / BUILDER ===== */
    .routine-card {
      background: var(--surface); border: 1px solid var(--line);
      border-radius: 20px; padding: 18px;
    }
    .routine-exercise-peek { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
    .builder-row {
      background: var(--surface); border: 1px solid var(--line); border-radius: 14px;
      padding: 12px 14px; display: flex; align-items: center; gap: 10px;
      transition: transform .08s;
    }
    .builder-row.dragging { opacity: 0.9; box-shadow: var(--shadow); z-index: 30; }
    .builder-drag-handle { color: var(--ink-4); cursor: grab; touch-action: none; padding: 4px; }
    .builder-field-input {
      width: 42px; background: var(--surface-2); border: 1px solid var(--line);
      color: var(--ink); padding: 6px 4px; border-radius: 8px; text-align: center;
      font-family: 'Geist Mono', monospace; font-size: 13px; outline: none;
    }
    .builder-field-input[type=text] { width: 56px; }
    .builder-remove-btn { background: none; border: none; color: var(--ink-4); cursor: pointer; padding: 4px; }
    .dashed-btn {
      background: transparent; border: 1px dashed var(--line-2); color: var(--ink-3);
      padding: 14px; border-radius: 14px;
      font-family: inherit; font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }

    .builder-name-input {
      width: 100%; background: var(--surface); border: 1px solid var(--line);
      color: var(--ink); padding: 16px 20px; border-radius: 14px;
      font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600;
      letter-spacing: -0.01em; outline: none;
    }

    /* ===== MENU ===== */
    .menu-row {
      display: flex; align-items: center; gap: 14px; padding: 16px 18px; cursor: pointer;
      border-bottom: 1px solid var(--line);
    }
    .menu-row:last-child { border-bottom: none; }
    .menu-icon-box {
      width: 36px; height: 36px; border-radius: 10px; background: var(--surface-2);
      display: flex; align-items: center; justify-content: center;
      color: var(--accent); flex-shrink: 0;
    }
    .menu-row-name { font-size: 14px; font-weight: 500; }
    .menu-row-sub { font-family: 'Geist Mono', monospace; font-size: 10px;
      color: var(--ink-3); margin-top: 2px; letter-spacing: 0.06em; text-transform: uppercase; }

    /* ===== ONBOARDING ===== */
    #screen-onboarding .screen { min-height: 100vh; min-height: 100dvh; justify-content: space-between; }
    .ob-progress { display: flex; gap: 4px; padding-top: 12px; }
    .ob-progress-bar { flex: 1; height: 2px; border-radius: 2px; background: var(--surface-2); transition: background .3s; }
    .ob-progress-bar.on { background: var(--accent); }
    .ob-body { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 40px 0; }
    .ob-head {
      font-family: 'Fraunces', serif; font-weight: 600; font-size: 40px;
      line-height: 1.02; letter-spacing: -0.02em; margin: 0 0 20px;
    }
    .ob-head em { font-style: italic; color: var(--accent); }
    .ob-body p { font-size: 15px; line-height: 1.55; color: var(--ink-2); max-width: 320px; }

    /* ===== FINISH ===== */
    #screen-finish .screen { min-height: 80vh; justify-content: center; }
    .finish-head {
      text-align: center; padding: 20px 0;
    }
    .finish-title {
      font-family: 'Fraunces', serif; font-size: 44px; font-weight: 600;
      letter-spacing: -0.02em; line-height: 1.02; margin: 10px 0;
    }
    .finish-title em { font-style: italic; color: var(--accent); }
    .finish-stat-row {
      display: flex; align-items: baseline; padding: 16px 20px;
      border-bottom: 1px solid var(--line);
    }
    .finish-stat-row:last-child { border-bottom: none; }
    .finish-stat-label { flex: 1; font-size: 13px; color: var(--ink-2); }
    .finish-stat-val { font-family: 'Geist Mono', monospace; font-size: 22px; font-weight: 700;
      letter-spacing: -0.02em; margin-right: 6px; }
    .finish-stat-unit { font-family: 'Geist Mono', monospace; font-size: 10px; color: var(--ink-4);
      letter-spacing: 0.08em; min-width: 32px; text-align: right; }

    /* ===== UTIL ===== */
    .empty-state { text-align: center; padding: 48px 16px; color: var(--ink-3); font-size: 13px; }
    .hidden { display: none !important; }
    input[type=number], input[type=text] {
      font-family: inherit; color: var(--ink); background: var(--surface-2);
      border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px;
      outline: none; font-size: 14px;
    }
    textarea {
      font-family: inherit; color: var(--ink); background: var(--surface-2);
      border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px;
      outline: none; font-size: 14px; line-height: 1.5; resize: vertical;
    }

    /* ===== PLATES ===== */
    .plate-breakdown {
      font-family: 'Geist Mono', monospace; font-size: 11px; color: var(--ink-3);
      padding: 6px 10px; background: var(--surface-2); border-radius: 8px;
      margin-bottom: 12px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    }
    .plate-tag { padding: 2px 6px; background: var(--surface-3); border-radius: 4px; color: var(--ink-2); }

    /* Quick weight +/- adjusters on set row (hidden inline; shown in numpad) */
  </style>
</head>
<body>
  <!-- Confetti (opt-in) -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Custom Dialog -->
  <div class="dialog-overlay" id="dialog-overlay">

  <div class="app-root">

    <!-- TAB BAR -->
    <div class="app-tabs" id="app-tabs">

        <span>History</span>
      </button>

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="8" width="3" height="8" rx="1"/><rect x="19" y="8" width="3" height="8" rx="1"/><rect x="6" y="10" width="2" height="4"/><rect x="16" y="10" width="2" height="4"/><rect x="8" y="11" width="8" height="2"/></svg>

        <span>More</span>

  <!-- SHEETS (outside app-root so they can cover the full viewport) -->

  <script>
    /* ========== ICON FRAGMENTS ========== */
    const SVG = (d) => `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">${d}</svg>`;
    const ICONS = {
      chevLeft: `<path d="M15 5l-7 7 7 7"/>`,
      chevRight: `<path d="M9 5l7 7-7 7"/>`,
      chevDown: `<path d="M5 9l7 7 7-7"/>`,
      plus: `<path d="M12 5v14M5 12h14"/>`,
      minus: `<path d="M5 12h14"/>`,
      check: `<path d="M4 12l5 5 11-12"/>`,
      x: `<path d="M6 6l12 12M18 6L6 18"/>`,
      swap: `<path d="M7 4l-3 3 3 3"/><path d="M4 7h13a3 3 0 013 3v1"/><path d="M17 20l3-3-3-3"/><path d="M20 17H7a3 3 0 01-3-3v-1"/>`,
      note: `<path d="M4 4h12l4 4v12H4z"/><path d="M16 4v4h4"/><path d="M8 13h8M8 17h5"/>`,
      search: `<circle cx="11" cy="11" r="7"/><path d="M20 20l-4-4"/>`,
      trash: `<path d="M4 7h16"/><path d="M10 11v6M14 11v6"/><path d="M6 7l1 13a1 1 0 001 1h8a1 1 0 001-1l1-13"/><path d="M9 7V4h6v3"/>`,
      drag: `<circle cx="9" cy="6" r="1.6" fill="currentColor"/><circle cx="9" cy="12" r="1.6" fill="currentColor"/><circle cx="9" cy="18" r="1.6" fill="currentColor"/><circle cx="15" cy="6" r="1.6" fill="currentColor"/><circle cx="15" cy="12" r="1.6" fill="currentColor"/><circle cx="15" cy="18" r="1.6" fill="currentColor"/>`,
      play: `<path d="M7 4l13 8-13 8z"/>`,
      pause: `<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>`,
      skip: `<path d="M5 4l10 8-10 8z"/><path d="M19 4v16"/>`,
      flame: `<path d="M12 2s5 5 5 10a5 5 0 01-10 0c0-3 2-4 2-4s-1 3 1 4c0-3 2-6 2-10z"/>`,
      target: `<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.5"/>`,
      trophy: `<path d="M8 21h8"/><path d="M12 17v4"/><path d="M7 4h10v5a5 5 0 01-10 0V4z"/><path d="M7 6H4a2 2 0 002 3h1M17 6h3a2 2 0 01-2 3h-1"/>`,
      dumbbell: `<rect x="2" y="8" width="3" height="8" rx="1"/><rect x="19" y="8" width="3" height="8" rx="1"/><rect x="6" y="10" width="2" height="4"/><rect x="16" y="10" width="2" height="4"/><rect x="8" y="11" width="8" height="2"/>`,
      sparkle: `<path d="M12 3l2 6 6 2-6 2-2 6-2-6-6-2 6-2z"/>`,
      settings: `<circle cx="12" cy="12" r="3"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/>`,
    };
    const svg = (name, size = 20, sw = 1.75) => `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${sw}" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||''}</svg>`;

    /* ========== THEME ========== */
    function loadTheme() {
      const t = localStorage.getItem('w-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
      const meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', t === 'light' ? '#f7f4ef' : '#0e0d0c');
      return t;
    }
    function setTheme(t) {
      localStorage.setItem('w-theme', t);
      loadTheme();
    }
    loadTheme();

    /* ========== UTILITIES ========== */
    function escapeHtml(str) {
      if (str === null || str === undefined) return '';
      const div = document.createElement('div');
      div.textContent = String(str);
      return div.innerHTML;
    }
    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    }
    function formatTime(totalSec) {
      const m = Math.floor(totalSec / 60);
      const s = totalSec % 60;
      return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }
    function formatVolume(vol) { return vol.toLocaleString('en-US'); }
    function todayISO() { return new Date().toISOString().slice(0, 10); }

    /* ========== EXERCISE LIBRARY ========== */
    const EXERCISE_LIBRARY = [
      // Chest
      { id:'bench-press-bb', name:'Bench Press (Barbell)', category:'Chest', equipment:'barbell', defaultSets:3, defaultReps:'10', defaultRest:180 },
      { id:'bench-press-db', name:'Bench Press (Dumbbell)', category:'Chest', equipment:'dumbbell', defaultSets:3, defaultReps:'10', defaultRest:120 },
      { id:'incline-bench-bb', name:'Incline Bench (Barbell)', category:'Chest', equipment:'barbell', defaultSets:3, defaultReps:'10', defaultRest:180 },
      { id:'incline-bench-db', name:'Incline Bench (Dumbbell)', category:'Chest', equipment:'dumbbell', defaultSets:3, defaultReps:'10', defaultRest:120 },
      { id:'decline-bench', name:'Decline Bench', category:'Chest', equipment:'barbell', defaultSets:3, defaultReps:'10', defaultRest:180 },

    const BB_DB_PAIRS = {};
    (function buildPairs() {
      const byBase = {};
      EXERCISE_LIBRARY.forEach(ex => {
        if (ex.equipment !== 'barbell' && ex.equipment !== 'dumbbell') return;
        const m = ex.id.match(/^(.+)-(bb|db)$/);
        if (m) {
          const base = m[1];
          if (!byBase[base]) byBase[base] = {};
          byBase[base][ex.equipment] = ex.id;
        }
      });
      byBase['row'] = { barbell: 'barbell-row', dumbbell: 'dumbbell-row' };
      Object.values(byBase).forEach(pair => {
        if (pair.barbell && pair.dumbbell) {

    const PLATES_KG = [20, 10, 5, 2.5, 1.25];
    const PLATES_LBS = [45, 25, 10, 5, 2.5];
    function calculatePlates(totalWeight, barWeight, unit) {
      const plates = unit === 'lbs' ? PLATES_LBS : PLATES_KG;
      let perSide = (totalWeight - barWeight) / 2;
      if (perSide <= 0) return { plates: [], leftover: 0 };
      const result = [];
      for (const plate of plates) {
        while (perSide >= plate - 0.001) { result.push(plate); perSide -= plate; }
      }
      return { plates: result, leftover: Math.abs(perSide) < 0.01 ? 0 : perSide };
    }
    function getPlateBreakdownHTML(weight, unit) {
      if (!weight || weight === '') return '';
      const w = Number(weight);
      const barWeight = appData.settings.barWeight || (unit === 'lbs' ? 45 : 20);
      if (w <= 0) return '';
      if (w < barWeight) return `<div class="plate-breakdown">Under bar weight</div>`;
      if (w === barWeight) return `<div class="plate-breakdown">Bar only</div>`;
      const { plates, leftover } = calculatePlates(w, barWeight, unit);
      if (leftover > 0) return `<div class="plate-breakdown">Can't plate exactly</div>`;
      if (plates.length === 0) return `<div class="plate-breakdown">Bar only</div>`;
      const grouped = [];
      plates.forEach(p => {
        const last = grouped[grouped.length - 1];
        if (last && last.v === p) last.c++;
        else grouped.push({ v: p, c: 1 });
      });
      const tags = grouped.map(g => `<span class="plate-tag">${g.c > 1 ? g.c + '&times;' : ''}${g.v}</span>`).join('');
      return `<div class="plate-breakdown">Per side · ${tags}</div>`;
    }

    /* ========== DATA LAYER ========== */
    function loadData() {
      const raw = localStorage.getItem('workoutData');
      if (raw) return JSON.parse(raw);
      return { sessions: [], settings: { defaultRestTime: 90, unit: 'kg', hapticsEnabled: true }, personalRecords: {} };
    }
    function saveData(data) { localStorage.setItem('workoutData', JSON.stringify(data)); }
    let appData = loadData();

    function migrateData() {
      if (!appData.personalRecords) appData.personalRecords = {};
      if (appData.settings.hapticsEnabled === undefined) appData.settings.hapticsEnabled = true;
      if (appData.settings.confettiOnPR === undefined) appData.settings.confettiOnPR = false;
      if (!appData.routines) appData.routines = JSON.parse(JSON.stringify(DEFAULT_ROUTINES));
      DEFAULT_ROUTINES.forEach(def => {
        if (!appData.routines.find(r => r.id === def.id)) {
          appData.routines.push(JSON.parse(JSON.stringify(def)));
        }
      });
      appData.sessions.forEach(s => {
        if (s.notes === undefined) s.notes = '';
        if (!s.routineId && s.type) {
          s.routineId = s.type === 'A' ? 'default-a' : 'default-b';
          s.routineName = s.type === 'A' ? 'Workout A' : 'Workout B';
        }
        s.exercises.forEach(ex => {
          const legacyId = LEGACY_NAME_MAP[ex.name];
          if (legacyId) {
            const libEx = LIBRARY_MAP[legacyId];
            if (libEx) { ex.name = libEx.name; if (!ex.equipment) ex.equipment = libEx.equipment; }
          }
          if (!ex.equipment) ex.equipment = 'barbell';
          if (!ex.targetReps && ex.exerciseId) {
            const lib = LIBRARY_MAP[ex.exerciseId];
            if (lib) ex.targetReps = lib.defaultReps;
          }
        });
      });
      if (appData.settings.barWeight === undefined) {
        appData.settings.barWeight = appData.settings.unit === 'lbs' ? 45 : 20;
      }
      if (!appData.exerciseNotes) appData.exerciseNotes = {};
      if (!appData.settings.chartOrder) appData.settings.chartOrder = [];
      if (!appData.customExercises) appData.customExercises = [];
      if (!appData.exerciseOverrides) appData.exerciseOverrides = {};
      appData.customExercises.forEach(ex => {
        if (!LIBRARY_MAP[ex.id]) { EXERCISE_LIBRARY.push(ex); LIBRARY_MAP[ex.id] = ex; }
      });
      if (!appData.creatineLog) appData.creatineLog = {};
      rebuildAllPRs();
      saveData(appData);

    /* ========== PERSONAL RECORDS ========== */
    function computePR(exerciseName) {
      let maxWeight = 0, prDate = '', prReps = 0;
      appData.sessions.forEach(s => {
        s.exercises.forEach(ex => {
          if (ex.name === exerciseName) {
            ex.sets.forEach(set => {
              if (set.completed && set.weight !== '' && set.weight !== null && Number(set.weight) > maxWeight) {
                maxWeight = Number(set.weight); prDate = s.date; prReps = Number(set.reps) || 0;
              }
            });
          }
        });
      });
      return maxWeight > 0 ? { maxWeight, date: prDate, reps: prReps } : null;
    }
    function rebuildAllPRs() {
      const all = new Set();
      appData.sessions.forEach(s => s.exercises.forEach(ex => all.add(ex.name)));
      appData.personalRecords = {};
      all.forEach(name => { const pr = computePR(name); if (pr) appData.personalRecords[name] = pr; });
    }
    function computeEstimated1RM(exerciseName) {
      let best = 0;
      appData.sessions.forEach(s => s.exercises.forEach(ex => {
        if (ex.name === exerciseName) ex.sets.forEach(set => {
          if (set.completed && set.weight && set.reps) {
            const w = Number(set.weight), r = Number(set.reps);
            if (w > 0 && r > 0) { const e = w * (1 + r / 30); if (e > best) best = e; }
          }
        });
      }));
      return best > 0 ? Math.round(best) : null;
    }
    function checkForNewPR(exerciseName, weight) {
      if (weight === '' || weight === null || weight === 0) return false;
      const numWeight = Number(weight);
      const current = appData.personalRecords[exerciseName];
      if (!current) return false;
      if (numWeight > current.maxWeight) {
        let prReps = 0;
        if (currentSession) {
          const ex = currentSession.exercises.find(e => e.name === exerciseName);
          if (ex) {
            const set = ex.sets.find(s => s.completed && Number(s.weight) === numWeight);
            if (set) prReps = Number(set.reps) || 0;
          }
        }
        appData.personalRecords[exerciseName] = { maxWeight: numWeight, date: todayISO(), reps: prReps };
        return true;
      }
      return false;
    }

    /* ========== HAPTICS + WAKE LOCK + NOTIFY ========== */
    function triggerHaptic(type) {
      if (!appData.settings.hapticsEnabled || !navigator.vibrate) return;
      const patterns = {
        setComplete: [30], pr: [50, 30, 50, 30, 100], restTimerDone: [200, 100, 200, 100, 200],
        workoutFinished: [100, 50, 100, 50, 200], dragStart: [20], weightAdjust: [10], light: [15], success: [30, 30, 60],
      };
      navigator.vibrate(patterns[type] || [20]);
    }
    let wakeLock = null;
    async function acquireWakeLock() {
      if (!('wakeLock' in navigator)) return;
      try { wakeLock = await navigator.wakeLock.request('screen'); wakeLock.addEventListener('release', () => { wakeLock = null; }); } catch (e) {}
    }
    function releaseWakeLock() { if (wakeLock) { wakeLock.release(); wakeLock = null; } }
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && currentSession) acquireWakeLock();
    });
    function requestNotificationPermission() {
      if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();
    }
    function sendRestNotification() {

    /* ========== CONFETTI (opt-in) ========== */
    const confettiCanvas = document.getElementById('confetti-canvas');
    const confettiCtx = confettiCanvas.getContext('2d');
    let confettiParticles = [], confettiAnimId = null;
    function resizeConfetti() { confettiCanvas.width = window.innerWidth; confettiCanvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeConfetti);
    resizeConfetti();
    function launchConfetti() {
      if (!appData.settings.confettiOnPR) return;
      confettiParticles = [];
      const colors = [ getCSS('--accent'), getCSS('--accent-2'), getCSS('--good'), getCSS('--gold') ];
      for (let i = 0; i < 80; i++) {
        confettiParticles.push({
          x: Math.random() * confettiCanvas.width, y: -10 - Math.random() * 40,
          w: 6 + Math.random() * 6, h: 4 + Math.random() * 4,
          vx: (Math.random() - 0.5) * 6, vy: 2 + Math.random() * 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          rotation: Math.random() * 360, rotSpeed: (Math.random() - 0.5) * 10, life: 1
        });
      }
      if (!confettiAnimId) animateConfetti();
    }
    function getCSS(varName) { return getComputedStyle(document.documentElement).getPropertyValue(varName).trim() || '#e97a52'; }
    function animateConfetti() {
      confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      let alive = false;
      confettiParticles.forEach(p => {
        if (p.life <= 0) return;
        alive = true;
        p.x += p.vx; p.vy += 0.1; p.y += p.vy;
        p.rotation += p.rotSpeed; p.life -= 0.005;
        if (p.y > confettiCanvas.height + 20) { p.life = 0; return; }
        confettiCtx.save();
        confettiCtx.translate(p.x, p.y); confettiCtx.rotate(p.rotation * Math.PI / 180);
        confettiCtx.globalAlpha = Math.max(0, p.life); confettiCtx.fillStyle = p.color;
        confettiCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        confettiCtx.restore();
      });
      if (alive) confettiAnimId = requestAnimationFrame(animateConfetti);
      else { confettiAnimId = null; confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height); }
    }

    /* ========== CUSTOM DIALOG ========== */
    function customDialog(msg, showCancel) {
      return new Promise(resolve => {
        const overlay = document.getElementById('dialog-overlay');
        document.getElementById('dialog-msg').textContent = msg;
        const btns = document.getElementById('dialog-buttons');
        let html = '';
        if (showCancel) html += '<button class="dialog-btn dialog-btn-cancel" id="dialog-cancel">Cancel</button>';
        html += '<button class="dialog-btn dialog-btn-confirm" id="dialog-ok">OK</button>';
        btns.innerHTML = html;
        requestAnimationFrame(() => overlay.classList.add('active'));
        function close(val) { overlay.classList.remove('active'); resolve(val); }
        document.getElementById('dialog-ok').onclick = () => close(true);
        if (showCancel) document.getElementById('dialog-cancel').onclick = () => close(false);
        overlay.onclick = (e) => { if (e.target === overlay) close(false); };
      });
    }
    const customConfirm = (m) => customDialog(m, true);
    const customAlert = (m) => customDialog(m, false);

    /* ========== SCREEN ROUTER ========== */
    let activeScreen = 'home';
    let navigatingViaPopstate = false;
    const HIDE_TABS_ON = new Set(['workout', 'builder', 'finish', 'onboarding']);

    function showScreen(id) {
      document.querySelectorAll('.screen-wrap').forEach(s => s.classList.remove('active'));
      const target = document.getElementById('screen-' + id);
      if (!target) return;
      target.classList.add('active');
      activeScreen = id;

      // Tab bar visibility + active tab
      const tabBar = document.getElementById('app-tabs');
      if (HIDE_TABS_ON.has(id)) tabBar.classList.add('hidden');
      else tabBar.classList.remove('hidden');
      const tabMap = { home: 'home', history: 'history', workout: 'workout', progress: 'progress', menu: 'menu',
                       routines: 'menu', builder: 'menu', settings: 'menu', exercises: 'menu' };
      const tabId = tabMap[id];
      document.querySelectorAll('.app-tab').forEach(b => b.classList.toggle('on', b.dataset.tab === tabId));

      // Render on nav
      if (id === 'home') renderHome();
      else if (id === 'history') renderHistory();
      else if (id === 'progress') renderProgress();
      else if (id === 'menu') renderMenu();
      else if (id === 'routines') renderRoutines();
      else if (id === 'settings') renderSettings();
      else if (id === 'exercises') renderBestiary();
      else if (id === 'workout') renderWorkout();
      else if (id === 'builder') renderBuilder();
      else if (id === 'finish') renderFinish();
      else if (id === 'onboarding') renderOnboarding();

      if (id === 'workout' && currentSession) acquireWakeLock();
      if (id !== 'workout') releaseWakeLock();
      window.scrollTo(0, 0);

      if (!navigatingViaPopstate) {
        const cs = history.state;
        if (!cs || cs.screen !== id) history.pushState({ screen: id }, '', '');
      }
    }
    history.replaceState({ screen: 'home' }, '', '');

    function closeAnyOpenSheet() {
      const sheets = document.querySelectorAll('.sheet-overlay.active');
      if (sheets.length === 0) return false;
      sheets.forEach(el => el.classList.remove('active'));
      document.body.style.overflow = '';
      return true;
    }
    function closeAnyOpenDialog() {
      const d = document.querySelector('.dialog-overlay.active');
      if (!d) return false;
      d.classList.remove('active');
      return true;
    }
    window.addEventListener('popstate', async function(e) {
      if (closeAnyOpenSheet() || closeAnyOpenDialog()) {
        history.pushState({ screen: activeScreen }, '', '');
        return;
      }
      const target = (e.state && e.state.screen) || 'home';
      navigatingViaPopstate = true;
      showScreen(target);
      navigatingViaPopstate = false;
    });

    /* ========== VOLUME ========== */
    function calcSessionVolume(session) {
      return session.exercises.reduce((total, ex) =>
        total + ex.sets.reduce((sum, s) => {
          if (s.completed && s.weight && s.reps) return sum + Number(s.weight) * Number(s.reps);
          return sum;

      for (let i = appData.sessions.length - 1; i >= 0; i--) {

        if (ex) return ex;
      }
      return null;

    function getLastUsedWeight(name) {
      for (let i = appData.sessions.length - 1; i >= 0; i--) {
        const ex = appData.sessions[i].exercises.find(e => e.name === name);
        if (ex) { const set = ex.sets.find(s => s.weight !== '' && s.weight !== null && s.completed);
          if (set) return Number(set.weight); }

    /* ========== WEEKLY STREAK ========== */
    function calculateWeeklyStreak() {
      if (appData.sessions.length === 0) return 0;
      const now = new Date();
      const dayOfWeek = (now.getDay() + 6) % 7;
      const monday = new Date(now);
      monday.setDate(now.getDate() - dayOfWeek); monday.setHours(0,0,0,0);
      const sessionDates = new Set(appData.sessions.map(s => s.date));
      let streak = 0, weekStart = new Date(monday);
      while (true) {
        const weekEnd = new Date(weekStart); weekEnd.setDate(weekStart.getDate() + 6);
        let found = false;
        for (let d = new Date(weekStart); d <= weekEnd; d.setDate(d.getDate() + 1)) {
          if (sessionDates.has(d.toISOString().slice(0,10))) { found = true; break; }
        }
        if (found) { streak++; weekStart.setDate(weekStart.getDate() - 7); }
        else break;
      }
      return streak;
    }

      });
      const now = new Date();
      const isCurrentMonth = calYear === now.getFullYear() && calMonth === now.getMonth();
      const todayDate = now.getDate();
      const firstDay = new Date(calYear, calMonth, 1).getDay();
      const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
      const startOffset = (firstDay + 6) % 7;

      let head = '<div class="row-between" style="margin-bottom:14px"><span class="eyebrow">' + MONTHS[calMonth] + ' ' + calYear + '</span>' +

      let grid = '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">';
      for (let i = 0; i < startOffset; i++) grid += '<div></div>';
      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = prefix + '-' + String(day).padStart(2, '0');
        const isToday = isCurrentMonth && day === todayDate;
        const isFuture = calYear > now.getFullYear() || (calYear === now.getFullYear() && calMonth > now.getMonth()) ||

    async function startWorkoutById(routineId) {
      const routine = appData.routines.find(r => r.id === routineId);
      if (!routine) return;
      if (currentSession) {
        if (!await customConfirm('Discard current workout and start ' + routine.name + '?')) return;
        clearInterval(elapsedInterval); clearSessionBackup(); releaseWakeLock(); dismissRest();
      }
      currentSession = {
        id: Date.now(), startedAt: Date.now(),
        routineId: routine.id, routineName: routine.name,
        type: routine.id === 'default-a' ? 'A' : routine.id === 'default-b' ? 'B' : 'C',
        date: todayISO(), notes: '',
        originalExerciseNames: routine.exercises.map(e => e.name),
        exercises: routine.exercises.map(t => {
          const lastEx = findLastSessionWithExercise(t.name);
          let lastWeight = lastEx ? (lastEx.sets.find(s => s.weight !== '' && s.weight !== null) || {}).weight || '' : '';
          const step = getWeightStep(t.equipment, t.exerciseId);
          const po = getPOStep(t.equipment, t.exerciseId);
          let autoAdvanced = false, prevWeight = lastWeight;
          if (lastEx && lastWeight !== '' && po > 0) {
            const completedSets = lastEx.sets.filter(s => s.completed && s.weight !== '' && s.weight !== null);
            const allCompleted = lastEx.sets.every(s => s.completed);
            if (allCompleted && completedSets.length > 0) {
              const weights = completedSets.map(s => Number(s.weight));
              const maxW = Math.max(...weights);
              const allSameTopWeight = weights.every(w => w === maxW);
              const targetReps = parseInt(t.reps) || 0;
              const allMetReps = targetReps === 0 || completedSets.every(s => Number(s.reps) >= targetReps);
              if (allSameTopWeight && allMetReps) { lastWeight = +(maxW + po).toFixed(1); autoAdvanced = true; }
            }
          }
          const sets = [];
          for (let i = 0; i < t.sets; i++) {
            const lastReps = lastEx && lastEx.sets[i] && lastEx.sets[i].reps !== '' && lastEx.sets[i].reps !== null ? lastEx.sets[i].reps : t.reps;
            sets.push({ weight: lastWeight, reps: lastReps, completed: false });
          }
          return { name: t.name, exerciseId: t.exerciseId, equipment: t.equipment, targetSets: t.sets,
            targetReps: t.reps, step, sets, autoAdvanced, prevWeight };
        })
      };
      expandedExerciseId = currentSession.exercises[0] ? (currentSession.exercises[0].exerciseId || currentSession.exercises[0].name + '|0') : null;
      clearInterval(elapsedInterval);
      elapsedInterval = setInterval(() => {
        const el = document.getElementById('elapsed-display');
        if (el) el.textContent = formatTime(getElapsedSeconds());
      }, 1000);
      saveSessionBackup();
      showScreen('workout');
      acquireWakeLock();
      requestNotificationPermission();
    }

            <div class="hist-title">${escapeHtml(rName)} · ${formatDate(session.date)}</div>
            <div class="hist-meta">
              ${session.totalDuration ? formatTime(session.totalDuration) + ' · ' : ''}${setCount} SETS · ${formatVolume(vol)} ${unit.toUpperCase()}${prsHere.length?` <span class="pr">· ${prsHere.length} PR</span>`:''}
            </div>
          </div>
          <button class="hist-delete" onclick="event.stopPropagation();deleteSession('${session.id}')" title="Delete">${svg('trash', 16)}</button>
          <span class="hist-chev">${svg('chevDown', 16)}</span>

      </div>`;
    }

    function toggleHistItem(id) {
      historyExpandedId = historyExpandedId === String(id) ? null : String(id);
      renderHistory();
    }

    async function deleteSession(sessionId) {
      const idx = appData.sessions.findIndex(s => String(s.id) === String(sessionId));
      if (idx === -1) return;
      const s = appData.sessions[idx];
      const rName = s.routineName || ('Workout ' + (s.type || '?'));
      if (!await customConfirm('Delete "' + rName + '" from ' + formatDate(s.date) + '?')) return;
      appData.sessions.splice(idx, 1);
      rebuildAllPRs();
      saveData(appData);
      if (activeScreen === 'history') renderHistory();
      if (activeScreen === 'home') renderHome();
    }
    /* ========== ACTIVE WORKOUT ========== */
    let expandedExerciseId = null;
    const collapsedExercises = new Set();

    function exKey(ex, ei) { return (ex.exerciseId || ex.name) + '|' + ei; }

    function renderWorkout() {
      if (!currentSession) {
        // Empty state — offer to start
        document.getElementById('workout-sticky').innerHTML = '';
        document.getElementById('workout-body').innerHTML = `
          <div style="padding-top:4px">
            <div class="eyebrow" style="margin-bottom:10px">Train</div>
            <h1 class="screen-title">Workout.</h1>
          </div>
          <div class="empty-state">No active workout.<br>Start one from Today.</div>
          <button class="btn btn-primary btn-block" style="padding:16px;font-size:15px" onclick="showScreen('home')">Go to Today</button>`;
        return;
      }
      renderWorkoutHeader();
      renderWorkoutExercises();
    }

    function renderWorkoutHeader() {
      if (!currentSession) return;
      const ex = activeExerciseInfo();
      document.getElementById('workout-sticky').innerHTML = `
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
          <button class="icon-btn" onclick="showScreen('home')">${svg('chevLeft', 18)}</button>
          <div style="flex:1;min-width:0;display:flex;align-items:center;gap:16px">
            <div class="workout-name">${escapeHtml(currentSession.routineName || 'Workout')}</div>
            <div class="elapsed-row">
              <span class="elapsed-dot"></span>
              <span class="elapsed-time" id="elapsed-display">${formatTime(getElapsedSeconds())}</span>
            </div>
          </div>
          <button class="icon-btn" onclick="openNotesSheet()" title="Notes">${svg('note', 17)}</button>
          <button class="icon-btn" onclick="openAddExerciseSheet()" title="Add exercise">${svg('plus', 18)}</button>
          <button class="icon-btn icon-btn-accent" onclick="finishWorkout()" title="Finish">${svg('check', 18, 2.5)}</button>
        </div>
        <div id="rest-bar-slot"></div>`;
      renderRestBar();
    }

    function activeExerciseInfo() {
      if (!currentSession) return null;
      const ex = currentSession.exercises.find((e, i) => exKey(e, i) === expandedExerciseId);
      return ex || null;
    }

    function renderRestBar() {
      const slot = document.getElementById('rest-bar-slot');
      if (!slot) return;
      if (!isResting) { slot.innerHTML = ''; return; }
      const rem = getRestRemaining();
      const frac = rem / restDuration;
      const r = 22, c = 2 * Math.PI * r;
      slot.innerHTML = `
        <div class="rest-bar">
          <div class="rest-ring-wrap">
            <svg width="52" height="52" viewBox="0 0 52 52">
              <circle cx="26" cy="26" r="${r}" stroke="var(--surface-3)" stroke-width="3" fill="none"/>
              <circle cx="26" cy="26" r="${r}" stroke="var(--accent)" stroke-width="3" fill="none"
                stroke-dasharray="${c}" stroke-dashoffset="${c * (1 - frac)}"
                stroke-linecap="round" transform="rotate(-90 26 26)"
                style="transition:stroke-dashoffset 1s linear;filter:drop-shadow(0 0 6px var(--accent-soft))"/>
            </svg>
            <div class="rest-ring-time">${formatTime(rem)}</div>
          </div>
          <div style="flex:1;min-width:0">
            <div class="rest-label">Rest</div>
            <div class="rest-name">${escapeHtml(restExName)}</div>
          </div>
          <div class="rest-actions">
            <button class="icon-btn" onclick="adjustRest(30)"><span class="rest-add-label">+30</span></button>
            <button class="icon-btn" onclick="togglePauseRest()">${restPaused ? svg('play', 14) : svg('pause', 14)}</button>
            <button class="icon-btn" style="color:var(--accent)" onclick="dismissRest()">${svg('skip', 14)}</button>
          </div>

    }

    function updateRestRing() { renderRestBar(); }

    function renderWorkoutExercises() {
      if (!currentSession) return;
      const body = document.getElementById('workout-body');
      const unit = appData.settings.unit;
      let html = '';

      currentSession.exercises.forEach((ex, ei) => {
        const key = exKey(ex, ei);
        const sets = ex.sets;
        const doneCount = sets.filter(s => s.completed).length;
        const totalCount = sets.length;
        const isDone = doneCount === totalCount;
        const isExpanded = expandedExerciseId === key;
        const activeSetIdx = sets.findIndex(s => !s.completed);

        const libEx = ex.exerciseId ? LIBRARY_MAP[ex.exerciseId] : null;
        const muscle = libEx ? libEx.category : (ex.equipment || '');
        const lastEx = findLastSessionWithExercise(ex.name);
        const lastWeight = lastEx ? (lastEx.sets.find(s => s.weight !== '' && s.weight !== null) || {}).weight : '';

        html += `<div class="ex-card${isExpanded?' expanded':''}" id="exc-${ei}" data-ei="${ei}">
          <div class="ex-head" onclick="toggleExpanded('${key}')">
            <span class="ex-drag-handle" data-ei="${ei}" onclick="event.stopPropagation()">${svg('drag', 16)}</span>
            <span class="ex-index">${String(ei+1).padStart(2,'0')}</span>
            <div style="flex:1;min-width:0">
              <div class="ex-name">
                <span class="ex-name-text" onclick="event.stopPropagation();openExerciseHistory('${escapeHtml(ex.name)}')">${escapeHtml(ex.name)}</span>
                ${isDone ? svg('check', 14, 2.5).replace('stroke="currentColor"','stroke="var(--good)"') : ''}
              </div>
              <div class="ex-sub">${muscle.toUpperCase()}${lastWeight !== '' ? ' · LAST ' + lastWeight + unit : ''}</div>
            </div>
            <span class="ex-done-chip${doneCount>0?' has-done':''}">${doneCount}/${totalCount}</span>
          </div>`;

        if (isExpanded) {
          html += `<div class="ex-body">`;
          if (ex.equipment === 'barbell') {
            const nextSet = sets.find(s => !s.completed) || sets[0];
            const plateWeight = nextSet && nextSet.weight !== '' && nextSet.weight !== null ? Number(nextSet.weight) : 0;
            html += getPlateBreakdownHTML(plateWeight, unit);
          }
          html += `<div class="set-head-row">
            <div class="eyebrow num-col">#</div>
            <div class="eyebrow" style="text-align:center">Weight (${unit})</div>
            <div class="eyebrow reps-col">Reps</div>
            <div></div>
          </div>`;
          sets.forEach((s, si) => {
            const weightVal = s.weight !== '' && s.weight !== null ? s.weight : '';
            const repsVal = s.reps !== '' && s.reps !== null ? s.reps : '';
            const checkCls = 'set-check-btn' + (s.completed ? ' done' : '');
            const checkInner = s.completed ? svg('check', 14, 2.5) : '';
            const doneClass = s.completed ? ' done' : '';
            html += `<div class="set-row">
              <div class="set-num">${si+1}</div>
              <div class="weight-cell">
                <button class="w-adj" onclick="adjSetWeight(${ei},${si},-1)">−</button>
                <input class="set-input${doneClass}" id="wi-${ei}-${si}" type="number" inputmode="decimal"
                  value="${weightVal}" placeholder="—"
                  onfocus="this.select()"
                  onchange="updateSet(${ei},${si},'weight',this.value)"/>
                <button class="w-adj" onclick="adjSetWeight(${ei},${si},1)">+</button>
              </div>
              <input class="set-input${doneClass}" id="ri-${ei}-${si}" type="number" inputmode="numeric"
                value="${repsVal}" placeholder="—"
                onfocus="this.select()"
                onchange="updateSet(${ei},${si},'reps',this.value)"/>
              <button class="${checkCls}" onclick="toggleSet(${ei},${si})">${checkInner}</button>
            </div>`;
          });
          html += `<div class="ex-actions">
            <button class="add-set-btn" onclick="addSet(${ei})">+ Add set</button>
            <button class="icon-btn" style="width:36px;height:36px;border-radius:10px" onclick="openSwapSheet(${ei})" title="Swap">${svg('swap', 14)}</button>
            ${ex.sets.length > 1 ? `<button class="icon-btn" style="width:36px;height:36px;border-radius:10px" onclick="removeSet(${ei})" title="Remove set">${svg('minus', 14)}</button>` : ''}
          </div>`;
          const pr = appData.personalRecords[ex.name];
          if (pr) html += `<div class="ex-pr-strip">PR ${pr.maxWeight} ${unit.toUpperCase()} · ${pr.reps ? pr.reps + 'r' : ''}</div>`;
          html += `</div>`;
        }
        html += `</div>`;
      });

      html += `<button class="dashed-btn" onclick="openAddExerciseSheet()">${svg('plus', 16)} Add exercise</button>
        <div style="margin-top:8px">
          <button class="btn btn-primary btn-block" style="padding:16px;font-size:15px" onclick="finishWorkout()">Finish session</button>
          <button class="btn btn-ghost btn-block" style="margin-top:6px;font-size:13px;color:var(--ink-3)" onclick="discardWorkout()">Discard session</button>
        </div>`;

      body.innerHTML = html;
      initExerciseDragHandles();
    }

    let exDragState = null;
    function initExerciseDragHandles() {
      document.querySelectorAll('.ex-drag-handle').forEach(h => {
        h.addEventListener('touchstart', onExDragTouch, { passive: false });
        h.addEventListener('mousedown', onExDragMouse);
      });
    }
    function onExDragTouch(e) {
      e.preventDefault();
      const ei = parseInt(e.currentTarget.getAttribute('data-ei'));
      startExDrag(ei, e.touches[0].clientY);
      const mv = (ev) => { ev.preventDefault(); moveExDrag(ev.touches[0].clientY); };
      const en = () => { endExDrag(); document.removeEventListener('touchmove', mv); document.removeEventListener('touchend', en); };
      document.addEventListener('touchmove', mv, { passive: false });
      document.addEventListener('touchend', en);
    }
    function onExDragMouse(e) {
      e.preventDefault();
      const ei = parseInt(e.currentTarget.getAttribute('data-ei'));
      startExDrag(ei, e.clientY);
      const mv = (ev) => moveExDrag(ev.clientY);
      const en = () => { endExDrag(); document.removeEventListener('mousemove', mv); document.removeEventListener('mouseup', en); };
      document.addEventListener('mousemove', mv);
      document.addEventListener('mouseup', en);
    }
    function startExDrag(ei, startY) {
      const cards = document.querySelectorAll('.ex-card');
      const card = cards[ei]; if (!card) return;
      triggerHaptic('dragStart');
      const rects = Array.from(cards).map(c => c.getBoundingClientRect());
      exDragState = { ei, startY, card, rects };
      card.classList.add('dragging');
    }
    function moveExDrag(clientY) {
      if (!exDragState) return;
      const { ei, startY, card, rects } = exDragState;
      const delta = clientY - startY;
      card.style.transform = `translateY(${delta}px)`;
      const dragCenter = rects[ei].top + rects[ei].height / 2 + delta;
      let newIndex = ei;
      for (let i = 0; i < rects.length; i++) {
        if (i === ei) continue;
        const center = rects[i].top + rects[i].height / 2;
        if (ei < i && dragCenter > center) newIndex = i;
        if (ei > i && dragCenter < center && i < newIndex) newIndex = i;
      }
      const cards = document.querySelectorAll('.ex-card');
      cards.forEach((c, i) => {
        if (i === ei) return;
        if (ei < newIndex && i > ei && i <= newIndex) c.style.transform = `translateY(-${rects[ei].height + 16}px)`;
        else if (ei > newIndex && i < ei && i >= newIndex) c.style.transform = `translateY(${rects[ei].height + 16}px)`;
        else c.style.transform = '';
      });
      exDragState.targetIndex = newIndex;
    }
    function endExDrag() {
      if (!exDragState) return;
      const { ei, targetIndex } = exDragState;
      document.querySelectorAll('.ex-card').forEach(c => { c.style.transform = ''; c.classList.remove('dragging'); });
      if (targetIndex !== undefined && targetIndex !== ei) {
        const [moved] = currentSession.exercises.splice(ei, 1);
        currentSession.exercises.splice(targetIndex, 0, moved);
        saveSessionBackup();
        renderWorkoutExercises();
      }
      exDragState = null;
    }

    function toggleExpanded(key) {
      expandedExerciseId = expandedExerciseId === key ? null : key;
      renderWorkoutExercises();
    }

    function toggleSet(ei, si) {
      if (!currentSession) return;
      const set = currentSession.exercises[ei].sets[si];
      set.completed = !set.completed;
      if (set.completed) {
        const exName = currentSession.exercises[ei].name;
        const isPR = checkForNewPR(exName, set.weight);
        set.isPR = isPR;
        if (isPR) { triggerHaptic('pr'); launchConfetti(); }
        else triggerHaptic('setComplete');

        const allDone = currentSession.exercises.every(ex => ex.sets.every(s => s.completed));
        if (allDone) { dismissRest(); showAutoFinishToast(); }
        else {
          startRestTimer(ei);
          // Auto-advance expanded to next incomplete exercise
          const thisEx = currentSession.exercises[ei];
          if (thisEx.sets.every(s => s.completed)) {
            const nextIdx = currentSession.exercises.findIndex((e, i) => i !== ei && e.sets.some(s => !s.completed));
            if (nextIdx >= 0) setTimeout(() => {
              expandedExerciseId = exKey(currentSession.exercises[nextIdx], nextIdx);
              renderWorkoutExercises();
            }, 400);
          }
        }
      } else {
        set.isPR = false;
        triggerHaptic('setComplete');
      }
      saveSessionBackup();
      renderWorkoutExercises();
    }

    function addSet(ei) {
      if (!currentSession) return;
      const ex = currentSession.exercises[ei];
      const last = ex.sets[ex.sets.length - 1];
      ex.sets.push({ weight: last.weight, reps: '', completed: false });
      renderWorkoutExercises();
      saveSessionBackup();
    }

    function adjSetWeight(ei, si, direction) {
      if (!currentSession) return;
      const ex = currentSession.exercises[ei];
      const step = ex.step !== undefined && ex.step !== null ? ex.step : getWeightStep(ex.equipment, ex.exerciseId);
      const current = (ex.sets[si].weight !== '' && ex.sets[si].weight !== null) ? Number(ex.sets[si].weight) : 0;
      const newWeight = Math.max(0, +(current + direction * step).toFixed(2));
      ex.sets[si].weight = newWeight;
      const input = document.getElementById('wi-' + ei + '-' + si);
      if (input) input.value = newWeight;
      triggerHaptic('weightAdjust');
      // If first set, propagate to empty following sets
      if (si === 0) {
        for (let i = 1; i < ex.sets.length; i++) {
          if (ex.sets[i].weight === '' || ex.sets[i].weight === null) {
            ex.sets[i].weight = newWeight;
            const ip = document.getElementById('wi-' + ei + '-' + i);
            if (ip) ip.value = newWeight;
          }
        }
      }
      refreshPlateBreakdown(ei);
      saveSessionBackup();
    }

    function updateSet(ei, si, field, value) {
      if (!currentSession) return;
      const numVal = value === '' ? '' : Number(value);
      const ex = currentSession.exercises[ei];
      ex.sets[si][field] = numVal;
      if (field === 'weight' && si === 0 && numVal !== '') {
        for (let i = 1; i < ex.sets.length; i++) {
          if (ex.sets[i].weight === '' || ex.sets[i].weight === null) {
            ex.sets[i].weight = numVal;
            const ip = document.getElementById('wi-' + ei + '-' + i);
            if (ip) ip.value = numVal;
          }
        }
      }
      if (field === 'weight') refreshPlateBreakdown(ei);
      saveSessionBackup();
    }

    /* ========== EXERCISE HISTORY VIEW ========== */
    function getExerciseHistory(name, limit = 8) {
      const out = [];
      for (let i = appData.sessions.length - 1; i >= 0 && out.length < limit; i--) {
        const ex = appData.sessions[i].exercises.find(e => e.name === name);
        if (ex) out.push({ date: appData.sessions[i].date, sets: ex.sets });
      }
      return out;
    }

    function renderExerciseHistoryBody(name) {
      const unit = appData.settings.unit;
      const pr = appData.personalRecords[name];
      const est1rm = computeEstimated1RM(name);
      const libEx = EXERCISE_LIBRARY.find(e => e.name === name);
      const history = getExerciseHistory(name, 10);

      const statsHtml = (pr || est1rm) ? `
        <div style="display:grid;grid-template-columns:${pr && est1rm ? '1fr 1fr' : '1fr'};gap:8px;margin-bottom:14px">
          ${pr ? `<div class="card card-tight" style="padding:12px">
            <div class="eyebrow" style="font-size:9px;margin-bottom:4px">PR</div>
            <div class="mono" style="font-size:20px;font-weight:700;letter-spacing:-0.02em;color:var(--accent)">${pr.maxWeight}<span style="font-size:11px;color:var(--ink-3);margin-left:2px">${unit}</span></div>
            <div class="mono" style="font-size:10px;color:var(--ink-4);margin-top:2px">${pr.reps ? pr.reps + 'R · ' : ''}${pr.date ? formatDate(pr.date).toUpperCase() : ''}</div>
          </div>` : ''}
          ${est1rm ? `<div class="card card-tight" style="padding:12px">
            <div class="eyebrow" style="font-size:9px;margin-bottom:4px">EST. 1RM</div>
            <div class="mono" style="font-size:20px;font-weight:700;letter-spacing:-0.02em">${est1rm}<span style="font-size:11px;color:var(--ink-3);margin-left:2px">${unit}</span></div>
            <div class="mono" style="font-size:10px;color:var(--ink-4);margin-top:2px">EPLEY</div>
          </div>` : ''}
        </div>` : '';

      const subtitle = libEx ? `${libEx.category.toUpperCase()} · ${libEx.equipment.toUpperCase()}` : '';

      const histHtml = history.length === 0
        ? `<div class="empty-state" style="padding:24px">No prior sessions for this lift.</div>`
        : history.map(h => `
            <div style="padding:10px 0;border-bottom:1px solid var(--line)">
              <div class="mono" style="font-size:10px;color:var(--ink-3);letter-spacing:0.08em;margin-bottom:4px">${formatDate(h.date).toUpperCase()}</div>
              <div class="mono" style="font-size:12px;color:var(--ink-2);display:flex;gap:8px;flex-wrap:wrap">
                ${h.sets.map(s => {
                  const w = s.weight !== '' && s.weight !== null ? s.weight : '—';
                  const r = s.reps !== '' && s.reps !== null ? s.reps : '—';
                  const done = s.completed;
                  return `<span style="color:${done ? 'var(--ink)' : 'var(--ink-4)'}">${done ? '' : '◯ '}${w}×${r}</span>`;
                }).join('')}
              </div>
            </div>`).join('');

      return `
        <div class="row-between" style="margin-bottom:14px">
          <div style="min-width:0">
            <div class="eyebrow eyebrow-accent" style="margin-bottom:4px">Exercise</div>
            <div style="font-size:18px;font-weight:500;margin-bottom:2px">${escapeHtml(name)}</div>
            ${subtitle ? `<div class="mono" style="font-size:10px;color:var(--ink-3);letter-spacing:0.08em">${subtitle}</div>` : ''}
          </div>
          <button class="icon-btn" onclick="closeSheet('exhistory-overlay')" style="width:32px;height:32px">${svg('x', 14)}</button>
        </div>
        ${statsHtml}
        <div class="eyebrow" style="margin-bottom:6px">RECENT SESSIONS</div>
        ${histHtml}`;
    }

    function openExerciseHistory(name) {
      document.getElementById('exhistory-sheet').innerHTML = renderExerciseHistoryBody(name);
      openSheet('exhistory-overlay');
    }

    function openExerciseHistoryFromEdit(name) {
      closeSheet('exedit-overlay');
      setTimeout(() => openExerciseHistory(name), 180);
    }

    function refreshPlateBreakdown(ei) {
      if (!currentSession) return;
      const ex = currentSession.exercises[ei];
      if (ex.equipment !== 'barbell') return;
      const card = document.getElementById('exc-' + ei);
      if (!card) return;
      const unit = appData.settings.unit;
      const nextSet = ex.sets.find(s => !s.completed) || ex.sets[0];
      const plateWeight = nextSet && nextSet.weight !== '' && nextSet.weight !== null ? Number(nextSet.weight) : 0;
      const existing = card.querySelector('.plate-breakdown');
      const newHTML = getPlateBreakdownHTML(plateWeight, unit);
      if (existing) {
        if (newHTML) existing.outerHTML = newHTML;
        else existing.remove();
      } else if (newHTML) {
        const exBody = card.querySelector('.ex-body');
        if (exBody) exBody.insertAdjacentHTML('afterbegin', newHTML);
      }
    }

    async function removeSet(ei) {
      if (!currentSession) return;
      const ex = currentSession.exercises[ei];
      if (ex.sets.length <= 1) return;
      if (!await customConfirm('Remove last set?')) return;
      ex.sets.pop();
      renderWorkoutExercises();
      saveSessionBackup();
    }

    function showAutoFinishToast() {
      // Quiet: just auto-collapse and nudge user toward finish button
      triggerHaptic('workoutFinished');
    }

    async function discardWorkout() {
      if (!currentSession) return;
      if (!await customConfirm('Discard this workout? All progress will be lost.')) return;
      clearInterval(elapsedInterval); clearSessionBackup(); releaseWakeLock(); dismissRest();
      currentSession = null;
      showScreen('home');
    }

    async function finishWorkout() {
      if (!currentSession) return;
      const anyDone = currentSession.exercises.some(ex => ex.sets.some(s => s.completed));
      if (!anyDone) { discardWorkout(); return; }
      const allDone = currentSession.exercises.every(ex => ex.sets.every(s => s.completed));
      if (!allDone) {
        if (!await customConfirm('Finish workout with incomplete sets? Progress will still be saved.')) return;
      }
      clearInterval(elapsedInterval); clearSessionBackup(); releaseWakeLock();
      currentSession.totalDuration = getElapsedSeconds();
      currentSession.totalVolume = calcSessionVolume(currentSession);
      dismissRest();
      currentSession.exercises.forEach(ex => {
        ex.sets = ex.sets.filter(s => s.completed || s.weight !== '' || s.reps !== '');
      });
      appData.sessions.push(currentSession);
      rebuildAllPRs();
      saveData(appData);
      triggerHaptic('workoutFinished');
      launchConfetti();

      if (checkIfRoutineModified()) {
        setTimeout(() => openSaveRoutineSheet(), 300);
      } else {
        finishedSessionMemo = currentSession;
        currentSession = null;
        showScreen('finish');
      }
    }

    function checkIfRoutineModified() {
      if (!currentSession || !currentSession.originalExerciseNames) return false;
      const cur = currentSession.exercises.map(e => e.name);
      const orig = currentSession.originalExerciseNames;
      if (cur.length !== orig.length) return true;
      return cur.some((name, i) => name !== orig[i]);
    }

    let finishedSessionMemo = null;

    /* ========== REST TIMER ========== */
    let restPaused = false;
    function startRestTimer(ei) {
      clearInterval(restInterval);
      let restTime = appData.settings.defaultRestTime;
      restExName = 'REST';
      if (ei !== undefined && currentSession && currentSession.exercises[ei]) {
        const ex = currentSession.exercises[ei];
        restExName = ex.name;
        const libEx = LIBRARY_MAP[ex.exerciseId];
        if (libEx && libEx.defaultRest) restTime = libEx.defaultRest;
      }
      restStartedAt = Date.now();
      restDuration = restTime;
      isResting = true; restPaused = false;
      if (currentSession) {
        currentSession.restStartedAt = restStartedAt;
        currentSession.restDuration = restDuration;
        currentSession.restExName = restExName;
        saveSessionBackup();
      }
      restInterval = setInterval(() => {
        if (restPaused) return;
        const rem = getRestRemaining();
        if (rem <= 0) { clearInterval(restInterval); restFinished(); }
        if (activeScreen === 'workout') renderRestBar();
      }, 1000);
      if (activeScreen === 'workout') renderRestBar();
    }

    function adjustRest(delta) {
      if (!isResting) return;
      restStartedAt += delta * 1000;
      if (currentSession) { currentSession.restStartedAt = restStartedAt; saveSessionBackup(); }
      renderRestBar();
    }

    function togglePauseRest() {
      if (!isResting) return;
      if (restPaused) {
        // Resume: shift start to account for paused duration
        restStartedAt += (Date.now() - restPauseStart);
        if (currentSession) currentSession.restStartedAt = restStartedAt;
        restPaused = false;
      } else {
        restPauseStart = Date.now();
        restPaused = true;
      }
      saveSessionBackup();
      renderRestBar();
    }
    let restPauseStart = 0;

    /* ========== NUMPAD SHEET ========== */
    let numpadPayload = null;
    let numpadFocus = 'weight'; // 'weight' or 'reps'
    let numpadW = 0, numpadR = 0, numpadWStr = '', numpadRStr = '';

    function openNumpadFor(ei, si) {
      if (!currentSession) return;
      const ex = currentSession.exercises[ei];
      const set = ex.sets[si];
      numpadPayload = { ei, si };
      numpadW = set.weight !== '' && set.weight !== null ? Number(set.weight) : 0;
      numpadR = set.reps !== '' && set.reps !== null ? Number(set.reps) : 0;
      numpadWStr = String(numpadW || '');
      numpadRStr = String(numpadR || '');
      numpadFocus = 'weight';
      renderNumpad();
      openSheet('numpad-overlay');
    }

    function renderNumpad() {
      if (!numpadPayload) return;
      const { ei, si } = numpadPayload;
      const ex = currentSession.exercises[ei];
      const set = ex.sets[si];
      const unit = appData.settings.unit;
      const lastEx = findLastSessionWithExercise(ex.name);
      const lastStr = lastEx ? (lastEx.sets.find(s => s.weight !== '' && s.weight !== null) || {}).weight : '';
      const pr = appData.personalRecords[ex.name];
      const isPR = pr && numpadW > pr.maxWeight;

      document.getElementById('numpad-sheet').innerHTML = `
        <div class="sheet-grab"></div>
        <div class="row-between" style="margin-bottom:18px">
          <div style="min-width:0">
            <div class="eyebrow eyebrow-accent" style="margin-bottom:4px">Set ${si+1} · ${escapeHtml(ex.name)}</div>
            <div class="mono" style="font-size:11px;color:var(--ink-3)">${lastStr !== '' ? 'LAST · ' + lastStr + unit : 'NO PRIOR DATA'}</div>
          </div>
          ${isPR ? `<div class="pill pill-accent">${svg('trophy', 11)} NEW PR</div>` : ''}
        </div>
        <div class="num-tiles">
          <div class="num-tile${numpadFocus==='weight'?' on':''}" onclick="numpadSetFocus('weight')">
            <div class="num-tile-label">WEIGHT (${unit.toUpperCase()})</div>
            <div class="num-tile-val">${numpadW}</div>
          </div>
          <div class="num-tile${numpadFocus==='reps'?' on':''}" onclick="numpadSetFocus('reps')">
            <div class="num-tile-label">REPS</div>
            <div class="num-tile-val">${numpadR || 0}</div>
          </div>
        </div>
        <div class="quick-adj-row">
          ${[-5,-2.5,-1.25,1.25,2.5,5].map(d => `<button class="quick-adj-btn" onclick="numpadAdjust(${d})">${d>0?'+':''}${d}</button>`).join('')}
        </div>
        <div class="numpad-grid">
          ${['1','2','3','4','5','6','7','8','9','.','0','⌫'].map(k => `<button class="numpad-key" onclick="numpadPress('${k}')">${k}</button>`).join('')}
        </div>
        <button class="btn btn-primary btn-block" style="padding:16px;font-size:15px" onclick="numpadCommit()">${svg('check', 16, 2.5)} Complete set · start rest</button>
      `;
    }

    function numpadSetFocus(f) { numpadFocus = f; renderNumpad(); }

    function numpadAdjust(d) {
      numpadW = Math.max(0, Math.round((Number(numpadW) + d) * 100) / 100);
      numpadWStr = String(numpadW);
      triggerHaptic('weightAdjust');
      renderNumpad();
    }

    function numpadPress(k) {
      if (numpadFocus === 'weight') {
        if (k === '⌫') {
          numpadWStr = numpadWStr.slice(0, -1);
          numpadW = Number(numpadWStr) || 0;
        } else if (k === '.') {
          if (!numpadWStr.includes('.')) numpadWStr = (numpadWStr || '0') + '.';
        } else {
          numpadWStr = numpadWStr === '0' ? k : numpadWStr + k;
          numpadW = Number(numpadWStr) || 0;
        }
      } else {
        if (k === '⌫') {
          numpadRStr = numpadRStr.slice(0, -1);
          numpadR = Number(numpadRStr) || 0;
        } else if (k === '.') {
          // noop
        } else {
          numpadRStr = numpadRStr === '0' ? k : numpadRStr + k;
          numpadR = Number(numpadRStr) || 0;
        }
      }
      renderNumpad();
    }

    function numpadCommit() {
      if (!numpadPayload || !currentSession) return;
      const { ei, si } = numpadPayload;
      const set = currentSession.exercises[ei].sets[si];
      set.weight = numpadW;
      set.reps = numpadR;
      // Propagate weight to subsequent empty sets if this is set 0
      if (si === 0) {
        const ex = currentSession.exercises[ei];
        for (let i = 1; i < ex.sets.length; i++) {
          if (ex.sets[i].weight === '' || ex.sets[i].weight === null) ex.sets[i].weight = numpadW;
        }
      }
      // Mark completed + start rest
      if (!set.completed) {
        set.completed = true;
        const exName = currentSession.exercises[ei].name;
        const isPR = checkForNewPR(exName, set.weight);
        set.isPR = isPR;
        if (isPR) { triggerHaptic('pr'); launchConfetti(); }
        else triggerHaptic('setComplete');

        const allDone = currentSession.exercises.every(ex => ex.sets.every(s => s.completed));
        if (allDone) { dismissRest(); showAutoFinishToast(); }
        else {
          startRestTimer(ei);
          const thisEx = currentSession.exercises[ei];
          if (thisEx.sets.every(s => s.completed)) {
            const nextIdx = currentSession.exercises.findIndex((e, i) => i !== ei && e.sets.some(s => !s.completed));
            if (nextIdx >= 0) expandedExerciseId = exKey(currentSession.exercises[nextIdx], nextIdx);
          }
        }
      }
      saveSessionBackup();
      closeSheet('numpad-overlay');
      renderWorkoutExercises();
    }

    function executeSwap(libraryId) {
      if (!currentSession) return;
      const libEx = LIBRARY_MAP[libraryId];
      if (!libEx) return;
      const step = getWeightStep(libEx.equipment, libEx.id);
      const lastEx = findLastSessionWithExercise(libEx.name);
      const lastWeight = lastEx ? (lastEx.sets.find(s => s.weight !== '' && s.weight !== null) || {}).weight || '' : '';
      const setCount = (swapMode === 'swap' && swapExerciseIndex !== null)
        ? currentSession.exercises[swapExerciseIndex].sets.length : libEx.defaultSets;
      const sets = [];
      for (let i = 0; i < setCount; i++) {
        const lastReps = lastEx && lastEx.sets[i] && lastEx.sets[i].reps !== '' && lastEx.sets[i].reps !== null ? lastEx.sets[i].reps : '';
        sets.push({ weight: lastWeight, reps: lastReps, completed: false });
      }
      const newEx = { name: libEx.name, exerciseId: libEx.id, equipment: libEx.equipment,
        targetSets: libEx.defaultSets, targetReps: libEx.defaultReps, step, sets };
      if (swapMode === 'add') { currentSession.exercises.push(newEx); }
      else { currentSession.exercises[swapExerciseIndex] = newEx; }
      expandedExerciseId = exKey(newEx, swapMode === 'add' ? currentSession.exercises.length - 1 : swapExerciseIndex);
      closeSheet('swap-overlay');
      triggerHaptic('setComplete');
      saveSessionBackup();
      renderWorkoutExercises();

    /* ========== PROGRESS ========== */
    let progressSelectedIdx = 0;
    let progressView = 'weight'; // weight | volume | 1rm

    function getExerciseProgressData(exerciseName) {
      const data = [];
      appData.sessions.forEach(s => {
        const ex = s.exercises.find(e => e.name === exerciseName);
        if (!ex) return;
        let maxW = 0, totalVolume = 0, best1RM = 0, completed = 0;
        ex.sets.forEach(set => {
          if (set.completed && set.weight !== '' && set.weight !== null) {
            const w = Number(set.weight), r = Number(set.reps) || 0;
            maxW = Math.max(maxW, w); totalVolume += w * r; completed++;
            if (w > 0 && r > 0) { const e = w * (1 + r / 30); if (e > best1RM) best1RM = e; }
          }
        });
        if (maxW > 0) data.push({ date: s.date, weight: maxW, volume: totalVolume, est1rm: Math.round(best1RM), sets: completed });
      });
      return data;
    }

    function fmtChartVal(v, field) {
      if (field === 'volume') {
        if (v >= 1000) return (v / 1000).toFixed(1) + 'k';
        return String(Math.round(v));
      }
      const n = +Number(v).toFixed(1);
      return n % 1 === 0 ? String(n) : n.toFixed(1);
    }

    let chartState = null;
    function svgChart(points, field) {
      const filtered = points.filter(p => p[field] > 0);
      if (filtered.length === 0) { chartState = null; return `<div class="empty-state" style="padding:20px">No data for this view.</div>`; }
      const vals = filtered.map(p => p[field]);
      const w = 360, h = 180;
      const padL = 42, padR = 14, padT = 16, padB = 26;
      const minV = Math.min(...vals), maxV = Math.max(...vals);
      const margin = (maxV - minV) * 0.12 || Math.max(1, maxV * 0.05);
      const yMin = minV - margin, yMax = maxV + margin;
      const span = yMax - yMin || 1;
      const xfn = i => padL + (i / Math.max(1, vals.length - 1)) * (w - padL - padR);
      const yfn = v => padT + (h - padT - padB) * (1 - (v - yMin) / span);
      const path = vals.map((v, i) => `${i === 0 ? 'M' : 'L'} ${xfn(i).toFixed(1)} ${yfn(v).toFixed(1)}`).join(' ');
      const area = path + ` L ${xfn(vals.length - 1).toFixed(1)} ${(h - padB).toFixed(1)} L ${xfn(0).toFixed(1)} ${(h - padB).toFixed(1)} Z`;

      // Y-axis ticks (3 rows: top, middle, bottom)
      const yTicks = [1, 0.5, 0].map(t => {
        const val = yMin + span * t;
        const y = padT + (h - padT - padB) * (1 - t);
        return `<line x1="${padL}" x2="${w-padR}" y1="${y}" y2="${y}" stroke="var(--line)" stroke-width="0.5"/>
          <text x="${padL - 6}" y="${y + 3.5}" text-anchor="end" fill="var(--ink-4)" font-family="Geist Mono, monospace" font-size="9">${fmtChartVal(val, field)}</text>`;
      }).join('');

      // X-axis ticks — first, middle, last (MM-DD)
      const xIdxs = vals.length <= 2 ? [0, vals.length - 1] : [0, Math.floor(vals.length / 2), vals.length - 1];
      const xTicks = [...new Set(xIdxs)].map(i => {
        const d = filtered[i].date.slice(5).replace('-', '/');
        return `<text x="${xfn(i).toFixed(1)}" y="${h - 8}" text-anchor="middle" fill="var(--ink-4)" font-family="Geist Mono, monospace" font-size="9">${d}</text>`;
      }).join('');

      // Dots on every point
      const dots = vals.map((v, i) => {
        if (i === vals.length - 1) return '';
        return `<circle cx="${xfn(i).toFixed(1)}" cy="${yfn(v).toFixed(1)}" r="2.5" fill="var(--accent)" opacity="0.7"/>`;
      }).join('');

      // Last point + floating label
      const last = vals[vals.length - 1];
      const lastX = xfn(vals.length - 1), lastY = yfn(last);
      const lastTxt = fmtChartVal(last, field);
      const lblY = lastY > padT + 18 ? lastY - 12 : lastY + 20;
      const lblAnchor = lastX > w - padR - 28 ? 'end' : 'middle';
      const lblX = lastX > w - padR - 28 ? lastX - 4 : lastX;

      // Save state for scrubber interactions
      chartState = { filtered, field, w, h, padL, padR, padT, padB, yMin, span };

      return `<svg id="prog-chart" viewBox="0 0 ${w} ${h}" width="100%" height="${h}" style="display:block;margin-top:10px;overflow:visible;touch-action:none">
        <defs>
          <linearGradient id="chart-grad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.18"/>
            <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
          </linearGradient>
        </defs>
        ${yTicks}
        <g id="chart-base">
          <path d="${area}" fill="url(#chart-grad)"/>
          <path d="${path}" stroke="var(--accent)" stroke-width="1.75" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          ${dots}
          <circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="6" fill="var(--accent)" opacity="0.2"/>
          <circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="3.5" fill="var(--accent)"/>
          <text id="chart-last-label" x="${lblX.toFixed(1)}" y="${lblY.toFixed(1)}" text-anchor="${lblAnchor}" fill="var(--accent)" font-family="Geist Mono, monospace" font-size="11" font-weight="600">${lastTxt}</text>
          ${xTicks}
        </g>
        <g id="chart-scrubber"></g>
      </svg>`;
    }

    function chartXfn(i) {
      const { padL, padR, w, filtered } = chartState;
      return padL + (i / Math.max(1, filtered.length - 1)) * (w - padL - padR);
    }
    function chartYfn(v) {
      const { padT, padB, h, yMin, span } = chartState;
      return padT + (h - padT - padB) * (1 - (v - yMin) / span);
    }

    function chartScrub(clientX) {
      if (!chartState) return;
      const svg = document.getElementById('prog-chart');
      const scrub = document.getElementById('chart-scrubber');
      const lastLabel = document.getElementById('chart-last-label');
      if (!svg || !scrub) return;
      const rect = svg.getBoundingClientRect();
      const { filtered, field, w, h, padL, padR, padT, padB } = chartState;
      const vbX = ((clientX - rect.left) / rect.width) * w;
      let nearest = 0, bestD = Infinity;
      filtered.forEach((p, i) => {
        const d = Math.abs(chartXfn(i) - vbX);
        if (d < bestD) { bestD = d; nearest = i; }
      });
      const p = filtered[nearest];
      const cx = chartXfn(nearest), cy = chartYfn(p[field]);
      const dateStr = p.date.slice(5).replace('-', '/');
      const valStr = fmtChartVal(p[field], field);
      const tipText = `${valStr} · ${dateStr}`;
      const tipW = Math.max(78, tipText.length * 6.2 + 14);
      const tipX = Math.max(padL - 4, Math.min(w - padR - tipW, cx - tipW / 2));
      const tipY = Math.max(2, cy - 28);
      if (lastLabel) lastLabel.setAttribute('opacity', '0');
      scrub.innerHTML = `
        <line x1="${cx.toFixed(1)}" x2="${cx.toFixed(1)}" y1="${padT}" y2="${h - padB}" stroke="var(--accent)" stroke-width="0.75" stroke-dasharray="2,3" opacity="0.6"/>
        <circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="6" fill="var(--accent)" opacity="0.25"/>
        <circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="3.5" fill="var(--accent)"/>
        <rect x="${tipX.toFixed(1)}" y="${tipY.toFixed(1)}" width="${tipW}" height="20" rx="5" fill="var(--surface)" stroke="var(--accent-line)" stroke-width="0.75"/>
        <text x="${(tipX + tipW / 2).toFixed(1)}" y="${(tipY + 13).toFixed(1)}" text-anchor="middle" fill="var(--accent)" font-family="Geist Mono, monospace" font-size="11" font-weight="600">${tipText}</text>
      `;
    }
    function chartScrubClear() {
      const scrub = document.getElementById('chart-scrubber');
      const lastLabel = document.getElementById('chart-last-label');
      if (scrub) scrub.innerHTML = '';
      if (lastLabel) lastLabel.setAttribute('opacity', '1');
    }

    function wireChart() {
      const svg = document.getElementById('prog-chart');
      if (!svg || !chartState) return;
      let scrubbing = false;
      svg.addEventListener('touchstart', (e) => {
        if (!e.touches[0]) return;
        scrubbing = true;
        chartScrub(e.touches[0].clientX);
      }, { passive: true });
      svg.addEventListener('touchmove', (e) => {
        if (!e.touches[0]) return;
        e.preventDefault();
        chartScrub(e.touches[0].clientX);
      }, { passive: false });
      svg.addEventListener('touchend', () => { scrubbing = false; chartScrubClear(); });
      svg.addEventListener('mousedown', (e) => { scrubbing = true; chartScrub(e.clientX); });
      svg.addEventListener('mousemove', (e) => { if (scrubbing) chartScrub(e.clientX); });
      const endDrag = () => { scrubbing = false; chartScrubClear(); };
      svg.addEventListener('mouseup', endDrag);
      svg.addEventListener('mouseleave', endDrag);
    }

    function miniChart(points, field) {
      const vals = points.map(p => p[field]).filter(v => v > 0);
      if (vals.length < 2) return `<svg width="60" height="24"></svg>`;
      const w = 60, h = 24;
      const min = Math.min(...vals), max = Math.max(...vals);
      const xfn = i => (i / Math.max(1, vals.length - 1)) * w;
      const yfn = v => h - 2 - ((v - min) / (max - min || 1)) * (h - 4);
      const path = vals.map((v, i) => `${i === 0 ? 'M' : 'L'} ${xfn(i)} ${yfn(v)}`).join(' ');
      return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
        <path d="${path}" stroke="var(--ink-2)" stroke-width="1.25" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`;
    }

    function renderProgress() {
      const el = document.getElementById('progress-screen');

      allNames.forEach(n => { if (!names.includes(n)) names.push(n); });
      if (progressSelectedIdx >= names.length) progressSelectedIdx = 0;

      const delta = latest - first;
      const deltaTxt = delta > 0 ? `+${delta.toFixed(1)}` : delta < 0 ? delta.toFixed(1) : '0';
      const avgTop = vals.length ? (vals.reduce((a,b)=>a+b,0) / vals.length).toFixed(1) : '—';
      const sessions = data.length;

      const listHtml = names.map((name, i) => {
        const d = getExerciseProgressData(name);
        const pr2 = appData.personalRecords[name];
        const latestW = d.length ? d[d.length - 1].weight : 0;
        const firstW = d.length ? d[0].weight : 0;

        const deltaText = delta2 > 0 ? `+${delta2} ${unit}` : delta2 < 0 ? `${delta2} ${unit}` : 'flat';

          ${miniChart(d, 'weight')}
          <div class="mono" onclick="progressSelect(${i})" style="font-size:13px;color:var(--accent);font-weight:600">${pr2 ? pr2.maxWeight : latestW}<span style="font-size:9px;color:var(--ink-4);margin-left:2px">${unit.toUpperCase()}</span></div>
        </div>`;
      }).join('');

      el.innerHTML = `
        <div style="padding-top:4px">
          <div class="eyebrow" style="margin-bottom:10px">${appData.sessions.length} sessions tracked</div>
          <h1 class="screen-title">Progress.</h1>
        </div>
        <div class="card prog-hero" style="padding:20px">
          <div class="row-between" style="margin-bottom:4px">
            <div style="min-width:0">
              <div class="serif" style="font-size:22px">${escapeHtml(sel)}</div>
              <div class="mono" style="font-size:11px;color:var(--ink-3);margin-top:3px">${deltaTxt} ${unit.toUpperCase()} over ${sessions} sessions</div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div class="mono" style="font-size:26px;font-weight:700;color:var(--accent);letter-spacing:-0.02em;line-height:1">${pr ? pr.maxWeight : latest}</div>
              <div class="mono" style="font-size:10px;color:var(--ink-3);margin-top:3px;letter-spacing:0.08em">${unit.toUpperCase()} · PR</div>
            </div>
          </div>
          ${svgChart(data, field)}
          <div class="prog-view-tabs">
            ${['weight','volume','1rm'].map(v => `<button class="${v===progressView?'on':''}" onclick="progressSetView('${v}')">${v === '1rm' ? 'Est. 1RM' : v}</button>`).join('')}
          </div>
        </div>
        <div class="stat-grid">
          <div class="stat-cell">
            <div class="eyebrow" style="font-size:9px;margin-bottom:6px">TOP SET</div>
            <div class="stat-cell-val">${pr ? pr.maxWeight : '—'} ${unit}</div>
            <div class="stat-cell-sub">${pr && pr.reps ? '× ' + pr.reps + ' reps' : ''}</div>
          </div>
          <div class="stat-cell">
            <div class="eyebrow" style="font-size:9px;margin-bottom:6px">AVG ${progressView.toUpperCase()}</div>
            <div class="stat-cell-val">${avgTop} ${progressView === 'volume' ? '' : unit}</div>
            <div class="stat-cell-sub">last ${vals.length}</div>
          </div>
          <div class="stat-cell">
            <div class="eyebrow" style="font-size:9px;margin-bottom:6px">SESSIONS</div>
            <div class="stat-cell-val">${sessions}</div>
            <div class="stat-cell-sub">this lift</div>
          </div>
          <div class="stat-cell">
            <div class="eyebrow" style="font-size:9px;margin-bottom:6px">EST. 1RM</div>
            <div class="stat-cell-val">${est1RM ? est1RM + ' ' + unit : '—'}</div>
            <div class="stat-cell-sub">Epley</div>
          </div>
        </div>
        <div>
          <div class="eyebrow" style="margin-bottom:10px;padding:0 2px">ALL EXERCISES</div>
          <div class="card" style="padding:0;overflow:hidden" id="progress-ex-list">${listHtml}</div>
        </div>`;
      wireChart();
      initProgressDragHandles(names);
    }

    let progressDragState = null;
    function initProgressDragHandles(names) {
      document.querySelectorAll('.ex-list-drag').forEach(h => {
        h.addEventListener('touchstart', (e) => onProgressDragStart(e, names, 'touch'), { passive: false });
        h.addEventListener('mousedown', (e) => onProgressDragStart(e, names, 'mouse'));
      });
    }
    function onProgressDragStart(e, names, kind) {
      e.preventDefault();
      const pi = parseInt(e.currentTarget.getAttribute('data-pi'));
      const clientY = kind === 'touch' ? e.touches[0].clientY : e.clientY;
      startProgressDrag(pi, clientY, names);
      if (kind === 'touch') {
        const mv = (ev) => { ev.preventDefault(); moveProgressDrag(ev.touches[0].clientY); };
        const en = () => { endProgressDrag(); document.removeEventListener('touchmove', mv); document.removeEventListener('touchend', en); };
        document.addEventListener('touchmove', mv, { passive: false });
        document.addEventListener('touchend', en);
      } else {
        const mv = (ev) => moveProgressDrag(ev.clientY);
        const en = () => { endProgressDrag(); document.removeEventListener('mousemove', mv); document.removeEventListener('mouseup', en); };
        document.addEventListener('mousemove', mv);
        document.addEventListener('mouseup', en);
      }
    }
    function startProgressDrag(pi, startY, names) {
      const rows = document.querySelectorAll('#progress-ex-list .ex-list-row');
      const card = rows[pi]; if (!card) return;
      triggerHaptic('dragStart');
      const rects = Array.from(rows).map(c => c.getBoundingClientRect());
      progressDragState = { pi, startY, card, rects, names: [...names] };
      card.classList.add('dragging');
    }
    function moveProgressDrag(clientY) {
      if (!progressDragState) return;
      const { pi, startY, card, rects } = progressDragState;
      const delta = clientY - startY;
      card.style.transform = `translateY(${delta}px)`;
      const dragCenter = rects[pi].top + rects[pi].height / 2 + delta;
      let newIndex = pi;
      for (let i = 0; i < rects.length; i++) {
        if (i === pi) continue;
        const center = rects[i].top + rects[i].height / 2;
        if (pi < i && dragCenter > center) newIndex = i;
        if (pi > i && dragCenter < center && i < newIndex) newIndex = i;
      }
      const rows = document.querySelectorAll('#progress-ex-list .ex-list-row');
      rows.forEach((c, i) => {
        if (i === pi) return;
        if (pi < newIndex && i > pi && i <= newIndex) c.style.transform = `translateY(-${rects[pi].height}px)`;
        else if (pi > newIndex && i < pi && i >= newIndex) c.style.transform = `translateY(${rects[pi].height}px)`;
        else c.style.transform = '';
      });
      progressDragState.targetIndex = newIndex;
    }
    function endProgressDrag() {
      if (!progressDragState) return;
      const { pi, targetIndex, names } = progressDragState;
      document.querySelectorAll('#progress-ex-list .ex-list-row').forEach(c => { c.style.transform = ''; c.classList.remove('dragging'); });
      if (targetIndex !== undefined && targetIndex !== pi) {
        const [moved] = names.splice(pi, 1);
        names.splice(targetIndex, 0, moved);
        appData.settings.chartOrder = names;
        saveData(appData);
        // Keep selected exercise pinned to its new index
        if (progressSelectedIdx === pi) progressSelectedIdx = targetIndex;
        else if (pi < progressSelectedIdx && targetIndex >= progressSelectedIdx) progressSelectedIdx--;
        else if (pi > progressSelectedIdx && targetIndex <= progressSelectedIdx) progressSelectedIdx++;
        renderProgress();
      }
      progressDragState = null;
    }
    function progressSelect(i) { progressSelectedIdx = i; renderProgress(); }
    function progressSetView(v) { progressView = v; renderProgress(); }

    /* ========== ROUTINES ========== */
    function renderRoutines() {
      const el = document.getElementById('routines-screen');
      el.innerHTML = `
        <div style="padding-top:4px">
          <div class="row-between">

        </div>
        <div class="v-stack" style="gap:10px">
          ${appData.routines.map((r, i) => {
            const dot = r.id === 'default-b' ? 'badge-dot-b' : 'badge-dot-a';
            return `<div class="routine-card">
              <div class="row-between" style="margin-bottom:14px">

              </div>
              <div class="serif" style="font-size:24px;margin-bottom:4px">${escapeHtml(r.name)}</div>
              <div class="v-stack" style="gap:6px;margin-bottom:14px;margin-top:10px">
                ${r.exercises.slice(0, 4).map((ex, j) => `
                  <div class="routine-exercise-peek">
                    <span class="mono" style="font-size:10px;color:var(--ink-4);width:18px">${String(j+1).padStart(2,'0')}</span>
                    <span style="flex:1;font-size:13px">${escapeHtml(ex.name)}</span>
                    <span class="mono" style="font-size:11px;color:var(--ink-3)">${ex.sets}×${ex.reps}</span>
                  </div>`).join('')}
                ${r.exercises.length > 4 ? `<div class="mono" style="font-size:10px;color:var(--ink-4);padding-left:28px">+${r.exercises.length - 4} more</div>` : ''}
              </div>
              <div style="display:flex;gap:6px">
                <button class="btn btn-block" style="padding:12px 16px;font-size:13px;flex:1" onclick="editRoutine('${r.id}')">Edit</button>
                <button class="btn btn-primary btn-block" style="padding:12px 16px;font-size:13px;flex:1" onclick="startWorkoutById('${r.id}')">Start</button>
              </div>
            </div>`;
          }).join('')}
        </div>
        <button class="dashed-btn" onclick="openBuilder()">${svg('plus', 16)} New routine</button>`;
    }
    async function confirmDeleteRoutine(id) {
      const r = appData.routines.find(x => x.id === id);
      if (!r) return;
      if (!await customConfirm('Delete routine "' + r.name + '"?')) return;
      appData.routines = appData.routines.filter(x => x.id !== id);

    /* ========== BUILDER ========== */
    let builderExercises = [];
    let builderName = '';
    let builderEditingId = null;
    let builderCat = 'All', builderEquip = 'All', builderQuery = '';

    function openBuilder() {
      builderEditingId = null; builderExercises = []; builderName = '';
      showScreen('builder');
    }
    function editRoutine(routineId) {
      const r = appData.routines.find(x => x.id === routineId);
      if (!r) return;
      builderEditingId = routineId; builderName = r.name;
      builderExercises = r.exercises.map(ex => ({
        exerciseId: ex.exerciseId, name: ex.name, equipment: ex.equipment,
        sets: ex.sets, reps: String(ex.reps)
      }));
      showScreen('builder');
    }

    function renderBuilder() {
      const el = document.getElementById('builder-screen');
      el.innerHTML = `
        <div style="padding-top:4px">
          <div class="row-between">
            <button class="icon-btn" onclick="showScreen('routines')">${svg('chevLeft', 18)}</button>
            <span class="eyebrow">${builderEditingId ? 'EDITING' : 'NEW ROUTINE'}</span>
            <button class="icon-btn icon-btn-accent" onclick="saveBuilder()">${svg('check', 18, 2.5)}</button>

            <div class="builder-row" data-bi="${i}">

              <div style="flex:1;min-width:0">

    function updateBuilderEx(i, field, value) {
      if (!builderExercises[i]) return;
      if (field === 'sets') {
        const n = parseInt(value); if (n >= 1 && n <= 10) builderExercises[i].sets = n;
      } else if (field === 'reps') {
        builderExercises[i].reps = (value || '').trim() || '8';
      }
    }

    async function saveBuilder() {
      const name = (builderName || '').trim();
      if (!name) { customAlert('Name required'); return; }
      if (builderExercises.length === 0) { customAlert('Add at least one exercise'); return; }
      const exercises = builderExercises.map(ex => ({
        exerciseId: ex.exerciseId, name: ex.name, sets: ex.sets,
        reps: ex.reps, equipment: ex.equipment
      }));
      if (builderEditingId) {
        const r = appData.routines.find(x => x.id === builderEditingId);
        if (r) { r.name = name; r.exercises = exercises; }
      } else {
        appData.routines.push({
          id: 'custom-' + Date.now(), name, colorIndex: appData.routines.length % 4,
          isDefault: false, exercises
        });
      }
      saveData(appData);
      triggerHaptic('success');
      builderEditingId = null;
      showScreen('routines');
    }

    function openBuilderAdd() {
      builderCat = 'All'; builderEquip = 'All'; builderQuery = '';

    function renderBuilderAddSheet() {
      const cats = ['All', ...new Set(EXERCISE_LIBRARY.map(e => e.category))];
      const equips = ['All', 'Barbell', 'Dumbbell', 'Cable', 'Machine', 'Bodyweight'];
      const currentIds = new Set(builderExercises.map(e => e.exerciseId));
      const filtered = EXERCISE_LIBRARY.filter(ex => {
        if (currentIds.has(ex.id)) return false;
        if (builderCat !== 'All' && ex.category !== builderCat) return false;
        if (builderEquip !== 'All' && ex.equipment !== builderEquip.toLowerCase()) return false;
        if (builderQuery && !ex.name.toLowerCase().includes(builderQuery.toLowerCase())) return false;
        return true;
      });
      document.getElementById('swap-sheet').innerHTML = `
        <div class="sheet-grab"></div>
        <div class="row-between" style="margin-bottom:14px">
          <div>
            <div class="eyebrow eyebrow-accent" style="margin-bottom:3px">Add exercise</div>
            <div class="mono" style="font-size:11px;color:var(--ink-3)">Pick from the library</div>
          </div>
          <button class="icon-btn" onclick="closeSheet('swap-overlay')" style="width:32px;height:32px">${svg('x', 14)}</button>

    /* Builder drag reorder */
    let builderDragState = null;
    function initBuilderDragHandles() {
      document.querySelectorAll('.builder-drag-handle').forEach(h => {
        h.addEventListener('touchstart', onBuilderDragTouch, { passive: false });
        h.addEventListener('mousedown', onBuilderDragMouse);
      });
    }
    function onBuilderDragTouch(e) {
      const bi = parseInt(e.currentTarget.getAttribute('data-bi'));
      e.preventDefault();
      startBuilderDrag(bi, e.touches[0].clientY);
      const mv = (ev) => { ev.preventDefault(); moveBuilderDrag(ev.touches[0].clientY); };
      const en = () => { endBuilderDrag(); document.removeEventListener('touchmove', mv); document.removeEventListener('touchend', en); };
      document.addEventListener('touchmove', mv, { passive: false });
      document.addEventListener('touchend', en);
    }
    function onBuilderDragMouse(e) {
      const bi = parseInt(e.currentTarget.getAttribute('data-bi'));
      e.preventDefault();
      startBuilderDrag(bi, e.clientY);
      const mv = (ev) => moveBuilderDrag(ev.clientY);
      const en = () => { endBuilderDrag(); document.removeEventListener('mousemove', mv); document.removeEventListener('mouseup', en); };
      document.addEventListener('mousemove', mv);
      document.addEventListener('mouseup', en);
    }
    function startBuilderDrag(bi, startY) {
      const cards = document.querySelectorAll('.builder-row');
      const card = cards[bi]; if (!card) return;
      triggerHaptic('dragStart');
      const rects = [];
      cards.forEach(c => rects.push(c.getBoundingClientRect()));
      builderDragState = { bi, startY, card, rects };
      card.classList.add('dragging');
    }
    function moveBuilderDrag(clientY) {
      if (!builderDragState) return;
      const { bi, startY, card, rects } = builderDragState;
      const delta = clientY - startY;
      card.style.transform = `translateY(${delta}px)`;
      const dragCenter = rects[bi].top + rects[bi].height / 2 + delta;
      let newIndex = bi;
      for (let i = 0; i < rects.length; i++) {
        if (i === bi) continue;
        const center = rects[i].top + rects[i].height / 2;
        if (bi < i && dragCenter > center) newIndex = i;
        if (bi > i && dragCenter < center && i < newIndex) newIndex = i;
      }
      const cards = document.querySelectorAll('.builder-row');
      cards.forEach((c, i) => {
        if (i === bi) return;
        if (bi < newIndex && i > bi && i <= newIndex) c.style.transform = `translateY(-${rects[bi].height + 8}px)`;
        else if (bi > newIndex && i < bi && i >= newIndex) c.style.transform = `translateY(${rects[bi].height + 8}px)`;
        else c.style.transform = '';
      });
      builderDragState.targetIndex = newIndex;
    }
    function endBuilderDrag() {
      if (!builderDragState) return;
      const { bi, targetIndex } = builderDragState;
      document.querySelectorAll('.builder-row').forEach(c => { c.style.transform = ''; c.classList.remove('dragging'); });
      if (targetIndex !== undefined && targetIndex !== bi) {
        const [moved] = builderExercises.splice(bi, 1);
        builderExercises.splice(targetIndex, 0, moved);
        renderBuilder();
      }
      builderDragState = null;
    }

      LIBRARY_MAP[id] = newEx;
      appData.exerciseOverrides[id] = { step, defaultSets: sets, defaultReps: reps };
      saveData(appData); closeSheet('exedit-overlay'); renderBestiary(); triggerHaptic('success');
    }
    async function deleteCustomExercise(exerciseId) {
      if (!await customConfirm('Delete this custom exercise?')) return;
      appData.customExercises = appData.customExercises.filter(e => e.id !== exerciseId);
      delete appData.exerciseOverrides[exerciseId];
      const idx = EXERCISE_LIBRARY.findIndex(e => e.id === exerciseId);
      if (idx !== -1) EXERCISE_LIBRARY.splice(idx, 1);
      delete LIBRARY_MAP[exerciseId];
      saveData(appData); closeSheet('exedit-overlay'); renderBestiary();
    }

    /* ========== BOOT ========== */
    (function boot() {
      // Onboarding gate
      if (!localStorage.getItem('w-onboarded')) {
        showScreen('onboarding');
      } else {
        showScreen('home');
      }
      // Service worker
      if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
      // Session recovery
      checkSessionRecovery();
    })();

    function checkSessionRecovery() {
      const raw = localStorage.getItem('workoutBackup');
      if (!raw) return;
      try {
        const backup = JSON.parse(raw);
        if (!backup || !backup.session || !backup.session.exercises || !backup.timestamp) { clearSessionBackup(); return; }
        if (Date.now() - backup.timestamp > 4 * 60 * 60 * 1000) { clearSessionBackup(); return; }
        currentSession = backup.session;
        clearInterval(elapsedInterval);
        elapsedInterval = setInterval(() => {
          const el = document.getElementById('elapsed-display');
          if (el) el.textContent = formatTime(getElapsedSeconds());
        }, 1000);
        if (activeScreen === 'home') renderHome();
        resumeRestTimer();
      } catch (e) { clearSessionBackup(); }
    }

    // Rest timer state placeholders
    let restInterval = null, isResting = false, restStartedAt = 0, restDuration = 0, restExName = 'REST';
    function resumeRestTimer() {
      if (!currentSession || !currentSession.restStartedAt || !currentSession.restDuration) return;
      restStartedAt = currentSession.restStartedAt;
      restDuration = currentSession.restDuration;
      restExName = currentSession.restExName || 'REST';
      const remaining = Math.max(0, restDuration - Math.floor((Date.now() - restStartedAt) / 1000));
      if (remaining <= 0) { clearRestState(); return; }
      isResting = true;
      clearInterval(restInterval);
      restInterval = setInterval(() => {
        const rem = getRestRemaining();
        if (rem <= 0) { clearInterval(restInterval); restFinished(); }
        if (activeScreen === 'workout') updateRestRing();
      }, 1000);
    }
    function getRestRemaining() {
      if (!restStartedAt || !restDuration) return 0;
      return Math.max(0, restDuration - Math.floor((Date.now() - restStartedAt) / 1000));
    }
    function clearRestState() {
      restStartedAt = 0; restDuration = 0; isResting = false;
      if (currentSession) { delete currentSession.restStartedAt; delete currentSession.restDuration; delete currentSession.restExName; }
    }
    function dismissRest() {
      clearInterval(restInterval); clearRestState();
      if (activeScreen === 'workout') renderRestBar();
    }
    function restFinished() {
      dismissRest();
      triggerHaptic('restTimerDone');
      sendRestNotification();
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        for (let i = 0; i < 3; i++) {
          const osc = ctx.createOscillator(); const gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.frequency.value = 880; gain.gain.value = 0.3;
          osc.start(ctx.currentTime + i * 0.25); osc.stop(ctx.currentTime + i * 0.25 + 0.15);
        }
      } catch (e) {}
    }
    function updateRestRing() {}
    function renderRestBar() {}
  </script>
</body>
</html>

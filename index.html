<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Workout">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Workout Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #252542;
      --surface3: #2a2a4a;
      --border: rgba(255,255,255,0.06);
      --accent: #e94560;
      --accent2: #7c3aed;
      --text: #f0f0f5;
      --text2: #8888a4;
      --text3: #55556a;
      --green: #34d399;
      --green-dim: rgba(52,211,153,0.12);
      --orange: #fbbf24;
      --orange-dim: rgba(251,191,36,0.12);
      --red-dim: rgba(233,69,96,0.1);
      --purple-dim: rgba(124,58,237,0.12);
      --gold: #fbbf24;
      --gold-dim: rgba(251,191,36,0.15);
      --radius: 14px;
      --radius-sm: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    #confetti-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9999;
    }

    .screen { display: none; padding: 20px 16px; padding-bottom: 110px; max-width: 480px; margin: 0 auto; }
    .screen.active { display: block; }

    /* ========== HOME ========== */
    #home { padding-top: 24px; }
    .home-greeting {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .home-date-line {
      color: var(--text2);
      font-size: 13px;
      font-weight: 400;
      margin-bottom: 20px;
    }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 10px;
      text-align: center;
    }
    .stat-value {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .stat-value.accent-a { color: var(--accent); }
    .stat-value.accent-b { color: var(--accent2); }
    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text3);
      margin-top: 2px;
      font-weight: 600;
    }

    /* Calendar */
    .calendar-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 20px;
    }
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .cal-nav button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .cal-nav button:active { background: var(--surface3); }
    .cal-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .cal-dow {
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 4px 0 8px;
    }
    .cal-day {
      text-align: center;
      padding: 4px 0;
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      border-radius: 8px;
      position: relative;
      min-height: 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }
    .cal-day.empty { visibility: hidden; }
    .cal-day.today {
      color: var(--text);
      font-weight: 700;
      background: var(--surface2);
    }
    .cal-day.future { color: var(--text3); opacity: 0.5; }
    .cal-dots {
      display: flex;
      gap: 3px;
      justify-content: center;
      height: 5px;
    }
    .cal-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
    }
    .cal-dot.a { background: var(--accent); }
    .cal-dot.b { background: var(--accent2); }

    /* Workout buttons */
    .workout-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .btn-workout {
      padding: 20px 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: transform 0.15s;
      letter-spacing: -0.2px;
      text-align: center;
    }
    .btn-workout:active { transform: scale(0.97); }
    .btn-a {
      background: linear-gradient(135deg, #e94560 0%, #d63384 100%);
      box-shadow: 0 4px 24px rgba(233,69,96,0.2);
    }
    .btn-b {
      background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
      box-shadow: 0 4px 24px rgba(124,58,237,0.2);
    }

    .home-actions { display: flex; gap: 10px; margin-bottom: 20px; }

    .btn-ghost {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 0;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background 0.15s;
      flex: 1;
    }
    .btn-ghost:active { background: var(--surface2); }
    .btn-ghost svg { opacity: 0.5; }

    /* Last workout card */
    .last-workout-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .lw-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .lw-dot.a { background: var(--accent); }
    .lw-dot.b { background: var(--accent2); }
    .lw-info { flex: 1; }
    .lw-title { font-size: 13px; font-weight: 600; }
    .lw-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
    .lw-arrow { color: var(--text3); font-size: 14px; }

    /* Personal Records Section */
    .pr-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    .pr-section-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--gold);
    }
    .pr-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .pr-item {
      background: var(--gold-dim);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
    }
    .pr-item-name {
      font-size: 11px;
      color: var(--text2);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pr-item-value {
      font-size: 16px;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: -0.3px;
    }
    .pr-item-date {
      font-size: 10px;
      color: var(--text3);
    }

    /* PR badge animation in workout */
    .pr-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--gold-dim);
      color: var(--gold);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 6px;
      animation: prPulse 0.6s ease-out;
    }
    @keyframes prPulse {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ========== SHARED BUTTONS ========== */
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-small { padding: 7px 14px; font-size: 13px; }

    /* ========== HEADER ========== */
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      padding-top: 4px;
    }
    .header .back {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text2);
      width: 36px;
      height: 36px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .header .back svg { width: 18px; height: 18px; }
    .header h2 { font-size: 18px; flex: 1; font-weight: 700; letter-spacing: -0.3px; }
    .header .date-badge {
      color: var(--text2);
      font-size: 12px;
      font-weight: 500;
      background: var(--surface);
      padding: 5px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .elapsed-badge {
      color: var(--green);
      font-size: 13px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      background: var(--green-dim);
      padding: 5px 10px;
      border-radius: 8px;
      border: 1px solid rgba(52,211,153,0.15);
      letter-spacing: 0.5px;
    }

    /* ========== REST TIMER BANNER ========== */
    #rest-banner {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      background: linear-gradient(135deg, var(--accent), #d63384);
      color: #fff;
      padding: 12px 16px;
      z-index: 200;
      font-weight: 700;
      box-shadow: 0 8px 32px rgba(233,69,96,0.35);
    }
    #rest-banner.active { display: flex; align-items: center; justify-content: center; gap: 14px; }
    #rest-banner .rest-label { font-size: 14px; opacity: 0.85; font-weight: 500; }
    #rest-banner .rest-time {
      font-size: 28px;
      font-variant-numeric: tabular-nums;
      min-width: 56px;
      text-align: center;
      letter-spacing: 1px;
    }
    #rest-banner .rest-btns { display: flex; gap: 6px; }
    #rest-banner .rest-btns button, #rest-banner .dismiss {
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(4px);
      border: none;
      color: #fff;
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    #rest-banner .dismiss { background: rgba(0,0,0,0.2); }

    /* ========== WARMUP CARD ========== */
    .warmup-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }
    .warmup-card .wc-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .warmup-card .wc-header svg { color: var(--orange); }
    .warmup-card .wc-header span { font-size: 15px; font-weight: 600; color: var(--orange); }
    .warmup-timer-display {
      font-size: 40px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      text-align: center;
      margin: 4px 0 12px;
      letter-spacing: 2px;
    }
    .warmup-controls { display: flex; gap: 8px; justify-content: center; margin-bottom: 12px; }
    .warmup-notes {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      min-height: 38px;
    }
    .warmup-notes:focus { outline: none; border-color: var(--orange); }
    .warmup-notes::placeholder { color: var(--text3); }

    /* ========== EXERCISE CARD ========== */
    .exercise-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      position: relative;
    }
    .exercise-card.dragging {
      opacity: 0.9;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      z-index: 100;
    }
    .exercise-card.drag-placeholder {
      opacity: 0.3;
      border: 2px dashed var(--text3);
      background: transparent;
    }
    .ex-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }
    .drag-handle {
      color: var(--text3);
      cursor: grab;
      padding: 4px 2px;
      display: flex;
      align-items: center;
      touch-action: none;
      flex-shrink: 0;
    }
    .drag-handle:active { cursor: grabbing; }
    .ex-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ex-icon.barbell { background: var(--red-dim); color: var(--accent); }
    .ex-icon.machine { background: var(--purple-dim); color: var(--accent2); }
    .ex-icon svg { width: 20px; height: 20px; }
    .ex-header h3 { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; flex: 1; }
    .ex-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 6px;
      background: var(--surface2);
      color: var(--text3);
    }
    .ex-badge.has-done {
      background: var(--green-dim);
      color: var(--green);
    }
    .ex-chevron {
      color: var(--text3);
      transition: transform 0.2s;
      flex-shrink: 0;
      width: 16px;
      height: 16px;
    }
    .exercise-card.collapsed .ex-chevron { transform: rotate(-90deg); }
    .ex-target {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 14px;
      margin-left: 46px;
      font-weight: 400;
    }
    .overload-hint {
      font-size: 11px;
      color: var(--green);
      margin-left: 46px;
      margin-bottom: 10px;
      font-weight: 500;
      padding: 4px 8px;
      background: var(--green-dim);
      border-radius: 6px;
      display: inline-block;
    }
    .ex-body { overflow: hidden; }
    .exercise-card.collapsed .ex-body { display: none; }
    .exercise-card.collapsed .ex-target { margin-bottom: 0; }
    .exercise-card.collapsed .overload-hint { display: none; }

    /* Set header row */
    .set-header {
      display: grid;
      grid-template-columns: 26px 1fr 64px 34px;
      gap: 6px;
      margin-bottom: 6px;
      padding: 0 2px;
    }
    .set-header span {
      font-size: 10px;
      text-transform: uppercase;
      color: var(--text3);
      letter-spacing: 0.8px;
      font-weight: 600;
      text-align: center;
    }

    /* Set row */
    .set-row {
      display: grid;
      grid-template-columns: 26px 1fr 64px 34px;
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
      padding: 0 2px;
    }
    .set-num {
      font-size: 12px;
      color: var(--text3);
      text-align: center;
      font-weight: 700;
    }

    /* Weight cell with +/- */
    .weight-cell {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .w-adj {
      width: 28px;
      height: 32px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.1s;
      line-height: 1;
      padding: 0;
    }
    .w-adj:active { background: var(--surface3); color: var(--text); }

    .set-row input[type="number"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      padding: 8px 4px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      width: 100%;
      min-width: 0;
      text-align: center;
      -moz-appearance: textfield;
      transition: border-color 0.15s;
    }
    .set-row input[type="number"]:focus { outline: none; border-color: var(--accent); }
    .set-row input[type="number"]::-webkit-outer-spin-button,
    .set-row input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    .set-row input::placeholder { color: var(--text3); font-weight: 400; }

    .set-check {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      border: 2px solid var(--text3);
      background: none;
      color: transparent;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .set-check.done {
      background: var(--green);
      border-color: var(--green);
      color: #0f0f1a;
    }
    .set-check.done.is-pr {
      background: var(--gold);
      border-color: var(--gold);
    }
    .set-check svg { width: 16px; height: 16px; }

    .set-actions {
      display: flex;
      gap: 4px;
      margin-top: 6px;
    }
    .add-set-btn {
      background: none;
      border: 1px dashed rgba(255,255,255,0.1);
      color: var(--text3);
      padding: 7px 0;
      border-radius: 8px;
      flex: 1;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: color 0.15s, border-color 0.15s;
    }
    .add-set-btn:active { color: var(--text2); border-color: rgba(255,255,255,0.2); }
    .remove-set-btn {
      background: none;
      border: 1px dashed rgba(233,69,96,0.2);
      color: var(--accent);
      padding: 7px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      opacity: 0.6;
    }
    .remove-set-btn:active { opacity: 1; }

    /* Session Notes */
    .session-notes-container {
      margin-bottom: 16px;
    }
    .session-notes {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 12px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      min-height: 44px;
    }
    .session-notes:focus { outline: none; border-color: var(--accent); }
    .session-notes::placeholder { color: var(--text3); }
    .hi-notes {
      font-size: 12px;
      color: var(--text2);
      margin-top: 6px;
      padding: 6px 10px;
      background: var(--surface2);
      border-radius: 6px;
      font-style: italic;
    }

    /* ========== FINISH BAR ========== */
    .finish-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 16px;
      background: linear-gradient(to top, var(--bg) 60%, transparent);
      padding-top: 48px;
      z-index: 50;
    }
    .finish-bar button {
      width: 100%;
      max-width: 480px;
      display: block;
      margin: 0 auto;
      padding: 15px;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: var(--green);
      color: #0f0f1a;
      letter-spacing: -0.2px;
      box-shadow: 0 4px 20px rgba(52,211,153,0.25);
    }
    .finish-bar button:active { opacity: 0.9; transform: scale(0.99); }

    /* ========== HISTORY ========== */
    .history-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .history-item:active { background: var(--surface2); }
    .hi-header { display: flex; justify-content: space-between; align-items: center; }
    .hi-type {
      font-weight: 700;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .hi-type .type-dot { width: 8px; height: 8px; border-radius: 50%; }
    .hi-type .type-dot.a { background: var(--accent); }
    .hi-type .type-dot.b { background: var(--accent2); }
    .hi-date { color: var(--text2); font-size: 12px; font-weight: 500; }
    .hi-warmup {
      color: var(--orange);
      font-size: 12px;
      margin-top: 4px;
      font-weight: 500;
    }
    .hi-details {
      display: none;
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }
    .history-item.expanded .hi-details { display: block; }
    .history-item.expanded .hi-expand-hint { display: none; }
    .hi-exercise { margin-bottom: 10px; }
    .hi-name { font-weight: 600; font-size: 13px; margin-bottom: 3px; color: var(--text); }
    .hi-set-line {
      font-size: 12px;
      color: var(--text2);
      padding-left: 14px;
      padding-top: 1px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .hi-set-line .hi-check { color: var(--green); font-size: 11px; }
    .hi-set-line .hi-miss { color: var(--text3); font-size: 11px; }
    .hi-set-line .hi-pr { color: var(--gold); font-size: 10px; font-weight: 700; }
    .hi-expand-hint {
      text-align: center;
      margin-top: 6px;
      font-size: 11px;
      color: var(--text3);
    }

    /* ========== PROGRESS SCREEN ========== */
    #progress { padding-top: 20px; }
    .progress-chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
    }
    .progress-chart-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: -0.2px;
    }
    .progress-chart-card canvas {
      width: 100%;
      height: 160px;
      display: block;
    }
    .progress-empty {
      text-align: center;
      color: var(--text3);
      padding: 32px 16px;
      font-size: 13px;
    }

    /* ========== SETTINGS ========== */
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
    }
    .setting-row label { font-size: 14px; font-weight: 500; }
    .setting-row input, .setting-row select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 8px 12px;
      font-size: 14px;
      font-family: inherit;
    }
    .setting-row input:focus, .setting-row select:focus { outline: none; border-color: var(--accent); }

    /* Toggle switch */
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }
    .toggle-switch input { display: none; }
    .toggle-slider {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--surface3);
      border-radius: 12px;
      transition: background 0.2s;
    }
    .toggle-slider::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; top: 3px;
      background: var(--text2);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle-switch input:checked + .toggle-slider { background: var(--green); }
    .toggle-switch input:checked + .toggle-slider::after { transform: translateX(20px); background: #fff; }

    .danger-zone {
      margin-top: 32px;
      padding: 16px;
      border: 1px solid rgba(233,69,96,0.2);
      border-radius: var(--radius);
      background: var(--red-dim);
    }
    .danger-zone h3 { color: var(--accent); margin-bottom: 12px; font-size: 14px; font-weight: 600; }

    /* ========== SWIPE NAV DOTS ========== */
    .nav-dots {
      position: fixed;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      z-index: 100;
      padding: 4px 10px;
      border-radius: 12px;
      background: rgba(15,15,26,0.8);
    }
    .nav-dots.hidden { display: none; }
    .nav-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text3);
      transition: background 0.2s, transform 0.2s;
    }
    .nav-dot.active {
      background: var(--text);
      transform: scale(1.3);
    }

    /* ========== EMPTY STATE ========== */
    .empty-state { text-align: center; color: var(--text3); padding: 48px 20px; }
    .empty-state svg { margin-bottom: 16px; opacity: 0.3; }
    .empty-state p { font-size: 14px; line-height: 1.5; }

    /* ========== ANIMATIONS ========== */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .exercise-card { animation: fadeIn 0.15s ease-out both; }
    .exercise-card:nth-child(2) { animation-delay: 0.02s; }
    .exercise-card:nth-child(3) { animation-delay: 0.04s; }
    .exercise-card:nth-child(4) { animation-delay: 0.06s; }
    .exercise-card:nth-child(5) { animation-delay: 0.08s; }
    .exercise-card:nth-child(6) { animation-delay: 0.1s; }
    .exercise-card:nth-child(7) { animation-delay: 0.12s; }
  </style>
</head>
<body>

  <!-- Confetti Canvas -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Rest Timer Banner -->
  <div id="rest-banner">
    <span class="rest-label">REST</span>
    <span class="rest-time" id="rest-time">01:30</span>
    <div class="rest-btns">
      <button onclick="adjustRest(-30)">-30s</button>
      <button onclick="adjustRest(30)">+30s</button>

  </div>

  <!-- Navigation Dots -->
  <div class="nav-dots" id="nav-dots">
    <div class="nav-dot" data-screen="history"></div>
    <div class="nav-dot active" data-screen="home"></div>
    <div class="nav-dot" data-screen="settings"></div>
  </div>

  <!-- Home Screen -->
  <div id="home" class="screen active">
    <div class="home-greeting" id="home-greeting">Workout Tracker</div>
    <div class="home-date-line" id="home-date-line"></div>

    <!-- Stats -->
    <div class="stats-row" id="stats-row"></div>

    <!-- Calendar -->
    <div class="calendar-card">
      <div class="cal-nav">
        <button onclick="calNav(-1)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="cal-title" id="cal-title"></span>
        <button onclick="calNav(1)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>

    <!-- Last workout -->
    <div id="last-workout-container"></div>

    <!-- Personal Records -->
    <div id="pr-container"></div>

    <!-- Start buttons -->
    <div class="workout-buttons">
      <button class="btn-workout btn-a" onclick="startWorkout('A')">Workout A</button>
      <button class="btn-workout btn-b" onclick="startWorkout('B')">Workout B</button>
    </div>

    <div class="home-actions">
      <button class="btn-ghost" onclick="showScreen('history')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        History
      </button>
      <button class="btn-ghost" onclick="showScreen('progress')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Progress
      </button>
      <button class="btn-ghost" onclick="showScreen('settings')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Settings
      </button>
    </div>
  </div>

  <!-- Active Workout Screen -->
  <div id="workout" class="screen">
    <div class="header">
      <button class="back" onclick="confirmExit()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h2 id="workout-title">Workout A</h2>
      <span class="elapsed-badge" id="elapsed-display">00:00</span>
    </div>

    <div class="warmup-card">
      <div class="wc-header">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span>Warmup</span>
      </div>
      <div class="warmup-timer-display" id="warmup-display">00:00</div>
      <div class="warmup-controls">
        <button class="btn btn-secondary btn-small" id="warmup-btn" onclick="toggleWarmup()">Start</button>
        <button class="btn btn-secondary btn-small" onclick="resetWarmup()">Reset</button>
      </div>
      <textarea class="warmup-notes" id="warmup-notes" placeholder="Warmup notes..." rows="1"></textarea>
    </div>

    <div id="exercises-container"></div>

    <!-- Session Notes -->
    <div class="session-notes-container">
      <textarea class="session-notes" id="session-notes" placeholder="Workout notes..." rows="2"></textarea>
    </div>

    <div class="finish-bar">
      <button onclick="finishWorkout()">Finish Workout</button>
    </div>

  <!-- History Screen -->
  <div id="history" class="screen">
    <div class="header">
      <button class="back" onclick="showScreen('home')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h2>History</h2>
    </div>
    <div id="history-list"></div>
  </div>

  <!-- Progress Screen -->
  <div id="progress" class="screen">
    <div class="header">
      <button class="back" onclick="showScreen('home')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h2>Progress</h2>
    </div>
    <div id="progress-charts"></div>
  </div>

  <!-- Settings Screen -->
  <div id="settings" class="screen">
    <div class="header">
      <button class="back" onclick="showScreen('home')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <h2>Settings</h2>
    </div>
    <div class="setting-row">
      <label>Default Rest Time</label>
      <div>
        <input type="number" id="set-rest" style="width:64px;text-align:center;" min="10" max="600">
        <span style="color:var(--text2);font-size:12px;"> sec</span>
      </div>
    </div>
    <div class="setting-row">
      <label>Weight Unit</label>
      <select id="set-unit">
        <option value="kg">kg</option>
        <option value="lbs">lbs</option>
      </select>
    </div>
    <div class="setting-row">
      <label>Haptic Feedback</label>
      <label class="toggle-switch">
        <input type="checkbox" id="set-haptics" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div style="padding:16px 0;">
      <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>
    </div>
    <div class="danger-zone">
      <h3>Danger Zone</h3>
      <button class="btn btn-small" style="background:var(--accent);color:#fff;" onclick="clearAllData()">Clear All Data</button>
    </div>
  </div>

  <script>
    // ==================== ICONS ====================
    const ICONS = {
      barbell: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <rect x="1" y="7" width="3" height="10" rx="1"/><rect x="20" y="7" width="3" height="10" rx="1"/>
        <rect x="4" y="9" width="2.5" height="6" rx="0.5"/><rect x="17.5" y="9" width="2.5" height="6" rx="0.5"/>
        <line x1="6.5" y1="12" x2="17.5" y2="12"/></svg>`,
      cable: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/>
        <rect x="8" y="6" width="8" height="12" rx="2"/>
        <line x1="10" y1="10" x2="14" y2="10"/><line x1="10" y1="14" x2="14" y2="14"/></svg>`,
      legpress: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 18 L10 12 L14 16"/><rect x="16" y="8" width="4" height="10" rx="1"/>
        <line x1="4" y1="20" x2="20" y2="20"/></svg>`,
      pullup: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" y1="4" x2="20" y2="4"/>
        <line x1="12" y1="4" x2="12" y2="9"/>
        <circle cx="12" cy="11" r="2"/><line x1="12" y1="13" x2="12" y2="18"/>
        <line x1="9" y1="7" x2="12" y2="9"/><line x1="15" y1="7" x2="12" y2="9"/>
        <line x1="12" y1="18" x2="9" y2="22"/><line x1="12" y1="18" x2="15" y2="22"/></svg>`,
      curl: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 18 L8 12 Q8 6 14 6 L16 6"/>
        <rect x="16" y="4" width="4" height="4" rx="1"/></svg>`
    };

    const EXERCISE_ICON_MAP = {
      'Squat': 'barbell', 'Bench Press': 'barbell', 'Overhead Press': 'barbell',
      'Incline Bench Press': 'barbell', 'Deadlift': 'barbell', 'Barbell Row': 'barbell',
      'Lat Pulldown': 'cable', 'Pullups / Lat Pulldown': 'pullup',
      'Machine Row': 'cable', 'Biceps Curl': 'curl', 'Leg Press': 'legpress',
    };

    function getExIcon(name) { return ICONS[EXERCISE_ICON_MAP[name]] || ICONS.barbell; }

    const CHECK_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
    const BACK_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`;
    const DRAG_HANDLE_SVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.5"/><circle cx="15" cy="6" r="1.5"/><circle cx="9" cy="12" r="1.5"/><circle cx="15" cy="12" r="1.5"/><circle cx="9" cy="18" r="1.5"/><circle cx="15" cy="18" r="1.5"/></svg>`;
    const TROPHY_SVG = `<svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;

    // ==================== DATA ====================
    const TEMPLATES = {
      A: [
        { name: 'Squat', sets: 4, reps: '8', barbell: true },
        { name: 'Bench Press', sets: 3, reps: '10', barbell: true },
        { name: 'Overhead Press', sets: 4, reps: '8', barbell: true },
        { name: 'Incline Bench Press', sets: 3, reps: '10', barbell: true },
        { name: 'Lat Pulldown', sets: 3, reps: '10-12', barbell: false },
        { name: 'Biceps Curl', sets: 3, reps: '10-15', barbell: false },
        { name: 'Leg Press', sets: 3, reps: '10-15', barbell: false },
      ],
      B: [
        { name: 'Deadlift', sets: 4, reps: '8', barbell: true },
        { name: 'Barbell Row', sets: 3, reps: '10', barbell: true },
        { name: 'Pullups / Lat Pulldown', sets: 3, reps: '10', barbell: false },
        { name: 'Machine Row', sets: 3, reps: '10-12', barbell: false },
        { name: 'Biceps Curl', sets: 3, reps: '10-15', barbell: false },
        { name: 'Leg Press', sets: 3, reps: '10-15', barbell: false },
      ]
    };

    function loadData() {
      const raw = localStorage.getItem('workoutData');
      if (raw) return JSON.parse(raw);
      return { sessions: [], settings: { defaultRestTime: 90, unit: 'kg', hapticsEnabled: true }, personalRecords: {} };
    }

    function saveData(data) { localStorage.setItem('workoutData', JSON.stringify(data)); }

    let appData = loadData();

    // ==================== DATA MIGRATION ====================
    function migrateData() {
      if (!appData.personalRecords) appData.personalRecords = {};
      if (appData.settings.hapticsEnabled === undefined) appData.settings.hapticsEnabled = true;
      appData.sessions.forEach(s => {
        if (s.notes === undefined) s.notes = '';
      });
      rebuildAllPRs();
      saveData(appData);
    }
    migrateData();

    // ==================== HAPTIC FEEDBACK ====================
    function triggerHaptic(type) {
      if (!appData.settings.hapticsEnabled || !navigator.vibrate) return;
      const patterns = {
        setComplete: [30],
        pr: [50, 30, 50, 30, 100],
        restTimerDone: [200, 100, 200, 100, 200],
        workoutFinished: [100, 50, 100, 50, 200],
        dragStart: [20],
        weightAdjust: [10]
      };
      navigator.vibrate(patterns[type] || [20]);
    }

    // ==================== PERSONAL RECORDS ====================
    function computePR(exerciseName) {
      let maxWeight = 0;
      let prDate = '';
      appData.sessions.forEach(s => {
        s.exercises.forEach(ex => {
          if (ex.name === exerciseName) {
            ex.sets.forEach(set => {
              if (set.completed && set.weight !== '' && set.weight !== null && Number(set.weight) > maxWeight) {
                maxWeight = Number(set.weight);
                prDate = s.date;
              }
            });
          }
        });
      });
      return maxWeight > 0 ? { maxWeight, date: prDate } : null;
    }

    function rebuildAllPRs() {
      const allExercises = new Set();
      appData.sessions.forEach(s => {
        s.exercises.forEach(ex => allExercises.add(ex.name));
      });
      appData.personalRecords = {};
      allExercises.forEach(name => {
        const pr = computePR(name);
        if (pr) appData.personalRecords[name] = pr;
      });
    }

    function checkForNewPR(exerciseName, weight) {
      if (weight === '' || weight === null || weight === 0) return false;
      const numWeight = Number(weight);
      const current = appData.personalRecords[exerciseName];
      if (!current || numWeight > current.maxWeight) {
        appData.personalRecords[exerciseName] = {
          maxWeight: numWeight,
          date: new Date().toISOString().slice(0, 10)
        };
        return true;
      }
      return false;
    }

    function renderPRSection() {
      const container = document.getElementById('pr-container');
      const prs = appData.personalRecords;
      const names = Object.keys(prs);
      if (names.length === 0) {
        container.innerHTML = '';
        return;
      }
      const unit = appData.settings.unit;
      let items = '';
      names.forEach(name => {
        const pr = prs[name];
        items += `<div class="pr-item">
          <div class="pr-item-name">${escapeHtml(name)}</div>
          <div class="pr-item-value">${pr.maxWeight} ${unit}</div>
          <div class="pr-item-date">${formatDate(pr.date)}</div>
        </div>`;
      });
      container.innerHTML = `<div class="pr-section">
        <div class="pr-section-title">${TROPHY_SVG} Personal Records</div>
        <div class="pr-grid">${items}</div>
      </div>`;
    }

    // ==================== CONFETTI ====================
    const confettiCanvas = document.getElementById('confetti-canvas');
    const confettiCtx = confettiCanvas.getContext('2d');
    let confettiParticles = [];
    let confettiAnimId = null;

    function resizeConfetti() {
      confettiCanvas.width = window.innerWidth;
      confettiCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeConfetti);
    resizeConfetti();

    function launchConfetti() {
      confettiParticles = [];
      const colors = ['#e94560', '#7c3aed', '#34d399', '#fbbf24', '#3b82f6', '#ec4899'];
      for (let i = 0; i < 80; i++) {
        confettiParticles.push({
          x: Math.random() * confettiCanvas.width,
          y: -10 - Math.random() * 40,
          w: 6 + Math.random() * 6,
          h: 4 + Math.random() * 4,
          vx: (Math.random() - 0.5) * 6,
          vy: 2 + Math.random() * 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          rotation: Math.random() * 360,
          rotSpeed: (Math.random() - 0.5) * 10,
          life: 1
        });
      }
      if (!confettiAnimId) animateConfetti();
    }

    function animateConfetti() {
      confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      let alive = false;
      confettiParticles.forEach(p => {
        if (p.life <= 0) return;
        alive = true;
        p.x += p.vx;
        p.vy += 0.1;
        p.y += p.vy;
        p.rotation += p.rotSpeed;
        p.life -= 0.005;
        if (p.y > confettiCanvas.height + 20) { p.life = 0; return; }
        confettiCtx.save();
        confettiCtx.translate(p.x, p.y);
        confettiCtx.rotate(p.rotation * Math.PI / 180);
        confettiCtx.globalAlpha = Math.max(0, p.life);
        confettiCtx.fillStyle = p.color;
        confettiCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        confettiCtx.restore();
      });
      if (alive) {
        confettiAnimId = requestAnimationFrame(animateConfetti);
      } else {
        confettiAnimId = null;
        confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      }
    }

    // ==================== SCREENS ====================
    let activeScreen = 'home';

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      activeScreen = id;
      if (id === 'home') renderHome();
      if (id === 'history') renderHistory();
      if (id === 'settings') loadSettings();
      if (id === 'progress') renderProgress();
      updateNavDots();
    }

    // ==================== HOME ====================
    let calYear, calMonth;

    function initCalendar() {
      const now = new Date();
      calYear = now.getFullYear();
      calMonth = now.getMonth();
    }
    initCalendar();

    function renderHome() {
      // Date line
      const now = new Date();
      const opts = { weekday: 'long', month: 'long', day: 'numeric' };
      document.getElementById('home-date-line').textContent = now.toLocaleDateString('en-US', opts);

      // Greeting based on time
      const h = now.getHours();
      let greet = 'Good evening';
      if (h < 12) greet = 'Good morning';
      else if (h < 17) greet = 'Good afternoon';
      document.getElementById('home-greeting').textContent = greet;

      renderStats();
      renderCalendar();
      renderLastWorkout();
      renderPRSection();
    }

    function renderStats() {
      const now = new Date();
      const thisMonth = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
      const monthSessions = appData.sessions.filter(s => s.date.startsWith(thisMonth));
      const totalA = monthSessions.filter(s => s.type === 'A').length;
      const totalB = monthSessions.filter(s => s.type === 'B').length;

      document.getElementById('stats-row').innerHTML = `
        <div class="stat-card">
          <div class="stat-value accent-a">${totalA}</div>
          <div class="stat-label">Workout A this month</div>
        </div>
        <div class="stat-card">
          <div class="stat-value accent-b">${totalB}</div>
          <div class="stat-label">Workout B this month</div>
        </div>`;
    }

    function calNav(delta) {
      calMonth += delta;
      if (calMonth < 0) { calMonth = 11; calYear--; }
      if (calMonth > 11) { calMonth = 0; calYear++; }
      renderCalendar();
    }

    function renderCalendar() {
      const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      document.getElementById('cal-title').textContent = MONTHS[calMonth] + ' ' + calYear;

      // Build workout map for this month: date string -> array of types
      const prefix = calYear + '-' + String(calMonth + 1).padStart(2, '0');
      const dayMap = {};
      appData.sessions.forEach(s => {
        if (s.date.startsWith(prefix)) {
          const day = parseInt(s.date.split('-')[2]);
          if (!dayMap[day]) dayMap[day] = new Set();
          dayMap[day].add(s.type);
        }
      });

      const now = new Date();
      const todayDate = now.getDate();
      const todayMonth = now.getMonth();
      const todayYear = now.getFullYear();
      const isCurrentMonth = calYear === todayYear && calMonth === todayMonth;

      // First day of month (0=Sun)
      const firstDay = new Date(calYear, calMonth, 1).getDay();
      const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
      // Shift so Monday = 0
      const startOffset = (firstDay + 6) % 7;

      let html = '';
      ['Mo','Tu','We','Th','Fr','Sa','Su'].forEach(d => {
        html += `<div class="cal-dow">${d}</div>`;
      });

      for (let i = 0; i < startOffset; i++) {
        html += '<div class="cal-day empty"></div>';
      }

      for (let day = 1; day <= daysInMonth; day++) {
        let cls = 'cal-day';
        if (isCurrentMonth && day === todayDate) cls += ' today';
        const isFuture = calYear > todayYear || (calYear === todayYear && calMonth > todayMonth) ||
                         (isCurrentMonth && day > todayDate);
        if (isFuture) cls += ' future';

        const types = dayMap[day];
        let dots = '<div class="cal-dots">';
        if (types) {
          if (types.has('A')) dots += '<div class="cal-dot a"></div>';
          if (types.has('B')) dots += '<div class="cal-dot b"></div>';
        }
        dots += '</div>';

        html += `<div class="${cls}"><span>${day}</span>${dots}</div>`;
      }

      document.getElementById('cal-grid').innerHTML = html;
    }

    function renderLastWorkout() {
      const container = document.getElementById('last-workout-container');
      if (appData.sessions.length === 0) {
        container.innerHTML = '';
        return;
      }
      const last = appData.sessions[appData.sessions.length - 1];
      const dotCls = last.type === 'A' ? 'a' : 'b';
      const setCount = last.exercises.reduce((sum, e) => sum + e.sets.filter(s => s.completed).length, 0);
      const durStr = last.totalDuration > 0 ? ' &middot; ' + formatTime(last.totalDuration) : '';

      container.innerHTML = `
        <div class="last-workout-card" onclick="showScreen('history')" style="cursor:pointer">
          <div class="lw-dot ${dotCls}"></div>
          <div class="lw-info">
            <div class="lw-title">Last: Workout ${last.type} &middot; ${formatDate(last.date)}</div>
            <div class="lw-sub">${setCount} sets completed${durStr}</div>
          </div>
          <span class="lw-arrow">&rsaquo;</span>
        </div>`;
    }

    // ==================== PROGRESSIVE OVERLOAD ====================
    function getOverloadSuggestion(exerciseName, step) {
      const lastSession = [...appData.sessions].reverse().find(s =>
        s.exercises.some(e => e.name === exerciseName)
      );
      if (!lastSession) return null;
      const lastEx = lastSession.exercises.find(e => e.name === exerciseName);
      if (!lastEx) return null;
      const allCompleted = lastEx.sets.every(s => s.completed);
      if (!allCompleted) return null;
      const maxWeight = Math.max(...lastEx.sets.filter(s => s.weight !== '' && s.weight !== null).map(s => Number(s.weight)));
      if (maxWeight <= 0 || isNaN(maxWeight)) return null;
      const suggested = +(maxWeight + step).toFixed(1);
      const unit = appData.settings.unit;
      return `Last: ${maxWeight}${unit} → Try: ${suggested}${unit}`;
    }

    // ==================== ACTIVE WORKOUT ====================
    let currentSession = null;
    let warmupInterval = null;
    let warmupSeconds = 0;
    let warmupRunning = false;
    let elapsedInterval = null;
    let elapsedSeconds = 0;

    function startWorkout(type) {
      const today = new Date().toISOString().slice(0, 10);
      const template = TEMPLATES[type];
      const lastSession = [...appData.sessions].reverse().find(s => s.type === type);

      currentSession = {
        id: Date.now(),
        type: type,
        date: today,
        warmupDuration: 0,
        warmupNotes: '',
        notes: '',
        exercises: template.map(t => {
          const lastEx = lastSession ? lastSession.exercises.find(e => e.name === t.name) : null;
          const lastWeight = lastEx ? (lastEx.sets.find(s => s.weight !== '' && s.weight !== null) || {}).weight || '' : '';
          const sets = [];
          for (let i = 0; i < t.sets; i++) {
            const lastReps = lastEx && lastEx.sets[i] && lastEx.sets[i].reps !== '' && lastEx.sets[i].reps !== null
              ? lastEx.sets[i].reps : '';
            sets.push({ weight: lastWeight, reps: lastReps, completed: false });
          }
          return { name: t.name, targetSets: t.sets, targetReps: t.reps, barbell: t.barbell, step: t.barbell ? 2.5 : 1, sets: sets };
        })
      };

      warmupSeconds = 0;
      warmupRunning = false;
      clearInterval(warmupInterval);

      // Start elapsed workout timer
      elapsedSeconds = 0;
      clearInterval(elapsedInterval);
      elapsedInterval = setInterval(() => {
        elapsedSeconds++;
        document.getElementById('elapsed-display').textContent = formatTime(elapsedSeconds);
      }, 1000);

      document.getElementById('workout-title').textContent = 'Workout ' + type;
      document.getElementById('elapsed-display').textContent = '00:00';
      document.getElementById('warmup-display').textContent = '00:00';
      document.getElementById('warmup-btn').textContent = 'Start';
      document.getElementById('warmup-notes').value = '';
      document.getElementById('session-notes').value = '';

      collapsedExercises.clear();
      renderExercises();
      showScreen('workout');
    }

    const collapsedExercises = new Set();

    function toggleCollapse(ei) {
      if (collapsedExercises.has(ei)) {
        collapsedExercises.delete(ei);
      } else {
        collapsedExercises.add(ei);
      }
      const card = document.getElementById('ex-' + ei);
      if (card) card.classList.toggle('collapsed');
      // Update badge in case it changed
      const ex = currentSession.exercises[ei];
      const doneCount = ex.sets.filter(s => s.completed).length;
      const badge = card.querySelector('.ex-badge');
      if (badge) {
        badge.textContent = doneCount + '/' + ex.sets.length;
        badge.className = doneCount > 0 ? 'ex-badge has-done' : 'ex-badge';
      }
    }

    function renderExercises() {
      const container = document.getElementById('exercises-container');
      const unit = appData.settings.unit;
      let html = '';

      currentSession.exercises.forEach((ex, ei) => {
        const iconType = ex.barbell ? 'barbell' : 'machine';
        const stepLabel = ex.barbell ? '2.5' : '1';
        const doneCount = ex.sets.filter(s => s.completed).length;
        const totalCount = ex.sets.length;
        const badgeClass = doneCount > 0 ? 'ex-badge has-done' : 'ex-badge';
        const collapsed = collapsedExercises.has(ei) ? ' collapsed' : '';

        // Progressive overload hint
        const hint = getOverloadSuggestion(ex.name, ex.step);
        const hintHtml = hint ? `<div class="overload-hint">${hint}</div>` : '';

        html += `<div class="exercise-card${collapsed}" id="ex-${ei}" data-ei="${ei}">
          <div class="ex-header">
            <div class="drag-handle" data-ei="${ei}">${DRAG_HANDLE_SVG}</div>
            <div class="ex-icon ${iconType}" onclick="toggleCollapse(${ei})">${getExIcon(ex.name)}</div>
            <h3 onclick="toggleCollapse(${ei})">${ex.name}</h3>
            <span class="${badgeClass}">${doneCount}/${totalCount}</span>
            <svg class="ex-chevron" onclick="toggleCollapse(${ei})" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="ex-target">${ex.targetSets} &times; ${ex.targetReps} &middot; &plusmn;${stepLabel} ${unit}</div>
          ${hintHtml}
          <div class="ex-body">
          <div class="set-header">
            <span></span><span>${unit.toUpperCase()}</span><span>REPS</span><span></span>
          </div>`;

        ex.sets.forEach((set, si) => {
          html += buildSetRowHTML(ei, si, set);
        });

        html += `<div class="set-actions">
          <button class="add-set-btn" onclick="addSet(${ei})">+ Add set</button>`;
        if (ex.sets.length > 1) {
          html += `<button class="remove-set-btn" onclick="removeSet(${ei})">Remove</button>`;
        }
        html += `</div></div></div>`;
      });

      container.innerHTML = html;
      initDragHandles();
    }

    function buildSetRowHTML(ei, si, set) {
      const doneClass = set.completed ? 'done' : '';
      const prClass = set.completed && set.isPR ? ' is-pr' : '';
      const checkIcon = set.completed ? CHECK_SVG : '';
      const weightVal = set.weight !== '' && set.weight !== null ? set.weight : '';
      return `<div class="set-row" id="sr-${ei}-${si}">
        <span class="set-num">${si + 1}</span>
        <div class="weight-cell">
          <button class="w-adj" onclick="adjSetWeight(${ei},${si},-1)">&minus;</button>
          <input type="number" inputmode="decimal" placeholder="-" id="wi-${ei}-${si}"
            value="${weightVal}" onchange="updateSet(${ei},${si},'weight',this.value)">
          <button class="w-adj" onclick="adjSetWeight(${ei},${si},1)">+</button>
        </div>
        <input type="number" inputmode="numeric" placeholder="-" id="ri-${ei}-${si}"
          value="${set.reps}" onchange="updateSet(${ei},${si},'reps',this.value)">
        <button class="set-check ${doneClass}${prClass}" id="sc-${ei}-${si}" onclick="toggleSet(${ei},${si})">
          ${checkIcon}
        </button>
      </div>`;
    }

    // ---- Targeted DOM updates (no flicker) ----

    function updateWeightInput(ei, si) {
      const input = document.getElementById('wi-' + ei + '-' + si);
      if (input) {
        const v = currentSession.exercises[ei].sets[si].weight;
        input.value = (v !== '' && v !== null) ? v : '';
      }
    }

    function updateSet(ei, si, field, value) {
      const numVal = value === '' ? '' : Number(value);
      currentSession.exercises[ei].sets[si][field] = numVal;

      if (field === 'weight' && si === 0 && numVal !== '') {
        const ex = currentSession.exercises[ei];
        for (let i = 1; i < ex.sets.length; i++) {
          if (ex.sets[i].weight === '' || ex.sets[i].weight === null) {
            ex.sets[i].weight = numVal;
            updateWeightInput(ei, i);
          }
        }
      }
    }

    function adjSetWeight(ei, si, direction) {
      const ex = currentSession.exercises[ei];
      const step = ex.step;
      const current = (ex.sets[si].weight !== '' && ex.sets[si].weight !== null)
        ? Number(ex.sets[si].weight) : 0;
      const newWeight = Math.max(0, +(current + direction * step).toFixed(1));
      ex.sets[si].weight = newWeight;
      updateWeightInput(ei, si);
      triggerHaptic('weightAdjust');

      // If set 1, also fill empty subsequent sets
      if (si === 0) {
        for (let i = 1; i < ex.sets.length; i++) {
          if (ex.sets[i].weight === '' || ex.sets[i].weight === null) {
            ex.sets[i].weight = newWeight;
            updateWeightInput(ei, i);
          }
        }
      }
    }

    function toggleSet(ei, si) {
      const set = currentSession.exercises[ei].sets[si];
      set.completed = !set.completed;

      // Targeted update for check button
      const btn = document.getElementById('sc-' + ei + '-' + si);

      let isPR = false;
      if (set.completed) {
        // Check for PR
        const exName = currentSession.exercises[ei].name;
        const weight = set.weight;
        isPR = checkForNewPR(exName, weight);
        set.isPR = isPR;

        if (isPR) {
          triggerHaptic('pr');
          launchConfetti();
          // Show gold button
          if (btn) {
            btn.classList.add('done', 'is-pr');
            btn.innerHTML = CHECK_SVG;
          }
        } else {
          triggerHaptic('setComplete');
          if (btn) {
            btn.classList.add('done');
            btn.classList.remove('is-pr');
            btn.innerHTML = CHECK_SVG;
          }
        }
      } else {
        set.isPR = false;
        triggerHaptic('setComplete');
        if (btn) {
          btn.classList.remove('done', 'is-pr');
          btn.innerHTML = '';
        }
      }

      // Update badge count
      const ex = currentSession.exercises[ei];
      const doneCount = ex.sets.filter(s => s.completed).length;
      const card = document.getElementById('ex-' + ei);
      if (card) {
        const badge = card.querySelector('.ex-badge');
        if (badge) {
          badge.textContent = doneCount + '/' + ex.sets.length;
          badge.className = doneCount > 0 ? 'ex-badge has-done' : 'ex-badge';
        }
      }

      if (set.completed) startRestTimer();
    }

    function addSet(ei) {
      const ex = currentSession.exercises[ei];
      const lastSet = ex.sets[ex.sets.length - 1];
      ex.sets.push({ weight: lastSet.weight, reps: '', completed: false });
      renderExercises(); // structural change, full re-render needed
    }

    function removeSet(ei) {
      const ex = currentSession.exercises[ei];
      if (ex.sets.length > 1) {
        ex.sets.pop();
        renderExercises();
      }
    }

    // ==================== REORDER EXERCISES (DRAG) ====================
    let dragState = null;

    function initDragHandles() {
      const handles = document.querySelectorAll('.drag-handle');
      handles.forEach(handle => {
        handle.addEventListener('touchstart', onDragTouchStart, { passive: false });
        handle.addEventListener('mousedown', onDragMouseStart);
      });
    }

    function onDragTouchStart(e) {
      const ei = parseInt(e.currentTarget.getAttribute('data-ei'));
      e.preventDefault();
      const touch = e.touches[0];
      startDrag(ei, touch.clientY);

      const moveHandler = (ev) => {
        ev.preventDefault();
        moveDrag(ev.touches[0].clientY);
      };
      const endHandler = () => {
        endDrag();
        document.removeEventListener('touchmove', moveHandler);
        document.removeEventListener('touchend', endHandler);
      };
      document.addEventListener('touchmove', moveHandler, { passive: false });
      document.addEventListener('touchend', endHandler);
    }

    function onDragMouseStart(e) {
      const ei = parseInt(e.currentTarget.getAttribute('data-ei'));
      e.preventDefault();
      startDrag(ei, e.clientY);

      const moveHandler = (ev) => { moveDrag(ev.clientY); };
      const endHandler = () => {
        endDrag();
        document.removeEventListener('mousemove', moveHandler);
        document.removeEventListener('mouseup', endHandler);
      };
      document.addEventListener('mousemove', moveHandler);
      document.addEventListener('mouseup', endHandler);
    }

    function startDrag(ei, startY) {
      const card = document.getElementById('ex-' + ei);
      if (!card) return;

      triggerHaptic('dragStart');
      const cards = document.querySelectorAll('.exercise-card');
      const rects = [];
      cards.forEach(c => rects.push(c.getBoundingClientRect()));

      dragState = {
        ei: ei,
        startY: startY,
        currentY: startY,
        card: card,
        rects: rects,
        originalOrder: currentSession.exercises.map((_, i) => i)
      };
      card.classList.add('dragging');
    }

    function moveDrag(clientY) {
      if (!dragState) return;
      dragState.currentY = clientY;
      const delta = clientY - dragState.startY;
      dragState.card.style.transform = `translateY(${delta}px)`;

      // Determine new position
      const cards = document.querySelectorAll('.exercise-card');
      const dragRect = dragState.rects[dragState.ei];
      const dragCenter = dragRect.top + dragRect.height / 2 + delta;

      let newIndex = dragState.ei;
      for (let i = 0; i < dragState.rects.length; i++) {
        if (i === dragState.ei) continue;
        const r = dragState.rects[i];
        const center = r.top + r.height / 2;
        if (dragState.ei < i && dragCenter > center) newIndex = i;
        if (dragState.ei > i && dragCenter < center) newIndex = i;
      }

      // Visual feedback on other cards
      cards.forEach((c, i) => {
        if (i === dragState.ei) return;
        if (dragState.ei < newIndex && i > dragState.ei && i <= newIndex) {
          c.style.transform = `translateY(-${dragRect.height + 12}px)`;
        } else if (dragState.ei > newIndex && i < dragState.ei && i >= newIndex) {
          c.style.transform = `translateY(${dragRect.height + 12}px)`;
        } else {
          c.style.transform = '';
        }
      });

      dragState.targetIndex = newIndex;
    }

    function endDrag() {
      if (!dragState) return;
      const { ei, targetIndex } = dragState;
      const cards = document.querySelectorAll('.exercise-card');
      cards.forEach(c => {
        c.style.transform = '';
        c.classList.remove('dragging');
      });

      if (targetIndex !== undefined && targetIndex !== ei) {
        const [moved] = currentSession.exercises.splice(ei, 1);
        currentSession.exercises.splice(targetIndex, 0, moved);

        // Update collapsed indices
        const newCollapsed = new Set();
        const oldCollapsed = new Set(collapsedExercises);
        collapsedExercises.clear();
        // Re-map collapsed state
        currentSession.exercises.forEach((ex, i) => {
          // Find where this exercise was before
          // Simple approach: just clear and let user re-collapse
        });

        renderExercises();
      }
      dragState = null;
    }

    // ==================== WARMUP TIMER ====================
    function toggleWarmup() {
      if (warmupRunning) {
        clearInterval(warmupInterval);
        warmupRunning = false;
        document.getElementById('warmup-btn').textContent = 'Resume';
      } else {
        warmupRunning = true;
        document.getElementById('warmup-btn').textContent = 'Pause';
        warmupInterval = setInterval(() => {
          warmupSeconds++;
          document.getElementById('warmup-display').textContent = formatTime(warmupSeconds);
        }, 1000);
      }
    }

    function resetWarmup() {
      clearInterval(warmupInterval);
      warmupRunning = false;
      warmupSeconds = 0;
      document.getElementById('warmup-display').textContent = '00:00';
      document.getElementById('warmup-btn').textContent = 'Start';
    }

    function formatTime(totalSec) {
      const m = Math.floor(totalSec / 60);
      const s = totalSec % 60;
      return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }

    // ==================== REST TIMER ====================
    let restInterval = null;
    let restRemaining = 0;

    function startRestTimer() {
      clearInterval(restInterval);
      restRemaining = appData.settings.defaultRestTime;
      document.getElementById('rest-banner').classList.add('active');
      updateRestDisplay();

      restInterval = setInterval(() => {
        restRemaining--;
        if (restRemaining <= 0) {
          restRemaining = 0;
          clearInterval(restInterval);
          restFinished();
        }
        updateRestDisplay();
      }, 1000);
    }

    function updateRestDisplay() {
      document.getElementById('rest-time').textContent = formatTime(restRemaining);
    }

    function adjustRest(delta) {
      restRemaining = Math.max(0, restRemaining + delta);
      updateRestDisplay();
    }

    function dismissRest() {
      clearInterval(restInterval);
      document.getElementById('rest-banner').classList.remove('active');
    }

    function restFinished() {
      triggerHaptic('restTimerDone');
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        for (let i = 0; i < 3; i++) {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = 880;
          gain.gain.value = 0.3;
          osc.start(ctx.currentTime + i * 0.25);
          osc.stop(ctx.currentTime + i * 0.25 + 0.15);
        }
      } catch (e) {}
    }

    // ==================== FINISH WORKOUT ====================
    function finishWorkout() {
      if (!currentSession) return;

      const anyDone = currentSession.exercises.some(ex => ex.sets.some(s => s.completed));
      if (!anyDone) {
        if (!confirm('No sets completed. Discard this workout?')) return;
        clearInterval(elapsedInterval);
        showScreen('home');
        currentSession = null;
        return;
      }

      clearInterval(warmupInterval);
      clearInterval(elapsedInterval);
      warmupRunning = false;
      currentSession.warmupDuration = warmupSeconds;
      currentSession.totalDuration = elapsedSeconds;
      currentSession.warmupNotes = document.getElementById('warmup-notes').value.trim();
      currentSession.notes = document.getElementById('session-notes').value.trim();
      dismissRest();

      currentSession.exercises.forEach(ex => {
        ex.sets = ex.sets.filter(s => s.completed || s.weight !== '' || s.reps !== '');
      });

      appData.sessions.push(currentSession);
      rebuildAllPRs();
      saveData(appData);

      triggerHaptic('workoutFinished');
      launchConfetti();

      // Delay screen transition to show confetti
      setTimeout(() => {
        currentSession = null;
        showScreen('home');
      }, 1200);
    }

    function confirmExit() {
      if (currentSession) {
        const anyDone = currentSession.exercises.some(ex => ex.sets.some(s => s.completed));
        if (anyDone) {
          if (!confirm('Leave workout? Unsaved progress will be lost.')) return;
        }
      }
      clearInterval(warmupInterval);
      clearInterval(elapsedInterval);
      warmupRunning = false;
      dismissRest();
      currentSession = null;
      showScreen('home');
    }

    // ==================== HISTORY ====================
    function renderHistory() {
      const list = document.getElementById('history-list');
      const sessions = [...appData.sessions].reverse();

      if (sessions.length === 0) {
        list.innerHTML = `<div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <p>No workouts logged yet.<br>Start one from the home screen!</p>
        </div>`;
        return;
      }

      const unit = appData.settings.unit;
      let html = '';
      sessions.forEach(session => {
        const dotClass = session.type === 'A' ? 'a' : 'b';
        const durationStr = session.totalDuration > 0
          ? `<div style="font-size:12px;color:var(--green);margin-top:4px;font-weight:500;">Duration: ${formatTime(session.totalDuration)}</div>` : '';
        const warmupStr = session.warmupDuration > 0
          ? `<div class="hi-warmup">Warmup: ${formatTime(session.warmupDuration)}</div>` : '';
        const warmupNotes = session.warmupNotes
          ? `<div style="font-size:11px;color:var(--text3);margin-top:2px;">Notes: ${escapeHtml(session.warmupNotes)}</div>` : '';
        const sessionNotes = session.notes
          ? `<div class="hi-notes">${escapeHtml(session.notes)}</div>` : '';

        // Check which sets were PRs at the time
        const sessionPRs = {};
        session.exercises.forEach(ex => {
          let maxInSession = 0;
          ex.sets.forEach(s => {
            if (s.completed && s.weight !== '' && s.weight !== null) {
              maxInSession = Math.max(maxInSession, Number(s.weight));
            }
          });
          if (maxInSession > 0) {
            const currentPR = appData.personalRecords[ex.name];
            if (currentPR && currentPR.maxWeight === maxInSession && currentPR.date === session.date) {
              sessionPRs[ex.name] = maxInSession;
            }
          }
        });

        let details = '';
        session.exercises.forEach(ex => {
          if (ex.sets.length === 0) return;
          details += `<div class="hi-exercise"><div class="hi-name">${escapeHtml(ex.name)}</div>`;
          ex.sets.forEach((s, si) => {
            const w = s.weight !== '' && s.weight !== null ? s.weight + ' ' + unit : '-';
            const r = s.reps !== '' && s.reps !== null ? s.reps : '-';
            const checkClass = s.completed ? 'hi-check' : 'hi-miss';
            const checkMark = s.completed ? '&#10003;' : '&#9675;';
            const isPRSet = s.completed && sessionPRs[ex.name] && Number(s.weight) === sessionPRs[ex.name];
            const prBadge = isPRSet ? ` <span class="hi-pr">${TROPHY_SVG} PR</span>` : '';
            details += `<div class="hi-set-line"><span class="${checkClass}">${checkMark}</span> Set ${si + 1}: ${w} &times; ${r} reps${prBadge}</div>`;
          });
          details += '</div>';
        });

        html += `<div class="history-item" onclick="this.classList.toggle('expanded')">
          <div class="hi-header">
            <span class="hi-type"><span class="type-dot ${dotClass}"></span>Workout ${session.type}</span>
            <span class="hi-date">${formatDate(session.date)}</span>
          </div>
          ${durationStr}${warmupStr}${warmupNotes}${sessionNotes}
          <div class="hi-expand-hint">Tap to expand</div>
          <div class="hi-details">${details}</div>
        </div>`;
      });

      list.innerHTML = html;
    }

    // ==================== PROGRESS CHARTS ====================
    function getExerciseProgressData(exerciseName) {
      const data = [];
      appData.sessions.forEach(s => {
        const ex = s.exercises.find(e => e.name === exerciseName);
        if (!ex) return;
        let maxW = 0;
        ex.sets.forEach(set => {
          if (set.completed && set.weight !== '' && set.weight !== null) {
            maxW = Math.max(maxW, Number(set.weight));
          }
        });
        if (maxW > 0) {
          data.push({ date: s.date, weight: maxW });
        }
      });
      return data;
    }

    function drawProgressChart(canvas, data, exerciseName) {
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);
      const w = rect.width;
      const h = rect.height;

      ctx.clearRect(0, 0, w, h);

      if (data.length < 2) {
        ctx.fillStyle = '#55556a';
        ctx.font = '12px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Need at least 2 sessions', w / 2, h / 2);
        return;
      }

      const padding = { top: 20, right: 16, bottom: 30, left: 40 };
      const chartW = w - padding.left - padding.right;
      const chartH = h - padding.top - padding.bottom;

      const weights = data.map(d => d.weight);
      const minW = Math.min(...weights) - 5;
      const maxW = Math.max(...weights) + 5;
      const range = maxW - minW || 1;

      // Draw axes
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 1;

      // Y-axis labels
      const ySteps = 4;
      ctx.fillStyle = '#55556a';
      ctx.font = '10px -apple-system, sans-serif';
      ctx.textAlign = 'right';
      for (let i = 0; i <= ySteps; i++) {
        const val = minW + (range * i / ySteps);
        const y = padding.top + chartH - (chartH * i / ySteps);
        ctx.fillText(Math.round(val), padding.left - 6, y + 3);
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(w - padding.right, y);
        ctx.stroke();
      }

      // X-axis labels
      ctx.textAlign = 'center';
      const xStep = Math.max(1, Math.floor(data.length / 5));
      data.forEach((d, i) => {
        if (i % xStep === 0 || i === data.length - 1) {
          const x = padding.left + (chartW * i / (data.length - 1));
          const dateLabel = d.date.slice(5); // MM-DD
          ctx.fillText(dateLabel, x, h - 6);
        }
      });

      // Draw gradient fill
      const points = data.map((d, i) => ({
        x: padding.left + (chartW * i / (data.length - 1)),
        y: padding.top + chartH - (chartH * (d.weight - minW) / range)
      }));

      const gradient = ctx.createLinearGradient(0, padding.top, 0, padding.top + chartH);
      gradient.addColorStop(0, 'rgba(233,69,96,0.25)');
      gradient.addColorStop(1, 'rgba(233,69,96,0)');

      ctx.beginPath();
      ctx.moveTo(points[0].x, padding.top + chartH);
      points.forEach(p => ctx.lineTo(p.x, p.y));
      ctx.lineTo(points[points.length - 1].x, padding.top + chartH);
      ctx.closePath();
      ctx.fillStyle = gradient;
      ctx.fill();

      // Draw line
      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      for (let i = 1; i < points.length; i++) {
        ctx.lineTo(points[i].x, points[i].y);
      }
      ctx.strokeStyle = '#e94560';
      ctx.lineWidth = 2;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.stroke();

      // Draw dots
      points.forEach((p, i) => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#e94560';
        ctx.fill();
        ctx.strokeStyle = '#0f0f1a';
        ctx.lineWidth = 1.5;
        ctx.stroke();
      });
    }

    function renderProgress() {
      const container = document.getElementById('progress-charts');
      const allExercises = new Set();
      appData.sessions.forEach(s => {
        s.exercises.forEach(ex => allExercises.add(ex.name));
      });

      if (allExercises.size === 0) {
        container.innerHTML = '<div class="progress-empty">No workout data yet. Complete some workouts to see progress charts.</div>';
        return;
      }

      let html = '';
      allExercises.forEach(name => {
        const data = getExerciseProgressData(name);
        if (data.length === 0) return;
        html += `<div class="progress-chart-card">
          <div class="progress-chart-title">${escapeHtml(name)}</div>
          <canvas class="progress-canvas" data-exercise="${escapeHtml(name)}"></canvas>
        </div>`;
      });

      if (!html) {
        container.innerHTML = '<div class="progress-empty">No completed sets with weights yet.</div>';
        return;
      }

      container.innerHTML = html;

      // Draw charts after DOM update
      requestAnimationFrame(() => {
        container.querySelectorAll('.progress-canvas').forEach(canvas => {
          const name = canvas.getAttribute('data-exercise');
          const data = getExerciseProgressData(name);
          drawProgressChart(canvas, data, name);
        });
      });
    }

    // ==================== SWIPE GESTURES ====================
    const SWIPE_SCREENS = ['history', 'home', 'settings'];
    let swipeState = null;

    function updateNavDots() {
      const dots = document.getElementById('nav-dots');
      const idx = SWIPE_SCREENS.indexOf(activeScreen);
      // Hide dots during workout and progress
      if (currentSession || activeScreen === 'workout' || activeScreen === 'progress') {
        dots.classList.add('hidden');
        return;
      }
      dots.classList.remove('hidden');
      dots.querySelectorAll('.nav-dot').forEach((dot, i) => {
        dot.classList.toggle('active', i === idx);
      });
    }

    function initSwipeGestures() {
      document.addEventListener('touchstart', onSwipeTouchStart, { passive: true });
      document.addEventListener('touchmove', onSwipeTouchMove, { passive: false });
      document.addEventListener('touchend', onSwipeTouchEnd, { passive: true });
    }

    function onSwipeTouchStart(e) {
      // Disable during workout, progress, or when dragging exercises
      if (currentSession || activeScreen === 'workout' || activeScreen === 'progress') return;
      if (SWIPE_SCREENS.indexOf(activeScreen) === -1) return;
      // Don't start swipe on interactive elements
      const tag = e.target.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || tag === 'BUTTON') return;
      if (e.target.closest('.drag-handle')) return;
      if (dragState) return;

      const touch = e.touches[0];
      swipeState = {
        startX: touch.clientX,
        startY: touch.clientY,
        currentX: touch.clientX,
        locked: false,
        isHorizontal: null,
        startTime: Date.now()
      };
    }

    function onSwipeTouchMove(e) {
      if (!swipeState) return;
      const touch = e.touches[0];
      swipeState.currentX = touch.clientX;
      const dx = touch.clientX - swipeState.startX;
      const dy = touch.clientY - swipeState.startY;

      // Determine direction lock
      if (swipeState.isHorizontal === null && (Math.abs(dx) > 10 || Math.abs(dy) > 10)) {
        swipeState.isHorizontal = Math.abs(dx) > Math.abs(dy);
      }

      if (!swipeState.isHorizontal) return;

      e.preventDefault();

      // Visual feedback
      const screen = document.getElementById(activeScreen);
      if (screen) {
        const clampedDx = Math.max(-120, Math.min(120, dx));
        screen.style.transform = `translateX(${clampedDx}px)`;
        screen.style.transition = 'none';
      }
    }

    function onSwipeTouchEnd(e) {
      if (!swipeState || !swipeState.isHorizontal) {
        if (swipeState) {
          const screen = document.getElementById(activeScreen);
          if (screen) {
            screen.style.transform = '';
            screen.style.transition = '';
          }
        }
        swipeState = null;
        return;
      }

      const dx = swipeState.currentX - swipeState.startX;
      const elapsed = Date.now() - swipeState.startTime;
      const velocity = Math.abs(dx) / elapsed;
      const threshold = 60;
      const idx = SWIPE_SCREENS.indexOf(activeScreen);

      const screen = document.getElementById(activeScreen);
      if (screen) {
        screen.style.transform = '';
        screen.style.transition = 'transform 0.2s ease-out';
        setTimeout(() => { screen.style.transition = ''; }, 200);
      }

      if ((Math.abs(dx) > threshold || velocity > 0.5)) {
        if (dx > 0 && idx > 0) {
          showScreen(SWIPE_SCREENS[idx - 1]);
        } else if (dx < 0 && idx < SWIPE_SCREENS.length - 1) {
          showScreen(SWIPE_SCREENS[idx + 1]);
        }
      }

      swipeState = null;
    }

    // ==================== SETTINGS ====================
    function loadSettings() {
      document.getElementById('set-rest').value = appData.settings.defaultRestTime;
      document.getElementById('set-unit').value = appData.settings.unit;
      document.getElementById('set-haptics').checked = appData.settings.hapticsEnabled !== false;
    }

    function saveSettings() {
      const rest = parseInt(document.getElementById('set-rest').value) || 90;
      const unit = document.getElementById('set-unit').value;
      const haptics = document.getElementById('set-haptics').checked;
      appData.settings.defaultRestTime = Math.max(10, Math.min(600, rest));
      appData.settings.unit = unit;
      appData.settings.hapticsEnabled = haptics;
      saveData(appData);
      showScreen('home');
    }

    function clearAllData() {
      if (confirm('Delete ALL workout history? This cannot be undone.')) {
        if (confirm('Are you really sure?')) {
          localStorage.removeItem('workoutData');
          appData = { sessions: [], settings: { defaultRestTime: 90, unit: 'kg', hapticsEnabled: true }, personalRecords: {} };
          showScreen('home');
        }
      }
    }

    // ==================== UTILITIES ====================
    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ==================== INIT ====================
    renderHome();
    initSwipeGestures();
    updateNavDots();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>

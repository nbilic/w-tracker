<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Workout">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Workout Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface2: #252542;
      --surface3: #2a2a4a;
      --border: rgba(255,255,255,0.06);
      --accent: #e94560;
      --accent2: #7c3aed;
      --text: #f0f0f5;
      --text2: #8888a4;
      --text3: #55556a;
      --green: #34d399;
      --green-dim: rgba(52,211,153,0.12);
      --orange: #fbbf24;
      --orange-dim: rgba(251,191,36,0.12);
      --red-dim: rgba(233,69,96,0.1);
      --purple-dim: rgba(124,58,237,0.12);
      --gold: #fbbf24;
      --gold-dim: rgba(251,191,36,0.15);
      --radius: 14px;
      --radius-sm: 10px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    #confetti-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9999;
    }

    .screen { display: none; padding: 20px 16px; padding-bottom: 110px; max-width: 480px; margin: 0 auto; }
    .screen.active { display: block; }

    /* ========== HOME ========== */
    #home { padding-top: 24px; }
    .home-greeting {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .home-date-line {
      color: var(--text2);
      font-size: 13px;
      font-weight: 400;
      margin-bottom: 20px;
    }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 10px;
      text-align: center;
    }
    .stat-value {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .stat-value.accent-a { color: var(--accent); }
    .stat-value.accent-b { color: var(--accent2); }
    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text3);
      margin-top: 2px;
      font-weight: 600;
    }

    /* Calendar */
    .calendar-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 20px;
    }
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .cal-nav button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .cal-nav button:active { background: var(--surface3); }
    .cal-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
    .cal-dow {
      text-align: center;
      font-size: 10px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 4px 0 8px;
    }
    .cal-day {
      text-align: center;
      padding: 4px 0;
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      border-radius: 8px;
      position: relative;
      min-height: 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }
    .cal-day.empty { visibility: hidden; }
    .cal-day.today {
      color: var(--text);
      font-weight: 700;
      background: var(--surface2);
    }
    .cal-day.future { color: var(--text3); opacity: 0.5; }
    .cal-dots {
      display: flex;
      gap: 3px;
      justify-content: center;
      height: 5px;
    }
    .cal-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
    }
    .cal-dot.a { background: var(--accent); }
    .cal-dot.b { background: var(--accent2); }

    /* Workout buttons */
    .workout-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .btn-workout {
      padding: 20px 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: transform 0.15s;
      letter-spacing: -0.2px;
      text-align: center;
    }
    .btn-workout:active { transform: scale(0.97); }
    .btn-a {
      background: linear-gradient(135deg, #e94560 0%, #d63384 100%);
      box-shadow: 0 4px 24px rgba(233,69,96,0.2);
    }
    .btn-b {
      background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
      box-shadow: 0 4px 24px rgba(124,58,237,0.2);
    }

    .home-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }

    .btn-ghost {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 0;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background 0.15s;
      flex: 1;
    }
    .btn-ghost:active { background: var(--surface2); }
    .btn-ghost svg { opacity: 0.5; }

    /* Last workout card */
    .last-workout-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .lw-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    }
    .lw-dot.a { background: var(--accent); }
    .lw-dot.b { background: var(--accent2); }
    .lw-info { flex: 1; }
    .lw-title { font-size: 13px; font-weight: 600; }
    .lw-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
    .lw-arrow { color: var(--text3); font-size: 14px; }
    .lw-undo {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--accent);
      width: 30px; height: 30px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 0;
    }
    .lw-undo:active { background: var(--surface3); }
    .lw-undo svg { width: 14px; height: 14px; }

    /* Personal Records Section */
    .pr-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    .pr-section-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--gold);
    }
    .pr-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .pr-item {
      background: var(--gold-dim);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
    }
    .pr-item-name {
      font-size: 11px;
      color: var(--text2);
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pr-item-value {
      font-size: 16px;
      font-weight: 800;
      color: var(--gold);
      letter-spacing: -0.3px;
    }
    .pr-item-date {
      font-size: 10px;
      color: var(--text3);
    }

    /* PR badge animation in workout */
    .pr-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--gold-dim);
      color: var(--gold);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 6px;
      animation: prPulse 0.6s ease-out;
    }
    @keyframes prPulse {
      0% { transform: scale(0.5); opacity: 0; }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ========== SHARED BUTTONS ========== */
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-small { padding: 7px 14px; font-size: 13px; }

    /* ========== HEADER ========== */
    .workout-sticky-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      padding: 0 0 8px;
      margin: 0 -16px;
      padding-left: 16px;
      padding-right: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 0;
      padding-top: 4px;
    }
    .header .back {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text2);
      width: 36px;
      height: 36px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .header .back svg { width: 18px; height: 18px; }
    .header h2 { font-size: 18px; flex: 1; font-weight: 700; letter-spacing: -0.3px; }
    .header .date-badge {
      color: var(--text2);
      font-size: 12px;
      font-weight: 500;
      background: var(--surface);
      padding: 5px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
    }
    .elapsed-badge {
      color: var(--green);
      font-size: 13px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      background: var(--green-dim);
      padding: 5px 10px;
      border-radius: 8px;
      border: 1px solid rgba(52,211,153,0.15);
      letter-spacing: 0.5px;
    }

    /* ========== REST CONTROLS BAR ========== */
    .rest-controls {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 10px 0 4px;
      border-top: 1px solid var(--border);
      margin-top: 10px;
    }
    .rest-controls.active { display: flex; }
    .rest-controls .rest-time-display {
      font-size: 20px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      letter-spacing: 0.5px;
      min-width: 52px;
    }
    .rest-controls .rest-ex-name {
      font-size: 11px;
      color: var(--text2);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .rest-controls button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .rest-controls button:active { background: var(--surface3); color: var(--text); }
    .rest-controls .rest-skip {
      color: var(--accent);
    }

    /* ========== NOTES BUTTON (in header) ========== */
    .notes-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text2);
      width: 36px;
      height: 36px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      transition: border-color 0.15s;
    }
    .notes-btn.has-notes { border-color: var(--accent); color: var(--accent); }
    .notes-btn svg { width: 18px; height: 18px; }

    /* Notes Modal */
    .notes-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 300;
      align-items: flex-end;
      justify-content: center;
    }
    .notes-overlay.active { display: flex; }
    .notes-modal {
      background: var(--surface);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 20px 16px 32px;
      width: 100%;
      max-width: 480px;
      animation: slideUp 0.2s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .notes-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .notes-modal-header h3 {
      font-size: 16px;
      font-weight: 700;
    }
    .notes-modal-close {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      width: 32px; height: 32px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .notes-modal textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 12px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      min-height: 120px;
    }
    .notes-modal textarea:focus { outline: none; border-color: var(--accent); }
    .notes-modal textarea::placeholder { color: var(--text3); }

    /* ========== EXERCISE CARD ========== */
    .exercise-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 10px;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      position: relative;
    }
    .exercise-card.dragging {
      opacity: 0.9;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      z-index: 100;
    }
    .exercise-card.drag-placeholder {
      opacity: 0.3;
      border: 2px dashed var(--text3);
      background: transparent;
    }
    .ex-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }
    .drag-handle {
      color: var(--text3);
      cursor: grab;
      padding: 4px 2px;
      display: flex;
      align-items: center;
      touch-action: none;
      flex-shrink: 0;
    }
    .drag-handle:active { cursor: grabbing; }
    .ex-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ex-icon.barbell { background: var(--red-dim); color: var(--accent); }
    .ex-icon.machine { background: var(--purple-dim); color: var(--accent2); }
    .ex-icon svg { width: 20px; height: 20px; }
    .ex-header h3 { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; flex: 1; }
    .ex-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 6px;
      background: var(--surface2);
      color: var(--text3);
    }
    .ex-badge.has-done {
      background: var(--green-dim);
      color: var(--green);
    }
    .ex-chevron {
      color: var(--text3);
      transition: transform 0.2s;
      flex-shrink: 0;
      width: 16px;
      height: 16px;
    }
    .exercise-card.collapsed .ex-chevron { transform: rotate(-90deg); }
    .ex-target {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 12px;
      margin-left: 14px;
      font-weight: 400;
    }
    .overload-hint {
      font-size: 11px;
      color: var(--green);
      margin-left: 46px;
      margin-bottom: 10px;
      font-weight: 500;
      padding: 4px 8px;
      background: var(--green-dim);
      border-radius: 6px;
      display: inline-block;
    }
    .ex-body { overflow: hidden; transition: max-height 0.3s ease-out, opacity 0.25s ease-out; opacity: 1; }
    .exercise-card.collapsed .ex-body { opacity: 0; pointer-events: none; }
    .ex-target { transition: margin-bottom 0.25s ease-out, opacity 0.25s ease-out; }
    .exercise-card.collapsed .ex-target { margin-bottom: 0; opacity: 0.5; }
    .overload-hint { transition: max-height 0.25s ease-out, opacity 0.25s ease-out, margin 0.25s ease-out; overflow: hidden; }
    .exercise-card.collapsed .overload-hint { opacity: 0; margin: 0; padding: 0; }

    /* Set header row */
    .set-header {
      display: grid;
      grid-template-columns: 26px 1fr 64px 34px;
      gap: 6px;
      margin-bottom: 6px;
      padding: 0 2px;
    }
    .set-header span {
      font-size: 10px;
      text-transform: uppercase;
      color: var(--text3);
      letter-spacing: 0.8px;
      font-weight: 600;
      text-align: center;
    }

    /* Set row */
    .set-row {
      display: grid;
      grid-template-columns: 26px 1fr 64px 34px;
      gap: 6px;
      align-items: center;
      margin-bottom: 6px;
      padding: 0 2px;
    }
    .set-num {
      font-size: 12px;
      color: var(--text3);
      text-align: center;
      font-weight: 700;
    }

    /* Weight cell with +/- */
    .weight-cell {
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .w-adj {
      width: 28px;
      height: 32px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.1s;
      line-height: 1;
      padding: 0;
    }
    .w-adj:active { background: var(--surface3); color: var(--text); }

    .set-row input[type="number"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      padding: 8px 4px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      width: 100%;
      min-width: 0;
      text-align: center;
      -moz-appearance: textfield;
      transition: border-color 0.15s;
    }
    .set-row input[type="number"]:focus { outline: none; border-color: var(--accent); }
    .set-row input[type="number"]::-webkit-outer-spin-button,
    .set-row input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    .set-row input::placeholder { color: var(--text3); font-weight: 400; }

    .set-check {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      border: 2px solid var(--text3);
      background: none;
      color: transparent;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }
    .set-check.done {
      background: var(--green);
      border-color: var(--green);
      color: #0f0f1a;
    }
    .set-check.done.is-pr {
      background: var(--gold);
      border-color: var(--gold);
    }
    .set-check svg { width: 16px; height: 16px; }

    .set-actions {
      display: flex;
      gap: 4px;
      margin-top: 6px;
    }
    .add-set-btn {
      background: none;
      border: 1px dashed rgba(255,255,255,0.1);
      color: var(--text3);
      padding: 7px 0;
      border-radius: 8px;
      flex: 1;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: color 0.15s, border-color 0.15s;
    }
    .add-set-btn:active { color: var(--text2); border-color: rgba(255,255,255,0.2); }
    .remove-set-btn {
      background: none;
      border: 1px dashed rgba(233,69,96,0.2);
      color: var(--accent);
      padding: 7px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      opacity: 0.6;
    }
    .remove-set-btn:active { opacity: 1; }

    .hi-notes {
      font-size: 12px;
      color: var(--text2);
      margin-top: 6px;
      padding: 6px 10px;
      background: var(--surface2);
      border-radius: 6px;
      font-style: italic;
    }

    /* ========== FINISH BAR ========== */
    .finish-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 16px;
      background: linear-gradient(to top, var(--bg) 60%, transparent);
      padding-top: 48px;
      z-index: 50;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .finish-bar button {
      width: 100%;
      max-width: 480px;
      display: block;
      padding: 15px;
      border: none;

    @keyframes pulse-border {

    /* ========== HISTORY ========== */
    .history-item {

      border-radius: var(--radius);

      margin-bottom: 10px;

    .hi-type {

      align-items: center;

    .hi-type .type-dot.a { background: var(--accent); }
    .hi-type .type-dot.b { background: var(--accent2); }
    .hi-date { color: var(--text2); font-size: 12px; font-weight: 500; }
    .hi-details {

    .hi-set-line {

    .hi-expand-hint {
      text-align: center;
      margin-top: 6px;
      font-size: 11px;

    /* ========== PROGRESS SCREEN ========== */
    #progress { padding-top: 20px; }

    }
    .progress-empty {

      color: var(--text3);
      padding: 32px 16px;

    }

    /* ========== SETTINGS ========== */
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;

    }
    .setting-row label { font-size: 14px; font-weight: 500; }
    .setting-row input, .setting-row select {

      color: var(--text);

      font-size: 14px;
      font-family: inherit;
    }
    .setting-row input:focus, .setting-row select:focus { outline: none; border-color: var(--accent); }

    /* Toggle switch */
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }
    .toggle-switch input { display: none; }
    .toggle-slider {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--surface3);
      border-radius: 12px;
      transition: background 0.2s;
    }
    .toggle-slider::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 3px; top: 3px;
      background: var(--text2);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle-switch input:checked + .toggle-slider { background: var(--green); }
    .toggle-switch input:checked + .toggle-slider::after { transform: translateX(20px); background: #fff; }

    .danger-zone {

    /* ========== EMPTY STATE ========== */

    /* ========== ANIMATIONS ========== */
    @keyframes fadeIn {

    }
    .exercise-card { animation: fadeIn 0.15s ease-out both; }

    /* Swap Modal (bottom sheet) */

    }
    .swap-modal-header h3 { font-size: 16px; font-weight: 700; }
    .swap-search {

    .swap-filters {

    .swap-chip {

    .swap-item:active { background: var(--surface2); }

    /* Exercise History Modal */
    .history-overlay {
      display: none;
      position: fixed;

      align-items: flex-end;
      justify-content: center;
    }
    .history-overlay.active { display: flex; }
    .history-modal {
      background: var(--surface);

<body>

  <!-- Confetti Canvas -->
  <canvas id="confetti-canvas"></canvas>

  <div class="nav-dots" id="nav-dots">

    <div class="nav-dot" data-screen="settings"></div>
  </div>

  <!-- Home Screen -->
  <div id="home" class="screen active">
    <div class="home-greeting" id="home-greeting">Workout Tracker</div>
    <div class="home-date-line" id="home-date-line"></div>

    <!-- Stats -->
    <div class="stats-row" id="stats-row"></div>

    <!-- Calendar -->
    <div class="calendar-card">
      <div class="cal-nav">
        <button onclick="calNav(-1)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>

    function loadData() {
      const raw = localStorage.getItem('workoutData');
      if (raw) return JSON.parse(raw);
      return { sessions: [], settings: { defaultRestTime: 90, unit: 'kg', hapticsEnabled: true }, personalRecords: {} };
    }

    function saveData(data) { localStorage.setItem('workoutData', JSON.stringify(data)); }

    let appData = loadData();

    // ==================== DATA MIGRATION ====================
    function migrateData() {
      if (!appData.personalRecords) appData.personalRecords = {};
      if (appData.settings.hapticsEnabled === undefined) appData.settings.hapticsEnabled = true;

      // Seed routines if missing
      if (!appData.routines) {
        appData.routines = JSON.parse(JSON.stringify(DEFAULT_ROUTINES));
      }

      // Re-sync default routines with latest definitions
      DEFAULT_ROUTINES.forEach(def => {
        const existing = appData.routines.find(r => r.id === def.id);
        if (existing) {
          existing.exercises = JSON.parse(JSON.stringify(def.exercises));
        }
      });

      // Migrate sessions
      appData.sessions.forEach(s => {
        if (s.notes === undefined) s.notes = '';
        // Backfill routineId/routineName from old type field
        if (!s.routineId && s.type) {
          s.routineId = s.type === 'A' ? 'default-a' : 'default-b';
          s.routineName = s.type === 'A' ? 'Workout A' : 'Workout B';
        }
        // Migrate exercise names and add equipment
        s.exercises.forEach(ex => {
          const legacyId = LEGACY_NAME_MAP[ex.name];
          if (legacyId) {
            const libEx = LIBRARY_MAP[legacyId];
            if (libEx) {
              ex.name = libEx.name;
              if (!ex.equipment) ex.equipment = libEx.equipment;
            }
          }
          if (!ex.equipment) ex.equipment = 'barbell';
        });
      });

      rebuildAllPRs();
      saveData(appData);
    }
    migrateData();

    // ==================== NOTIFICATIONS ====================
    function requestNotificationPermission() {
      if ('Notification' in window && Notification.permission === 'default') {
        Notification.requestPermission();
      }
    }

    function sendRestNotification() {
      if ('Notification' in window && Notification.permission === 'granted' && document.visibilityState === 'hidden') {
        new Notification('Rest Over', { body: 'Time for your next set!', icon: 'icon-192.png', tag: 'rest-done' });
      }
    }

    // ==================== WAKE LOCK ====================
    let wakeLock = null;

    async function acquireWakeLock() {
      if (!('wakeLock' in navigator)) return;
      try {
        wakeLock = await navigator.wakeLock.request('screen');
        wakeLock.addEventListener('release', () => { wakeLock = null; });
      } catch (e) {}
    }

    function releaseWakeLock() {
      if (wakeLock) {
        wakeLock.release();
        wakeLock = null;
      }
    }

    // Re-acquire if page becomes visible again mid-workout
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && currentSession) acquireWakeLock();
    });

    // ==================== HAPTIC FEEDBACK ====================
    function triggerHaptic(type) {
      if (!appData.settings.hapticsEnabled || !navigator.vibrate) return;
      const patterns = {
        setComplete: [30],
        pr: [50, 30, 50, 30, 100],
        restTimerDone: [200, 100, 200, 100, 200],
        workoutFinished: [100, 50, 100, 50, 200],
        dragStart: [20],
        weightAdjust: [10]
      };
      navigator.vibrate(patterns[type] || [20]);
    }

    // ==================== PERSONAL RECORDS ====================
    function computePR(exerciseName) {
      let maxWeight = 0;
      let prDate = '';
      appData.sessions.forEach(s => {
        s.exercises.forEach(ex => {
          if (ex.name === exerciseName) {
            ex.sets.forEach(set => {
              if (set.completed && set.weight !== '' && set.weight !== null && Number(set.weight) > maxWeight) {
                maxWeight = Number(set.weight);
                prDate = s.date;
              }
            });
          }
        });
      });
      return maxWeight > 0 ? { maxWeight, date: prDate } : null;
    }

    function rebuildAllPRs() {
      const allExercises = new Set();
      appData.sessions.forEach(s => {
        s.exercises.forEach(ex => allExercises.add(ex.name));
      });
      appData.personalRecords = {};
      allExercises.forEach(name => {
        const pr = computePR(name);
        if (pr) appData.personalRecords[name] = pr;
      });
    }

    function checkForNewPR(exerciseName, weight) {
      if (weight === '' || weight === null || weight === 0) return false;
      const numWeight = Number(weight);
      const current = appData.personalRecords[exerciseName];
      if (!current) return false; // No existing record to beat — not a PR
      if (numWeight > current.maxWeight) {
        appData.personalRecords[exerciseName] = {
          maxWeight: numWeight,
          date: new Date().toISOString().slice(0, 10)
        };
        return true;
      }
      return false;
    }

    // ==================== CONFETTI ====================
    const confettiCanvas = document.getElementById('confetti-canvas');
    const confettiCtx = confettiCanvas.getContext('2d');
    let confettiParticles = [];
    let confettiAnimId = null;

    function resizeConfetti() {
      confettiCanvas.width = window.innerWidth;
      confettiCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeConfetti);
    resizeConfetti();

    function launchConfetti() {
      confettiParticles = [];
      const colors = ['#e94560', '#7c3aed', '#34d399', '#fbbf24', '#3b82f6', '#ec4899'];
      for (let i = 0; i < 80; i++) {
        confettiParticles.push({
          x: Math.random() * confettiCanvas.width,
          y: -10 - Math.random() * 40,
          w: 6 + Math.random() * 6,
          h: 4 + Math.random() * 4,
          vx: (Math.random() - 0.5) * 6,
          vy: 2 + Math.random() * 4,
          color: colors[Math.floor(Math.random() * colors.length)],
          rotation: Math.random() * 360,
          rotSpeed: (Math.random() - 0.5) * 10,
          life: 1
        });
      }
      if (!confettiAnimId) animateConfetti();
    }

    function animateConfetti() {
      confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      let alive = false;
      confettiParticles.forEach(p => {
        if (p.life <= 0) return;
        alive = true;
        p.x += p.vx;
        p.vy += 0.1;
        p.y += p.vy;
        p.rotation += p.rotSpeed;
        p.life -= 0.005;
        if (p.y > confettiCanvas.height + 20) { p.life = 0; return; }
        confettiCtx.save();
        confettiCtx.translate(p.x, p.y);
        confettiCtx.rotate(p.rotation * Math.PI / 180);
        confettiCtx.globalAlpha = Math.max(0, p.life);
        confettiCtx.fillStyle = p.color;
        confettiCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        confettiCtx.restore();
      });
      if (alive) {
        confettiAnimId = requestAnimationFrame(animateConfetti);
      } else {
        confettiAnimId = null;
        confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
      }
    }

      if (id === 'manage-routines') renderManageRoutines();

      if (id !== 'workout') releaseWakeLock();

    function getNextRoutineId() {
      const lastSession = appData.sessions.length > 0 ? appData.sessions[appData.sessions.length - 1] : null;
      if (appData.routines.length < 2) return appData.routines.length === 1 ? appData.routines[0].id : null;
      if (!lastSession) return appData.routines[0].id;
      const lastIdx = appData.routines.findIndex(r => r.id === lastSession.routineId);
      return appData.routines[(lastIdx + 1) % appData.routines.length].id;

    function renderRoutineButtons() {
      const container = document.getElementById('routine-buttons-container');
      let html = '';

      // Show continue button if workout is active
      if (currentSession) {
        const elapsed = formatTime(getElapsedSeconds());
        html += `<button class="btn-continue-workout" onclick="showScreen('workout')">
          Continue ${escapeHtml(currentSession.routineName || 'Workout')}
          <span class="continue-timer">${elapsed}</span>
        </button>`;
      }

      const nextId = getNextRoutineId();
      appData.routines.forEach((routine, i) => {
        const ci = routine.colorIndex % ROUTINE_COLORS.length;
        const color = ROUTINE_COLORS[ci];
        const exCount = routine.exercises.length;
        const isNext = !currentSession && routine.id === nextId;
        const nextBadge = isNext ? '<span class="next-badge">UP NEXT</span>' : '';
        html += `<button class="btn-routine${isNext ? ' btn-routine-next' : ''}" onclick="startWorkout('${routine.id}')"

    function renderStats() {
      const now = new Date();
      const thisMonth = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
      const monthSessions = appData.sessions.filter(s => s.date.startsWith(thisMonth));
      const totalWorkouts = monthSessions.length;
      const totalVolume = monthSessions.reduce((sum, s) => sum + calcSessionVolume(s), 0);
      const unit = appData.settings.unit;

      // This week count (Mon-Sun)
      const dayOfWeek = (now.getDay() + 6) % 7;
      const monday = new Date(now);
      monday.setDate(now.getDate() - dayOfWeek);
      monday.setHours(0,0,0,0);
      const mondayStr = monday.toISOString().slice(0, 10);
      const weekCount = appData.sessions.filter(s => s.date >= mondayStr).length;

      // Avg duration of recent workouts
      const recentWithDuration = appData.sessions.filter(s => s.totalDuration > 0);
      let avgDurStr = '--:--';
      if (recentWithDuration.length >= 1) {
        const last = recentWithDuration.slice(-5);
        const avgDur = Math.round(last.reduce((s, sess) => s + sess.totalDuration, 0) / last.length);
        avgDurStr = formatTime(avgDur);
      }

      document.getElementById('stats-row').innerHTML = `
        <div class="stat-card">
          <div class="stat-value accent-a">${weekCount}</div>
          <div class="stat-label">This week</div>
        </div>
        <div class="stat-card">
          <div class="stat-value accent-b">${totalWorkouts}</div>
          <div class="stat-label">This month</div>
        </div>
        <div class="stat-card">
          <div class="stat-value accent-a">${formatVolume(totalVolume)}</div>
          <div class="stat-label">Volume (${unit})</div>
        </div>
        <div class="stat-card">
          <div class="stat-value accent-b">${avgDurStr}</div>
          <div class="stat-label">Avg duration</div>
        </div>`;
    }

    function calNav(delta) {
      calMonth += delta;
      if (calMonth < 0) { calMonth = 11; calYear--; }
      if (calMonth > 11) { calMonth = 0; calYear++; }
      renderCalendar();
    }

    function renderCalendar() {
      const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      document.getElementById('cal-title').textContent = MONTHS[calMonth] + ' ' + calYear;

      // Build workout map for this month: date -> set of routineIds
      const prefix = calYear + '-' + String(calMonth + 1).padStart(2, '0');
      const dayMap = {};
      appData.sessions.forEach(s => {
        if (s.date.startsWith(prefix)) {
          const day = parseInt(s.date.split('-')[2]);
          if (!dayMap[day]) dayMap[day] = new Set();
          dayMap[day].add(s.routineId || (s.type === 'A' ? 'default-a' : 'default-b'));
        }
      });

      const now = new Date();
      const todayDate = now.getDate();
      const todayMonth = now.getMonth();
      const todayYear = now.getFullYear();
      const isCurrentMonth = calYear === todayYear && calMonth === todayMonth;

      // First day of month (0=Sun)
      const firstDay = new Date(calYear, calMonth, 1).getDay();
      const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
      // Shift so Monday = 0
      const startOffset = (firstDay + 6) % 7;

      let html = '';
      ['Mo','Tu','We','Th','Fr','Sa','Su'].forEach(d => {
        html += `<div class="cal-dow">${d}</div>`;
      });

      for (let i = 0; i < startOffset; i++) {
        html += '<div class="cal-day empty"></div>';
      }

      for (let day = 1; day <= daysInMonth; day++) {
        let cls = 'cal-day';
        if (isCurrentMonth && day === todayDate) cls += ' today';
        const isFuture = calYear > todayYear || (calYear === todayYear && calMonth > todayMonth) ||
                         (isCurrentMonth && day > todayDate);
        if (isFuture) cls += ' future';

        const routineIds = dayMap[day];
        let dots = '<div class="cal-dots">';
        if (routineIds) {
          routineIds.forEach(rid => {
            const routine = appData.routines.find(r => r.id === rid);
            const ci = routine ? routine.colorIndex % ROUTINE_COLORS.length : 0;
            const dotColor = ['var(--accent)','var(--accent2)','var(--green)','var(--orange)'][ci];
            dots += `<div class="cal-dot" style="background:${dotColor}"></div>`;
          });
        }
        dots += '</div>';

        html += `<div class="${cls}"><span>${day}</span>${dots}</div>`;
      }

      document.getElementById('cal-grid').innerHTML = html;
    }

    function getRoutineColor(session) {
      const routine = appData.routines.find(r => r.id === session.routineId);
      const ci = routine ? routine.colorIndex % ROUTINE_COLORS.length : 0;
      return ['var(--accent)','var(--accent2)','var(--green)','var(--orange)'][ci];
    }

    // ==================== UNDO LAST SESSION ====================
    function undoLastSession() {
      if (appData.sessions.length === 0) return;
      const last = appData.sessions[appData.sessions.length - 1];
      const rName = last.routineName || ('Workout ' + (last.type || '?'));
      if (!confirm('Remove "' + rName + '" from ' + formatDate(last.date) + '?')) return;
      appData.sessions.pop();
      rebuildAllPRs();
      saveData(appData);
      renderHome();
    }

    // ==================== PROGRESSIVE OVERLOAD ====================
    function getOverloadSuggestion(exerciseName, step) {
      const lastSession = [...appData.sessions].reverse().find(s =>
        s.exercises.some(e => e.name === exerciseName)
      );
      if (!lastSession) return null;
      const lastEx = lastSession.exercises.find(e => e.name === exerciseName);
      if (!lastEx) return null;
      const allCompleted = lastEx.sets.every(s => s.completed);
      if (!allCompleted) return null;
      const maxWeight = Math.max(...lastEx.sets.filter(s => s.weight !== '' && s.weight !== null).map(s => Number(s.weight)));
      if (maxWeight <= 0 || isNaN(maxWeight)) return null;
      const suggested = +(maxWeight + step).toFixed(1);
      const unit = appData.settings.unit;
      return `Last: ${maxWeight}${unit} → Try: ${suggested}${unit}`;
    }

    // ==================== SESSION RECOVERY ====================
    function saveSessionBackup() {
      if (currentSession) {
        localStorage.setItem('workoutBackup', JSON.stringify({
          session: currentSession,
          timestamp: Date.now()
        }));
      }
    }

    function clearSessionBackup() {
      localStorage.removeItem('workoutBackup');
    }

    function checkSessionRecovery() {
      const raw = localStorage.getItem('workoutBackup');
      if (!raw) return;
      try {
        const backup = JSON.parse(raw);
        // Validate backup has required data
        if (!backup || !backup.session || !backup.session.exercises || !backup.timestamp) {
          clearSessionBackup();
          return;
        }
        // Ignore backups older than 4 hours
        if (Date.now() - backup.timestamp > 4 * 60 * 60 * 1000) {
          clearSessionBackup();
          return;
        }
        // Silently restore the workout - user can resume from home screen
        currentSession = backup.session;
        clearInterval(elapsedInterval);
        elapsedInterval = setInterval(() => {
          document.getElementById('elapsed-display').textContent = formatTime(getElapsedSeconds());
        }, 1000);
        document.getElementById('workout-title').textContent = currentSession.routineName || 'Workout';
        document.getElementById('elapsed-display').textContent = formatTime(getElapsedSeconds());
        document.getElementById('session-notes').value = currentSession.notes || '';
        document.getElementById('notes-btn').classList.toggle('has-notes', !!(currentSession.notes && currentSession.notes.trim()));
        collapsedExercises.clear();
        renderExercises();
        resumeRestTimer();
        // Re-render home so the Continue button appears
        renderHome();
        // Stay on home screen - user taps "Continue Workout" to go back
      } catch (e) {
        clearSessionBackup();
      }
    }

    // ==================== ACTIVE WORKOUT ====================
    let currentSession = null;
    let elapsedInterval = null;

    function getElapsedSeconds() {
      if (!currentSession || !currentSession.startedAt) return 0;
      return Math.floor((Date.now() - currentSession.startedAt) / 1000);
    }

    function findLastSessionWithExercise(name) {
      for (let i = appData.sessions.length - 1; i >= 0; i--) {
        const ex = appData.sessions[i].exercises.find(e => e.name === name);
        if (ex) return ex;
      }
      return null;
    }

    function startWorkout(routineId) {
      const routine = appData.routines.find(r => r.id === routineId);
      if (!routine) return;
      // If there's an active workout, confirm before starting a new one
      if (currentSession) {
        if (!confirm('Discard current workout and start ' + routine.name + '?')) return;
        clearInterval(elapsedInterval);
        clearSessionBackup();
        releaseWakeLock();
        dismissRest();
      }
      const today = new Date().toISOString().slice(0, 10);

      currentSession = {
        id: Date.now(),
        startedAt: Date.now(),
        routineId: routine.id,
        routineName: routine.name,
        type: routine.id === 'default-a' ? 'A' : routine.id === 'default-b' ? 'B' : 'C',
        date: today,
        notes: '',
        originalExerciseNames: routine.exercises.map(e => e.name),
        exercises: routine.exercises.map(t => {
          const lastEx = findLastSessionWithExercise(t.name);
          let lastWeight = lastEx ? (lastEx.sets.find(s => s.weight !== '' && s.weight !== null) || {}).weight || '' : '';
          const step = getWeightStep(t.equipment);
          // Auto-advance: only if ALL sets completed at the SAME top weight
          let autoAdvanced = false;
          let prevWeight = lastWeight;
          if (lastEx && lastWeight !== '') {
            const completedSets = lastEx.sets.filter(s => s.completed && s.weight !== '' && s.weight !== null);
            const allCompleted = lastEx.sets.every(s => s.completed);
            if (allCompleted && completedSets.length > 0) {
              const weights = completedSets.map(s => Number(s.weight));
              const maxW = Math.max(...weights);
              const allSameTopWeight = weights.every(w => w === maxW);
              if (allSameTopWeight) {
                lastWeight = +(maxW + step).toFixed(1);
                autoAdvanced = true;
              }
            }
          }
          const sets = [];
          for (let i = 0; i < t.sets; i++) {
            const lastReps = lastEx && lastEx.sets[i] && lastEx.sets[i].reps !== '' && lastEx.sets[i].reps !== null
              ? lastEx.sets[i].reps : '';
            sets.push({ weight: lastWeight, reps: lastReps, completed: false });
          }
          return { name: t.name, exerciseId: t.exerciseId, equipment: t.equipment, targetSets: t.sets, targetReps: t.reps, step: step, sets: sets, autoAdvanced: autoAdvanced, prevWeight: prevWeight };
        })
      };

      clearInterval(elapsedInterval);
      elapsedInterval = setInterval(() => {
        document.getElementById('elapsed-display').textContent = formatTime(getElapsedSeconds());
      }, 1000);
      saveSessionBackup();

      document.getElementById('workout-title').textContent = routine.name;
      document.getElementById('elapsed-display').textContent = '00:00';
      document.getElementById('session-notes').value = '';
      document.getElementById('notes-btn').classList.remove('has-notes');

      collapsedExercises.clear();
      renderExercises();
      showScreen('workout');
      acquireWakeLock();
      requestNotificationPermission();
    }

    const collapsedExercises = new Set();

    function toggleCollapse(ei) {
      const card = document.getElementById('ex-' + ei);
      if (!card) return;
      const body = card.querySelector('.ex-body');
      const hint = card.querySelector('.overload-hint');

      if (collapsedExercises.has(ei)) {
        // Expanding
        collapsedExercises.delete(ei);
        card.classList.remove('collapsed');
        if (body) {
          body.style.maxHeight = body.scrollHeight + 'px';
          setTimeout(() => { body.style.maxHeight = ''; }, 300);
        }
        if (hint) {
          hint.style.maxHeight = hint.scrollHeight + 'px';
          setTimeout(() => { hint.style.maxHeight = ''; }, 300);
        }
      } else {
        // Collapsing - set explicit height, force reflow, then transition to 0
        collapsedExercises.add(ei);
        if (body) body.style.maxHeight = body.scrollHeight + 'px';
        if (hint) hint.style.maxHeight = hint.scrollHeight + 'px';
        // Force browser to register the current height before animating
        card.offsetHeight;
        if (body) body.style.maxHeight = '0px';
        if (hint) hint.style.maxHeight = '0px';
        card.classList.add('collapsed');
      }

      // Update badge
      const ex = currentSession.exercises[ei];
      const doneCount = ex.sets.filter(s => s.completed).length;
      const badge = card.querySelector('.ex-badge');
      if (badge) {
        badge.textContent = doneCount + '/' + ex.sets.length;
        badge.className = doneCount > 0 ? 'ex-badge has-done' : 'ex-badge';
      }
    }

    function renderExercises() {
      const container = document.getElementById('exercises-container');
      const unit = appData.settings.unit;
      let html = '';

      currentSession.exercises.forEach((ex, ei) => {
        const eqType = ex.equipment || 'barbell';
        const stepLabel = ex.step || getWeightStep(eqType);
        const doneCount = ex.sets.filter(s => s.completed).length;
        const totalCount = ex.sets.length;
        const badgeClass = doneCount > 0 ? 'ex-badge has-done' : 'ex-badge';
        const collapsed = collapsedExercises.has(ei) ? ' collapsed' : '';

        let hintHtml = '';
        if (ex.autoAdvanced) {
          hintHtml = `<div class="overload-hint">\u2191 +${ex.step} ${unit} auto-advanced from last session</div>`;
        } else {
          const hint = getOverloadSuggestion(ex.name, ex.step);
          if (hint) hintHtml = `<div class="overload-hint">${hint}</div>`;
        }

        html += `<div class="exercise-card${collapsed}" id="ex-${ei}" data-ei="${ei}">
          <div class="ex-header">
            <div class="ex-icon ${eqType}" onclick="toggleCollapse(${ei})">${getExIcon(eqType)}</div>
            <h3 onclick="openExerciseHistory(${ei})">${escapeHtml(ex.name)}</h3>
            <span class="${badgeClass}">${doneCount}/${totalCount}</span>
            <button class="swap-btn" onclick="event.stopPropagation();openSwapModal(${ei})" title="Swap exercise">${SWAP_SVG}</button>
            <svg class="ex-chevron" onclick="toggleCollapse(${ei})" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <div class="ex-target">${ex.targetSets} &times; ${ex.targetReps} &middot; &plusmn;${stepLabel} ${unit}</div>
          ${hintHtml}
          <div class="ex-body">
          <div class="set-header">
            <span></span><span>${unit.toUpperCase()}</span><span>REPS</span><span></span>
          </div>`;

        ex.sets.forEach((set, si) => {
          html += buildSetRowHTML(ei, si, set);
        });

        html += `<div class="set-actions">
          <button class="add-set-btn" onclick="addSet(${ei})">+ Add set</button>`;
        if (ex.sets.length > 1) {
          html += `<button class="remove-set-btn" onclick="removeSet(${ei})">Remove set</button>`;
        }
        html += `</div></div></div>`;
      });

      html += `<button class="add-exercise-btn" onclick="openAddExerciseModal()">+ Add Exercise</button>`;

      container.innerHTML = html;
      initDragHandles();
    }

    function buildSetRowHTML(ei, si, set) {
      const doneClass = set.completed ? 'done' : '';
      const prClass = set.completed && set.isPR ? ' is-pr' : '';
      const checkIcon = set.completed ? CHECK_SVG : '';
      const weightVal = set.weight !== '' && set.weight !== null ? set.weight : '';
      return `<div class="set-row" id="sr-${ei}-${si}">
        <span class="set-num">${si + 1}</span>
        <div class="weight-cell">
          <button class="w-adj" onclick="adjSetWeight(${ei},${si},-1)">&minus;</button>
          <input type="number" inputmode="decimal" placeholder="-" id="wi-${ei}-${si}"
            value="${weightVal}" onchange="updateSet(${ei},${si},'weight',this.value)">
          <button class="w-adj" onclick="adjSetWeight(${ei},${si},1)">+</button>
        </div>
        <input type="number" inputmode="numeric" placeholder="-" id="ri-${ei}-${si}"
          value="${set.reps}" onchange="updateSet(${ei},${si},'reps',this.value)">
        <button class="set-check ${doneClass}${prClass}" id="sc-${ei}-${si}" onclick="toggleSet(${ei},${si})">
          ${checkIcon}
        </button>
      </div>`;
    }

    // ---- Targeted DOM updates (no flicker) ----

    function updateWeightInput(ei, si) {
      const input = document.getElementById('wi-' + ei + '-' + si);
      if (input) {
        const v = currentSession.exercises[ei].sets[si].weight;
        input.value = (v !== '' && v !== null) ? v : '';
      }
    }

    function updateSet(ei, si, field, value) {
      const numVal = value === '' ? '' : Number(value);
      currentSession.exercises[ei].sets[si][field] = numVal;

      if (field === 'weight' && si === 0 && numVal !== '') {
        const ex = currentSession.exercises[ei];
        for (let i = 1; i < ex.sets.length; i++) {
          if (ex.sets[i].weight === '' || ex.sets[i].weight === null) {
            ex.sets[i].weight = numVal;
            updateWeightInput(ei, i);
          }
        }
      }
      saveSessionBackup();
    }

    function adjSetWeight(ei, si, direction) {
      const ex = currentSession.exercises[ei];
      const step = ex.step || getWeightStep(ex.equipment);
      const current = (ex.sets[si].weight !== '' && ex.sets[si].weight !== null)
        ? Number(ex.sets[si].weight) : 0;
      const newWeight = Math.max(0, +(current + direction * step).toFixed(1));
      ex.sets[si].weight = newWeight;
      updateWeightInput(ei, si);
      triggerHaptic('weightAdjust');

      // If set 1, also fill empty subsequent sets
      if (si === 0) {
        for (let i = 1; i < ex.sets.length; i++) {
          if (ex.sets[i].weight === '' || ex.sets[i].weight === null) {
            ex.sets[i].weight = newWeight;
            updateWeightInput(ei, i);
          }
        }
      }
      saveSessionBackup();
    }

    function toggleSet(ei, si) {
      const set = currentSession.exercises[ei].sets[si];
      set.completed = !set.completed;

      // Targeted update for check button
      const btn = document.getElementById('sc-' + ei + '-' + si);

      let isPR = false;
      if (set.completed) {
        // Check for PR
        const exName = currentSession.exercises[ei].name;
        const weight = set.weight;
        isPR = checkForNewPR(exName, weight);
        set.isPR = isPR;

        if (isPR) {
          triggerHaptic('pr');
          launchConfetti();
          // Show gold button
          if (btn) {
            btn.classList.add('done', 'is-pr');
            btn.innerHTML = CHECK_SVG;
          }
        } else {
          triggerHaptic('setComplete');
          if (btn) {
            btn.classList.add('done');
            btn.classList.remove('is-pr');
            btn.innerHTML = CHECK_SVG;
          }
        }
      } else {
        set.isPR = false;
        triggerHaptic('setComplete');
        if (btn) {
          btn.classList.remove('done', 'is-pr');
          btn.innerHTML = '';
        }
      }

      // Update badge count
      const ex = currentSession.exercises[ei];
      const doneCount = ex.sets.filter(s => s.completed).length;
      const card = document.getElementById('ex-' + ei);
      if (card) {
        const badge = card.querySelector('.ex-badge');
        if (badge) {
          badge.textContent = doneCount + '/' + ex.sets.length;
          badge.className = doneCount > 0 ? 'ex-badge has-done' : 'ex-badge';
        }
      }

      if (set.completed) {
        // Check if all exercises fully completed
        const allDone = currentSession.exercises.every(ex => ex.sets.every(s => s.completed));
        if (allDone) {
          // Skip rest timer on final set - no point resting when done
          dismissRest();
          showAutoFinishToast();
        } else {
          startRestTimer(ei);
          // Auto-collapse this exercise if all its sets are done
          const thisEx = currentSession.exercises[ei];
          if (thisEx.sets.every(s => s.completed) && !collapsedExercises.has(ei)) {
            setTimeout(() => { toggleCollapse(ei); }, 400);
          }
        }
      }
      saveSessionBackup();
    }

    function showAutoFinishToast() {
      const existing = document.querySelector('.auto-finish-toast');
      if (existing) existing.remove();
      const toast = document.createElement('div');
      toast.className = 'auto-finish-toast';
      toast.innerHTML = '\u2714 All sets done! Tap to finish';
      toast.onclick = () => { toast.remove(); finishWorkout(); };
      document.body.appendChild(toast);
      setTimeout(() => { if (toast.parentNode) toast.remove(); }, 6000);
    }

    function addSet(ei) {
      const ex = currentSession.exercises[ei];
      const lastSet = ex.sets[ex.sets.length - 1];
      ex.sets.push({ weight: lastSet.weight, reps: '', completed: false });
      renderExercises(); // structural change, full re-render needed
      saveSessionBackup();
    }

    function removeSet(ei) {
      const ex = currentSession.exercises[ei];
      if (ex.sets.length > 1) {
        ex.sets.pop();
        renderExercises();
        saveSessionBackup();
      }
    }

    function removeExercise(ei) {
      if (!currentSession || currentSession.exercises.length <= 1) return;
      const name = currentSession.exercises[ei].name;
      if (!confirm('Remove "' + name + '" from this workout?')) return;
      currentSession.exercises.splice(ei, 1);
      collapsedExercises.clear();
      renderExercises();
      saveSessionBackup();
    }

    // ==================== REORDER EXERCISES (DRAG) ====================
    let dragState = null;

    function initDragHandles() {
      const handles = document.querySelectorAll('.drag-handle');
      handles.forEach(handle => {
        handle.addEventListener('touchstart', onDragTouchStart, { passive: false });
        handle.addEventListener('mousedown', onDragMouseStart);
      });
    }

    function onDragTouchStart(e) {
      const ei = parseInt(e.currentTarget.getAttribute('data-ei'));
      e.preventDefault();
      const touch = e.touches[0];
      startDrag(ei, touch.clientY);

      const moveHandler = (ev) => {
        ev.preventDefault();
        moveDrag(ev.touches[0].clientY);
      };
      const endHandler = () => {
        endDrag();
        document.removeEventListener('touchmove', moveHandler);
        document.removeEventListener('touchend', endHandler);
      };
      document.addEventListener('touchmove', moveHandler, { passive: false });
      document.addEventListener('touchend', endHandler);
    }

    function onDragMouseStart(e) {
      const ei = parseInt(e.currentTarget.getAttribute('data-ei'));
      e.preventDefault();
      startDrag(ei, e.clientY);

      const moveHandler = (ev) => { moveDrag(ev.clientY); };
      const endHandler = () => {
        endDrag();
        document.removeEventListener('mousemove', moveHandler);
        document.removeEventListener('mouseup', endHandler);
      };
      document.addEventListener('mousemove', moveHandler);
      document.addEventListener('mouseup', endHandler);
    }

    function startDrag(ei, startY) {
      const card = document.getElementById('ex-' + ei);
      if (!card) return;

      triggerHaptic('dragStart');
      const cards = document.querySelectorAll('.exercise-card');
      const rects = [];
      cards.forEach(c => rects.push(c.getBoundingClientRect()));

      dragState = {
        ei: ei,
        startY: startY,
        currentY: startY,
        card: card,
        rects: rects,
        originalOrder: currentSession.exercises.map((_, i) => i)
      };
      card.classList.add('dragging');
    }

    function moveDrag(clientY) {
      if (!dragState) return;
      dragState.currentY = clientY;
      const delta = clientY - dragState.startY;
      dragState.card.style.transform = `translateY(${delta}px)`;

      // Determine new position
      const cards = document.querySelectorAll('.exercise-card');
      const dragRect = dragState.rects[dragState.ei];
      const dragCenter = dragRect.top + dragRect.height / 2 + delta;

      let newIndex = dragState.ei;
      for (let i = 0; i < dragState.rects.length; i++) {
        if (i === dragState.ei) continue;
        const r = dragState.rects[i];
        const center = r.top + r.height / 2;
        if (dragState.ei < i && dragCenter > center) newIndex = i;
        if (dragState.ei > i && dragCenter < center) newIndex = i;
      }

      // Visual feedback on other cards
      cards.forEach((c, i) => {
        if (i === dragState.ei) return;
        if (dragState.ei < newIndex && i > dragState.ei && i <= newIndex) {
          c.style.transform = `translateY(-${dragRect.height + 12}px)`;
        } else if (dragState.ei > newIndex && i < dragState.ei && i >= newIndex) {
          c.style.transform = `translateY(${dragRect.height + 12}px)`;
        } else {
          c.style.transform = '';
        }
      });

      dragState.targetIndex = newIndex;
    }

    function endDrag() {
      if (!dragState) return;
      const { ei, targetIndex } = dragState;
      const cards = document.querySelectorAll('.exercise-card');
      cards.forEach(c => {
        c.style.transform = '';
        c.classList.remove('dragging');
      });

      if (targetIndex !== undefined && targetIndex !== ei) {
        const [moved] = currentSession.exercises.splice(ei, 1);
        currentSession.exercises.splice(targetIndex, 0, moved);

        // Update collapsed indices
        const newCollapsed = new Set();
        const oldCollapsed = new Set(collapsedExercises);
        collapsedExercises.clear();
        // Re-map collapsed state
        currentSession.exercises.forEach((ex, i) => {
          // Find where this exercise was before
          // Simple approach: just clear and let user re-collapse
        });

        renderExercises();
        saveSessionBackup();
      }
      dragState = null;
    }

    // ==================== NOTES MODAL ====================
    function openNotesModal() {
      document.getElementById('notes-overlay').classList.add('active');
      document.getElementById('session-notes').focus();
    }

    function closeNotesModal(e) {
      if (e && e.target !== e.currentTarget && !e.target.closest('.notes-modal-close')) return;
      document.getElementById('notes-overlay').classList.remove('active');
      // Update button indicator
      const hasText = document.getElementById('session-notes').value.trim().length > 0;
      document.getElementById('notes-btn').classList.toggle('has-notes', hasText);
      if (currentSession) {
        currentSession.notes = document.getElementById('session-notes').value.trim();
        saveSessionBackup();
      }
    }

    // ==================== EXERCISE HISTORY QUICK-VIEW ====================
    function getExerciseHistory(name, limit = 5) {
      const results = [];
      for (let i = appData.sessions.length - 1; i >= 0 && results.length < limit; i--) {
        const ex = appData.sessions[i].exercises.find(e => e.name === name);
        if (ex) results.push({ date: appData.sessions[i].date, sets: ex.sets });
      }
      return results;
    }

    function openExerciseHistory(ei) {
      if (!currentSession) return;
      const ex = currentSession.exercises[ei];
      const history = getExerciseHistory(ex.name);
      const unit = appData.settings.unit;

      document.getElementById('exercise-history-title').textContent = ex.name;

      if (history.length === 0) {
        document.getElementById('exercise-history-list').innerHTML =
          '<div class="history-empty">No previous sessions found for this exercise.</div>';
      } else {
        let html = '';
        history.forEach(h => {
          html += '<div class="history-session-item">';
          html += `<div class="history-session-date">${formatDate(h.date)}</div>`;
          html += '<div class="history-session-sets">';
          h.sets.forEach((s, si) => {
            const w = s.weight !== '' && s.weight !== null ? s.weight + ' ' + unit : '-';
            const r = s.reps !== '' && s.reps !== null ? s.reps : '-';
            const checkClass = s.completed ? 'hist-check' : 'hist-miss';
            const checkMark = s.completed ? '&#10003;' : '&#9675;';
            html += `<div class="hist-set-line"><span class="${checkClass}">${checkMark}</span> Set ${si + 1}: ${w} &times; ${r} reps</div>`;
          });
          html += '</div></div>';
        });
        document.getElementById('exercise-history-list').innerHTML = html;
      }

      document.getElementById('exercise-history-overlay').classList.add('active');
    }

    function closeExerciseHistory(e) {
      if (e && e.target !== e.currentTarget && !e.target.closest('.notes-modal-close')) return;
      document.getElementById('exercise-history-overlay').classList.remove('active');
    }

    function formatTime(totalSec) {
      const m = Math.floor(totalSec / 60);
      const s = totalSec % 60;
      return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }

    // ==================== REST TIMER ====================
    let restInterval = null;
    let isResting = false;
    let restStartedAt = 0;
    let restDuration = 0;
    let restExName = 'REST';

    function getRestRemaining() {
      if (!restStartedAt || !restDuration) return 0;
      return Math.max(0, restDuration - Math.floor((Date.now() - restStartedAt) / 1000));
    }

    function startRestTimer(ei) {
      clearInterval(restInterval);
      let restTime = appData.settings.defaultRestTime;
      restExName = 'REST';
      if (ei !== undefined && currentSession && currentSession.exercises[ei]) {
        const ex = currentSession.exercises[ei];
        restExName = ex.name;
        const libEx = EXERCISE_LIBRARY.find(e => e.name === ex.name);
        if (libEx && libEx.defaultRest) {
          restTime = libEx.defaultRest;
        }
      }
      restStartedAt = Date.now();
      restDuration = restTime;
      isResting = true;

      // Persist rest state on the session
      if (currentSession) {
        currentSession.restStartedAt = restStartedAt;
        currentSession.restDuration = restDuration;
        currentSession.restExName = restExName;
        saveSessionBackup();
      }

      document.getElementById('rest-ex-name').textContent = restExName;
      document.getElementById('rest-controls').classList.add('active');
      updateRestDisplay();

      restInterval = setInterval(() => {
        const remaining = getRestRemaining();
        if (remaining <= 0) {
          clearInterval(restInterval);
          restFinished();
        }
        updateRestDisplay();
      }, 1000);
    }

    function resumeRestTimer() {
      if (!currentSession || !currentSession.restStartedAt || !currentSession.restDuration) return;
      restStartedAt = currentSession.restStartedAt;
      restDuration = currentSession.restDuration;
      restExName = currentSession.restExName || 'REST';
      const remaining = getRestRemaining();
      if (remaining <= 0) {
        clearRestState();
        return;
      }
      isResting = true;
      document.getElementById('rest-ex-name').textContent = restExName;
      document.getElementById('rest-controls').classList.add('active');
      updateRestDisplay();

      clearInterval(restInterval);
      restInterval = setInterval(() => {
        const rem = getRestRemaining();
        if (rem <= 0) {
          clearInterval(restInterval);
          restFinished();
        }
        updateRestDisplay();
      }, 1000);
    }

    function updateRestDisplay() {
      document.getElementById('rest-time-display').textContent = formatTime(getRestRemaining());
    }

    function adjustRest(delta) {
      // Shift the start time to effectively add/remove time
      restStartedAt += delta * -1000;
      if (currentSession) {
        currentSession.restStartedAt = restStartedAt;
        saveSessionBackup();
      }
      updateRestDisplay();
    }

    function clearRestState() {
      restStartedAt = 0;
      restDuration = 0;
      isResting = false;
      if (currentSession) {
        delete currentSession.restStartedAt;
        delete currentSession.restDuration;
        delete currentSession.restExName;
      }
    }

    function dismissRest() {
      clearInterval(restInterval);
      clearRestState();
      document.getElementById('rest-controls').classList.remove('active');
    }

    function restFinished() {
      dismissRest();
      triggerHaptic('restTimerDone');
      sendRestNotification();
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        for (let i = 0; i < 3; i++) {
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = 880;
          gain.gain.value = 0.3;
          osc.start(ctx.currentTime + i * 0.25);
          osc.stop(ctx.currentTime + i * 0.25 + 0.15);
        }
      } catch (e) {}
    }

    // ==================== FINISH WORKOUT ====================
    function checkIfRoutineModified() {
      if (!currentSession || !currentSession.originalExerciseNames) return false;
      const current = currentSession.exercises.map(e => e.name);
      const original = currentSession.originalExerciseNames;
      if (current.length !== original.length) return true;
      return current.some((name, i) => name !== original[i]);
    }

    function finishWorkout() {
      if (!currentSession) return;

      const anyDone = currentSession.exercises.some(ex => ex.sets.some(s => s.completed));
      if (!anyDone) {
        discardWorkout();
        return;
      }

      clearInterval(elapsedInterval);
      clearSessionBackup();
      releaseWakeLock();
      currentSession.totalDuration = getElapsedSeconds();
      currentSession.totalVolume = calcSessionVolume(currentSession);
      currentSession.notes = document.getElementById('session-notes').value.trim();
      dismissRest();

      currentSession.exercises.forEach(ex => {
        ex.sets = ex.sets.filter(s => s.completed || s.weight !== '' || s.reps !== '');
      });

      appData.sessions.push(currentSession);
      rebuildAllPRs();
      saveData(appData);

      triggerHaptic('workoutFinished');
      launchConfetti();

      // Check if routine was modified (exercises swapped)
      if (checkIfRoutineModified()) {
        setTimeout(() => {
          openSaveRoutineModal();
        }, 800);
      } else {
        setTimeout(() => {
          currentSession = null;
          showScreen('home');
        }, 1200);
      }
    }

    function discardWorkout() {
      if (!currentSession) return;
      if (!confirm('Discard this workout? All progress will be lost.')) return;
      clearInterval(elapsedInterval);
      clearSessionBackup();
      releaseWakeLock();

    function getLastUsedWeight(name) {
      for (let i = appData.sessions.length - 1; i >= 0; i--) {
        const ex = appData.sessions[i].exercises.find(e => e.name === name);
        if (ex) {
          const set = ex.sets.find(s => s.weight !== '' && s.weight !== null && s.completed);
          if (set) return Number(set.weight);
        }
      }
      return null;
    }

    function renderSwapList() {
      const query = document.getElementById('swap-search').value.toLowerCase().trim();
      const unit = appData.settings.unit;
      const container = document.getElementById('swap-list');

      // Filter exercises already in current session
      const currentNames = new Set(currentSession.exercises.map(e => e.name));

      let filtered = EXERCISE_LIBRARY.filter(ex => {
        if (currentNames.has(ex.name)) return false;
        if (swapCategoryFilter !== 'All' && ex.category !== swapCategoryFilter) return false;
        if (query && !ex.name.toLowerCase().includes(query) && !ex.category.toLowerCase().includes(query) && !ex.equipment.toLowerCase().includes(query)) return false;
        return true;
      });

      if (filtered.length === 0) {
        container.innerHTML = '<div style="text-align:center;color:var(--text3);padding:24px;font-size:13px;">No exercises found</div>';
        return;
      }

      container.innerHTML = filtered.map(ex => {
        const lastW = getLastUsedWeight(ex.name);
        const weightStr = lastW !== null ? `${lastW} ${unit}` : '';
        return `<div class="swap-item" onclick="executeSwap('${ex.id}')">
          <div class="ex-icon ${ex.equipment}" style="width:32px;height:32px;border-radius:8px;flex-shrink:0">${getExIcon(ex.equipment)}</div>
          <div class="swap-item-info">
            <div class="swap-item-name">${escapeHtml(ex.name)}</div>
            <div class="swap-item-meta">${ex.category} &middot; ${ex.equipment}</div>
          </div>
          ${weightStr ? `<div class="swap-item-weight">${weightStr}</div>` : ''}
        </div>`;
      }).join('');
    }

    function executeSwap(libraryId) {
      if (!currentSession) return;
      const libEx = LIBRARY_MAP[libraryId];
      if (!libEx) return;

      const step = getWeightStep(libEx.equipment);
      const lastEx = findLastSessionWithExercise(libEx.name);
      const lastWeight = lastEx ? (lastEx.sets.find(s => s.weight !== '' && s.weight !== null) || {}).weight || '' : '';

      const setCount = (swapMode === 'swap' && swapExerciseIndex !== null)
        ? currentSession.exercises[swapExerciseIndex].sets.length
        : libEx.defaultSets;

      const sets = [];
      for (let i = 0; i < setCount; i++) {
        const lastReps = lastEx && lastEx.sets[i] && lastEx.sets[i].reps !== '' && lastEx.sets[i].reps !== null
          ? lastEx.sets[i].reps : '';
        sets.push({ weight: lastWeight, reps: lastReps, completed: false });
      }

      const newExercise = {
        name: libEx.name,
        exerciseId: libEx.id,
        equipment: libEx.equipment,
        targetSets: libEx.defaultSets,
        targetReps: libEx.defaultReps,
        step: step,
        sets: sets
      };

      if (swapMode === 'add') {
        currentSession.exercises.push(newExercise);
      } else {
        currentSession.exercises[swapExerciseIndex] = newExercise;
      }

      closeSwapModal();
      renderExercises();
      triggerHaptic('setComplete');
      saveSessionBackup();
    }

        // Check which sets were PRs at the time

        session.exercises.forEach(ex => {
          let maxInSession = 0;
          ex.sets.forEach(s => {
            if (s.completed && s.weight !== '' && s.weight !== null) {
              maxInSession = Math.max(maxInSession, Number(s.weight));
            }
          });
          if (maxInSession > 0) {
            const currentPR = appData.personalRecords[ex.name];
            if (currentPR && currentPR.maxWeight === maxInSession && currentPR.date === session.date) {
              sessionPRs[ex.name] = maxInSession;
            }
          }
        });

        let details = '';
        session.exercises.forEach(ex => {
          if (ex.sets.length === 0) return;
          details += `<div class="hi-exercise"><div class="hi-name">${escapeHtml(ex.name)}</div>`;
          ex.sets.forEach((s, si) => {
            const w = s.weight !== '' && s.weight !== null ? s.weight + ' ' + unit : '-';
            const r = s.reps !== '' && s.reps !== null ? s.reps : '-';
